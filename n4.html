<script>
const N4_BACK = {"1": {"analysis": "「～てある」जनाउँछ他動詞的कार्यनतिजाअवस्था持续存在，जोड दिनु这是有人有意为之的नतिजा。与「～ている」फरक，它突出कार्य的उद्देश्य性和नतिजा的保持अवस्था。这वटा文法只能接他動詞，किनभनेआवश्यक体现「有人做了某事」的含义。", "mistakes": "सामान्य गल्तीहरू：与「～ている」混用。❌窓が開いてある → ✅窓が開けてある（窗户开着-有人开的）；❌本を読んである → ✅本が置いてある（书放着-有人放的）。ध्यान दिनुहोस्：自動詞用「～ている」，他動詞表नतिजाअवस्था用「～てある」。", "similar": [{"form": "～ている", "diff": "「～てある」जोड दिनु有意的नतिजाअवस्था，「～ている」जनाउँछ自然的持续अवस्था或कार्य进行"}, {"form": "～ておく", "diff": "「～ておく」जनाउँछ为भविष्यकाल做准备的कार्य，「～てある」जनाउँछभूतकालकार्य的वर्तमाननतिजाअवस्था"}], "quiz": [{"q": "机の上に本が（____）。", "opts": ["A.置いている", "B.置いてある", "C.置いておく", "D.置いていた"], "ans": "B", "exp": "जनाउँछ书被有意放在桌上的नतिजाअवस्था，用「～てある」"}, {"q": "電気が（____）から、誰かいるようです。", "opts": ["A.つけている", "B.ついてある", "C.つけてある", "D.ついている"], "ans": "C", "exp": "电灯被有人有意打开的अवस्था，他動詞「つける」+「てある」"}, {"q": "レポートはもう（____）ので、安心してください。", "opts": ["A.書いている", "B.書いた", "C.書いてある", "D.書いておく"], "ans": "C", "exp": "报告पहिलेनै写好并保持完成अवस्था，用「書いてある」जनाउँछनतिजाअवस्था"}]}, "2": {"analysis": "「～ておく」जनाउँछको लागिभविष्यकाल的आवश्यक而提前做某事，体现了预先准备的意图。这वटा文法जोड दिनुकार्य的预备性质，与单纯的वर्तमान完成时फरक，它包含「को लागि以后」的उद्देश्य性。बोलीचाली中常缩略为「～とく」，是日常会话中的高频表达。", "mistakes": "सामान्य गल्तीहरू：混淆时态概念。❌「資料を準備してあります」（单纯जनाउँछ已完成अवस्था） → ✅「資料を準備しておきます」（为भविष्यकालआवश्यक而准备）；❌「ドアを開けておく」प्रयोग गरिन्छजनाउँछवर्तमानअवस्था → ✅「ドアを開けておく」जनाउँछ故意保持开启अवस्था", "similar": [{"form": "～てある", "diff": "ているजनाउँछनतिजाअवस्था保持，ておくजोड दिनु为भविष्यकाल的预备行为"}, {"form": "～ておる", "diff": "ておる是敬语形式，ておく是预备行为的普通表达"}], "quiz": [{"q": "パーティーの前に、飲み物を（____）。", "opts": ["A. 買ってあります", "B. 買っています", "C. 買っておきます", "D. 買いました"], "ans": "C", "exp": "为聚会提前购买饮料，जनाउँछ预备行为，用「～ておく」"}, {"q": "雨が降りそうだから、傘を（____）。", "opts": ["A. 持ちました", "B. 持っています", "C. 持ってあります", "D. 持っておこう"], "ans": "D", "exp": "किनभनेसम्भावना下雨而提前准备雨伞，जनाउँछ预备行为"}, {"q": "明日の会議のため、今日中に報告書を（____）つもりです。", "opts": ["A. 書いてしまう", "B. 書いておく", "C. 書いてある", "D. 書いている"], "ans": "B", "exp": "को लागि明天的会议而提前准备报告书，典型的预备用法"}]}, "3": {"analysis": "「〜てしまう」是N4重要文法，जनाउँछकार्य的पूर्ण完成或带有遗憾情感的完成。当जनाउँछ完了时जोड दिनुकार्य彻底结束，当जनाउँछ后悔时含有「不该做却做了」的遗憾心情。बोलीचाली中常缩略为「〜ちゃう/〜じゃう」，使表达更自然流畅。", "mistakes": "सामान्य गल्तीहरू：混淆完了和后悔两种用法。❌宿題をしてしまいました（听起来像后悔做作业）→ ✅宿題をしました（单纯完成）；❌財布を忘れちゃいました（应表后悔）→ ✅財布を忘れてしまいました（正确表达遗憾）", "similar": [{"form": "〜てある", "diff": "〜てあるजोड दिनुनतिजाअवस्था的维持，〜てしまうजोड दिनुकार्य的पूर्ण完成"}, {"form": "〜ている", "diff": "〜ているजनाउँछ进行或अवस्था，〜てしまうजनाउँछ完了或遗憾的完成"}], "quiz": [{"q": "もう12時だ。電車に乗り遅れて（____）。", "opts": ["A. います", "B. しまいます", "C. あります", "D. います"], "ans": "B", "exp": "错过电车是令人后悔的事情，用「〜てしまう」जनाउँछ遗憾"}, {"q": "やっと本を読み（____）ました。", "opts": ["A. 終わって", "B. 終えて", "C. 終わってしまい", "D. 終えてしまい"], "ans": "C", "exp": "「読み終わってしまう」जनाउँछपूर्ण读完，जोड दिनु完了"}, {"q": "大切な写真を（____）。", "opts": ["A. なくしちゃいました", "B. なくしています", "C. なくしてあります", "D. なくしました"], "ans": "A", "exp": "弄丢重要照片是遗憾的事，बोलीचाली「〜ちゃう」更自然地表达后悔"}]}, "4": {"analysis": "「～てみる」जनाउँछ试验性地做某事，जोड दिनु尝试的态度和过程。与中文「试试」फरक，日语更注重मार्फत实际行动来获得अनुभव或确认नतिजा。常प्रयोग गरिन्छ想要体验新事物或验证某种想法的场合。", "mistakes": "सामान्य गल्तीहरू：时态混用。❌明日、映画を見てみました → ✅明日、映画を見てみます；助詞遗漏：❌日本料理作ってみる → ✅日本料理を作ってみる", "similar": [{"form": "～てみたい", "diff": "「～てみる」是实际尝试，「～てみたい」是想要尝试的愿望"}, {"form": "～ようとする", "diff": "「～てみる」轻松尝试，「～ようとする」जोड दिनु努力企图"}], "quiz": [{"q": "新しいレストランで____。", "opts": ["A.食べてみます", "B.食べています", "C.食べました", "D.食べるでしょう"], "ans": "A", "exp": "「食べてみます」जनाउँछ试着在新餐厅吃饭，符合尝试新事物的सन्दर्भ"}, {"q": "この本を____から、面白いかどうかわかります。", "opts": ["A.読んで", "B.読んでみて", "C.読みたくて", "D.読もうと"], "ans": "B", "exp": "「読んでみて」जनाउँछमार्फत试着读这本书来判断是否有趣"}, {"q": "日本語で手紙を____が、難しかったです。", "opts": ["A.書いて", "B.書こうとして", "C.書いてみた", "D.書きたくて"], "ans": "C", "exp": "「書いてみた」जनाउँछपहिलेनै尝试用日语写信，भूतकाल时态"}]}, "5": {"analysis": "〜ていくजनाउँछकार्य的दिशा性和持续性，包含两वटा核心概念：1）空间上的离去（从说话者的位置向外移动）；2）समय上的持续परिवर्तन（从वर्तमान向未来发展）。与〜てくる相对，形成「去」和「来」的दिशा对立，是日语表达时空概念的重要व्याकरण。", "mistakes": "सामान्य गल्तीहरू：混淆दिशा性。❌雨が降ってくる（गर्नुपर्छजनाउँछ雨开始下） → ✅雨が降っていく（雨继续下着离去）；❌だんだん寒くなってくる（从外向内变冷） → ✅だんだん寒くなっていく（持续变冷的过程）", "similar": [{"form": "〜てくる", "diff": "てくるजनाउँछ「来」的दिशा（向说话者接近）或परिवर्तन的开始，ていくजनाउँछ「去」的दिशा（离开说话者）或परिवर्तन的持续"}, {"form": "〜ている", "diff": "ているजनाउँछअवस्था的持续，ていくजोड दिनुकार्य的दिशा性和समय的推移过程"}], "quiz": [{"q": "友達が家から____。", "opts": ["A. 出ていく", "B. 出てくる", "C. 出ている", "D. 出ていた"], "ans": "A", "exp": "朋友从家里出去，जनाउँछ离开说话者的दिशा，用ていく"}, {"q": "これから日本語がもっと上手____と思います。", "opts": ["A. になってくる", "B. になっていく", "C. になっている", "D. になった"], "ans": "B", "exp": "जनाउँछ从वर्तमान向未来日语会越来越好的持续परिवर्तन过程，用ていく"}, {"q": "電車が駅から____のが見えました。", "opts": ["A. 出てくる", "B. 出ている", "C. 出ていく", "D. 出ていた"], "ans": "C", "exp": "电车从车站开出去，जनाउँछ离开的दिशा，用ていく"}]}, "6": {"analysis": "「てくる」जनाउँछ两वटा核心概念：1）कार्य的往返性（去做某事然后回来）；2）परिवर्तन的渐进性（某种अवस्था或现象逐渐向说话者दिशा发展）。这वटा文法体现了日语独特的「向心性」表达，即以说话者为中心点来描述कार्य或परिवर्तन的दिशा性。", "mistakes": "❌ 雨が降ってきた → जनाउँछ「雨开始下了」而非「雨下着回来了」。易误解为物理移动。✅ 理解：जनाउँछपरिवर्तन的开始或渐进过程。❌ 友達が来てくる → ✅ 友達が来る（朋友来）或 友達を連れてくる（带朋友来）。", "similar": [{"form": "〜ていく", "diff": "てくる：向说话者दिशा/渐近परिवर्तन；ていく：远离说话者/渐远परिवर्तन"}, {"form": "〜てもらう", "diff": "てくる：自己去做回来；てもらう：请别人做某事"}], "quiz": [{"q": "最近、日本語が上手（____）。", "opts": ["A. になってくる", "B. になっていく", "C. になってある", "D. になってもらう"], "ans": "A", "exp": "जनाउँछ日语水平逐渐提高的परिवर्तन过程，用「てくる」जनाउँछ向好的दिशा发展"}, {"q": "コーヒーを（____）。", "opts": ["A. 買ってくる", "B. 買っていく", "C. 買ってある", "D. 買ってもらう"], "ans": "A", "exp": "जनाउँछ去买咖啡然后回来，用「買ってくる」जनाउँछ往返कार्य"}, {"q": "空が暗く（____）。", "opts": ["A. なっていく", "B. なってくる", "C. なってしまう", "D. なっておく"], "ans": "B", "exp": "天空逐渐变暗，जनाउँछपरिवर्तन向说话者感知दिशा发展，用「なってくる」"}]}, "7": {"analysis": "「〜てほしい」表达对他人行为的期望或愿望，कर्ता通常是第三人称或对话中的「あなた」。与「〜たい」फरक，它सक्दैनप्रयोग गरिन्छ表达自己想做的事情。这वटा文法体现了日语中明确区分自己意愿和对他人期望的语言特征。", "mistakes": "❌ 私は早く帰ってほしい。（混淆कर्ता）→ ✅ あなたに早く帰ってほしい。❌ 友達は来てほしい。（कर्ता错误）→ ✅ 友達に来てほしい。❌ 私は勉強してほしい。（自己愿望误用）→ ✅ 私は勉強したい。", "similar": [{"form": "〜たい", "diff": "〜たいजनाउँछ自己的愿望，〜てほしいजनाउँछ对他人的期望"}, {"form": "〜てください", "diff": "〜てください是礼貌的अनुरोध，〜てほしい是वटा人愿望的表达"}], "quiz": [{"q": "両親___元気でいてほしい。", "opts": ["A. が", "B. を", "C. に", "D. は"], "ans": "C", "exp": "「〜てほしい」的लक्ष्य用助詞「に」标示，जनाउँछइच्छा某人做某事"}, {"q": "私は彼___手伝ってほしい。", "opts": ["A. が", "B. を", "C. と", "D. に"], "ans": "D", "exp": "期望的लक्ष्य用「に」，जनाउँछइच्छा他来帮忙"}, {"q": "子供たち___静かにしてほしい。", "opts": ["A. は", "B. が", "C. に", "D. を"], "ans": "C", "exp": "इच्छा孩子们安静，लक्ष्य用「に」标示"}]}, "8": {"analysis": "授受表现是日语中表达「给予」和「接受」行为的重要व्याकरण，体现了日语敬语体系的核心。てあげるजनाउँछ说话者为他人做事，てくれるजनाउँछ他人为说话者做事，てもらうजनाउँछ说话者接受他人的帮助，三者构成完整的授受关系体系。", "mistakes": "❌ 先生が宿題を手伝ってあげた → ✅ 先生が宿題を手伝ってくださった（对上级सक्दैन用あげる）\n❌ 友だちに写真を撮ってもらった → ✅ 友だちが写真を撮ってくれた（कर्ता搞混）", "similar": [{"form": "〜てやる", "diff": "比あげる更随意，多प्रयोग गरिन्छ对下级或动物"}, {"form": "〜ていただく", "diff": "もらう的敬语形式，प्रयोग गरिन्छ对上级"}], "quiz": [{"q": "母が私に手紙を書いて____。", "opts": ["A. あげた", "B. くれた", "C. もらった", "D. やった"], "ans": "B", "exp": "母亲为说话者写信，应用くれるजनाउँछ他人为自己做事"}, {"q": "弟に宿題を手伝って____。", "opts": ["A. くれた", "B. もらった", "C. あげた", "D. いただいた"], "ans": "C", "exp": "说话者帮助弟弟，为他人做事用あげる"}, {"q": "先生に漢字を教えて____。", "opts": ["A. あげた", "B. やった", "C. くれた", "D. いただいた"], "ans": "D", "exp": "接受老师的教导，对上级用もらう的敬语形いただく"}]}, "9": {"analysis": "「〜やすい/にくい」是जनाउँछकार्य难易मात्रा的重要व्याकरण，将動詞的ます形去掉ます后直接接续。やすいजनाउँछ「容易做某事」，にくいजनाउँछ「难以做某事」，这种表达方式体现了日语中मार्फत形容詞化来描述कार्य特征的语言特点。需ध्यान दिनुहोस्这里描述的是客观的难易मात्रा，而非主观意愿。", "mistakes": "常见错误是接续形式混淆：❌ 読むやすい → ✅ 読みやすい；❌ 食べるにくい → ✅ 食べにくい。另外容易与〜たい（想要）混淆：❌ この本を読みたい（想读这本书）当作容易读来理解。", "similar": [{"form": "〜がたい", "diff": "がたい更जोड दिनु「难以忍受/难以接受」的情感色彩，如理解がたい（难以理解），而にくいमात्र客观描述困难मात्रा"}, {"form": "〜たい", "diff": "たいजनाउँछ主观愿望「想要做」，如食べたい（想吃），而やすい/にくいजनाउँछ客观的难易मात्रा"}], "quiz": [{"q": "この字は小さくて（　　）。", "opts": ["A. 見やすい", "B. 見にくい", "C. 見たい", "D. 見がたい"], "ans": "B", "exp": "字很小，त्यसैले「难以看清」，用見にくいजनाउँछ客观上的困难"}, {"q": "新しいペンは（　　）です。", "opts": ["A. 書くやすい", "B. 書きやすい", "C. 書くにくい", "D. 書きにくい"], "ans": "B", "exp": "新笔गर्नुपर्छ「容易写」，動詞ます形去掉ます：書きます→書き＋やすい"}, {"q": "この問題は（　　）ので、時間がかかります。", "opts": ["A. 解きやすい", "B. 解きにくい", "C. 解きたい", "D. 解くやすい"], "ans": "B", "exp": "किनभने花समय，说明问题「难解」，用解きにくい；接续是解きます→解き＋にくい"}]}, "10": {"analysis": "सम्भावना形「〜（ら）れる」जनाउँछक्षमता或सम्भावना性，बराबर हो中文的「能～」「सकिन्छ～」。一段動詞加「られる」，五段動詞将「ない形」的「ない」改为「れる」。ध्यान दिनुहोस्助詞प्रयोग：क्षमतालक्ष्य用「が」标记，而非「を」。", "mistakes": "助詞混用：❌ 辛い食べ物を食べられます → ✅ 辛い食べ物が食べられます；動詞活用错误：❌ 泳がれる → ✅ 泳げる；特殊動詞：❌ するられる → ✅ できる", "similar": [{"form": "〜ことができる", "diff": "「られる」更बोलीचाली化简洁，「ことができる」更औपचारिकलिखित"}, {"form": "〜（ら）れる（受身）", "diff": "सम्भावना形कर्ता是क्षमता者，受身形कर्ता是कार्य接受者"}], "quiz": [{"q": "日本語の本____読めますか。", "opts": ["A. を", "B. が", "C. に", "D. で"], "ans": "B", "exp": "सम्भावना形的लक्ष्य用助詞「が」标记，不用「を」"}, {"q": "昨日は忙しくて、映画を____。", "opts": ["A. 見られませんでした", "B. 見えませんでした", "C. 見ませんでした", "D. 見られました"], "ans": "A", "exp": "जनाउँछ因忙碌而没能看电影，用सम्भावना形的नकारात्मक「見られませんでした」"}, {"q": "彼は英語____話せます。", "opts": ["A. を", "B. が", "C. に", "D. と"], "ans": "B", "exp": "सम्भावना形जनाउँछक्षमता时，क्षमतालक्ष्य用「が」标记"}]}, "11": {"analysis": "受身形是日语中जनाउँछ被动语态的重要文法，बाहेक基本的被动含义外，还常用来表达受到他人行为影响的感受，包括积极和消极的情感。一段動詞在ます形基础上加られる，五段動詞在ない形基础上加れる，这种परिवर्तन规律आवश्यक熟练掌握。", "mistakes": "❌ 私は友達に手紙を書かれました。→ ✅ 私は友達に手紙を書いてもらいました。（帮助时用てもらう而非受身）❌ 雨に降られました。→ ✅ 雨に降られました。（自然现象的迷惑受身是正确的）❌ 先生に教えられます。→ ✅ 先生に教えてもらいます。（接受好意用てもらう）", "similar": [{"form": "〜てもらう", "diff": "जनाउँछ接受他人好意，कर्ता受益；受身形सम्भावनाजनाउँछ迷惑"}, {"form": "〜てくれる", "diff": "他人为说话人做某事；受身形जोड दिनुकर्ता受到行为影响"}, {"form": "〜させられる", "diff": "使役受身，被迫做某事；单纯受身是承受他人行为"}], "quiz": [{"q": "私は母に____。", "opts": ["A. 叱れました", "B. 叱られました", "C. 叱りました", "D. 叱らせました"], "ans": "B", "exp": "五段動詞「叱る」的受身形是「叱られる」，जनाउँछ被妈妈骂了"}, {"q": "弟に大切な本を____しまいました。", "opts": ["A. 破れて", "B. 破られて", "C. 破って", "D. 破らせて"], "ans": "B", "exp": "五段動詞「破る」的受身形「破られて」，जनाउँछ重要的书被弟弟撕破了，含有迷惑的语感"}, {"q": "昨日、友達に秘密を____困りました。", "opts": ["A. 話されて", "B. 話してもらって", "C. 話させて", "D. 話くれて"], "ans": "A", "exp": "一段動詞「話す」的受身形「話される」，秘密被说出去是迷惑受身的典型用法"}]}, "13": {"analysis": "「〜させてください」是使役形+てください的组合，जनाउँछ谦逊地अनुरोध对方允许自己做某事。与直接的「〜します」相比，这种表达更加礼貌，体现了日语中重视对方感受的文化特点。प्रयोग时आवश्यकध्यान दिनुहोस्動詞的使役形परिवर्तन规则。", "mistakes": "易混淆使役形परिवर्तन：❌ 食べさしてください → ✅ 食べさせてください；❌ 来らせてください → ✅ 来させてください；态度过于直接：❌ 私がやります → ✅ 私にやらせてください", "similar": [{"form": "〜していただけませんか", "diff": "させてください是अनुरोधअनुमति让自己做，していただけませんか是अनुरोध对方为自己做"}, {"form": "〜させていただきます", "diff": "させてください是अनुरोध阶段，させていただきます是已获得अनुमति后的表达"}], "quiz": [{"q": "私に荷物を（____）。", "opts": ["A. 持たせてください", "B. 持ってください", "C. 持たしてください", "D. 持たされてください"], "ans": "A", "exp": "「持つ」的使役形是「持たせる」，अनुरोध让自己拿行李用「持たせてください」"}, {"q": "すみません、質問を（____）。", "opts": ["A. 聞かしてください", "B. 聞いてください", "C. 聞かせてください", "D. 聞かれてください"], "ans": "C", "exp": "「聞く」的使役形是「聞かせる」，अनुरोध让自己提问用「聞かせてください」"}, {"q": "私に手伝わ（____）。", "opts": ["A. してください", "B. せてください", "C. させてください", "D. されてください"], "ans": "C", "exp": "「手伝う」的使役形是「手伝わせる」，अनुरोध让自己帮忙用「手伝わせてください」"}]}, "14": {"analysis": "〜させられる是使役形+受身形的复合形态，表达被强制做不愿意的事情。与单纯的使役形〜させる相比，这里的主体是被动的受害者，जोड दिनु不情愿和无奈感。", "mistakes": "❌ 私は弟に宿題をさせられた（我被弟弟强迫做作业）→ ✅ 私は母に宿題をさせられた（我被妈妈强迫做作业）。ध्यान दिनुहोस्逻辑关系，通常是地位高的人强迫地位低的人。", "similar": [{"form": "〜される（受身）", "diff": "単純受身，不जोड दिनु强迫性；させられるजोड दिनु被迫做不愿意的事"}, {"form": "〜させる（使役）", "diff": "主动让别人做；させられる是被动被强迫做"}], "quiz": [{"q": "子供の時、よく野菜を（　　）。", "opts": ["A. 食べさせた", "B. 食べさせられた", "C. 食べられた", "D. 食べした"], "ans": "B", "exp": "小时候被父母强迫吃蔬菜，用使役受身形"}, {"q": "部長に夜遅くまで（　　）。", "opts": ["A. 働かせた", "B. 働いた", "C. 働かせられた", "D. 働かれた"], "ans": "C", "exp": "被部长强迫工作到很晚，जनाउँछ不情愿"}, {"q": "雨の中を1時間も（　　）。", "opts": ["A. 待たせた", "B. 待った", "C. 待たせられた", "D. 待たれた"], "ans": "C", "exp": "被迫在雨中等待1小时，प्रयोग使役受身形表达被强迫的无奈"}]}, "15": {"analysis": "「〜ば」是जनाउँछशर्तअनुमान的重要句型，बराबर हो中文的「यदि~的话」。它जोड दिनु前项是后项成立的必要शर्त，具有较强的अनुमान性。与「〜と」फरक，「〜ば」सकिन्छप्रयोग गरिन्छ意志表现和अनुरोध，प्रयोग范围更广泛。", "mistakes": "❌ 雨が降るば、家にいます → ✅ 雨が降れば、家にいます（動詞要用ば形）；❌ 元気ば、何でもできます → ✅ 元気であれば、何でもできます（な形容詞需加「であれ」）；❌ 早いば、間に合います → ✅ 早ければ、間に合います（い形容詞变「ければ」）", "similar": [{"form": "〜と", "diff": "「と」जनाउँछ自然नतिजा，सक्दैनप्रयोग गरिन्छ意志表现；「ば」可प्रयोग गरिन्छ意志和अनुरोध"}, {"form": "〜たら", "diff": "「たら」偏重समय顺序，「ば」偏重शर्त关系"}, {"form": "〜なら", "diff": "「なら」जोड दिनु话题前提，「ば」जोड दिनुशर्तअनुमान"}], "quiz": [{"q": "時間が（____）、映画を見に行きましょう。", "opts": ["A. あると", "B. あれば", "C. あったら", "D. あるなら"], "ans": "B", "exp": "जनाउँछशर्तअनुमान「यदि有समय的话」，動詞「ある」的ば形是「あれば」"}, {"q": "この薬を飲め（____）、すぐによくなります。", "opts": ["A. ば", "B. れば", "C. ならば", "D. たら"], "ans": "A", "exp": "動詞「飲む」的आदेश形「飲め」后直接加「ば」，जनाउँछशर्त"}, {"q": "天気が（____）、ピクニックに行きます。", "opts": ["A. いいと", "B. いいば", "C. よければ", "D. いいなら"], "ans": "C", "exp": "い形容詞「いい」的ば形是「よければ」，जनाउँछ「यदि天气好的话」"}]}, "16": {"analysis": "「〜たら」जनाउँछ完成某वटाकार्य后的शर्त或假定，जोड दिनु前项कार्य完成后再进行后项कार्य。与中文'~了पछि'或'यदि~'相似，但日语更जोड दिनुसमय的先后顺序和कार्य的完成性。", "mistakes": "सामान्य गल्तीहरू：时态混用和语序错误。❌ 宿題を終わるたら、遊びに行きます → ✅ 宿題が終わったら、遊びに行きます（अनिवार्य用た形）；❌ たら雨が降る、家にいます → ✅ 雨が降ったら、家にいます（语序要正确）", "similar": [{"form": "〜てから", "diff": "「〜てから」纯粹जनाउँछसमय顺序'~पछि'，「〜たら」还可जनाउँछ假定शर्त'यदि~'"}, {"form": "〜と", "diff": "「〜と」जनाउँछ客观必然नतिजा，「〜たら」可जनाउँछ主观意志或计划"}, {"form": "〜ば", "diff": "「〜ば」多प्रयोग गरिन्छ假定शर्त，「〜たら」既可假定也可जनाउँछ完成后的实际行动"}], "quiz": [{"q": "春になったら、桜を____に行きましょう。", "opts": ["A. 見る", "B. 見", "C. 見に", "D. 見て"], "ans": "C", "exp": "「見に行く」是固定搭配，जनाउँछ'去看'的उद्देश्य，用「見に」"}, {"q": "お金が____、新しい車を買います。", "opts": ["A. あるたら", "B. あったら", "C. ありたら", "D. あるなら"], "ans": "B", "exp": "「ある」的た形是「あった」，त्यसैले是「あったら」"}, {"q": "映画が____、感想を教えてください。", "opts": ["A. 終わるたら", "B. 終わってから", "C. 終わったら", "D. 終わると"], "ans": "C", "exp": "जनाउँछ电影结束后的शर्त，用「終わったら」最自然"}]}, "18": {"analysis": "「〜そうだ（様態）」は視覚的印象に基づく推測を表す文法で、話し手が目で見た情報から判断する際にप्रयोगします。動詞のます形や形容詞の語幹にजोडाइし、「見た感じでは〜だろう」というअर्थを表現します。この文法は主観的な印象を述べるため、実際の状態とは異なる場合もあります。", "mistakes": "❌ この本は難しいそうです → ✅ この本は難しそうです（い形容詞は語幹＋そうだ）\n❌ 雨が降るそうです → ✅ 雨が降りそうです（動詞はます形＋そうだ）\n❌ 元気そうだ → ✅ 元気そうだ（な形容詞は語幹のみ）", "similar": [{"form": "〜そうだ（伝聞）", "diff": "様態は見た目の判断、伝聞は他人から聞いた情報"}, {"form": "〜ようだ", "diff": "そうだは直接的な視覚印象、ようだはより推測的で間接的"}], "quiz": [{"q": "あの子は泣き____。", "opts": ["A. そうです", "B. ましそうです", "C. そうだった", "D. たそうです"], "ans": "A", "exp": "動詞「泣く」のます形「泣き」＋そうですが正解"}, {"q": "この問題は____そうですね。", "opts": ["A. 簡単い", "B. 簡単", "C. 簡単な", "D. 簡単に"], "ans": "B", "exp": "な形容詞「簡単」は語幹のみ＋そうだ"}, {"q": "空が暗くなって、雨が____。", "opts": ["A. 降るそうです", "B. 降りそうです", "C. 降りましそうです", "D. 降そうです"], "ans": "B", "exp": "動詞「降る」のます形「降り」＋そうですで見た目の判断を表す"}]}, "19": {"analysis": "伝聞の「そうだ」は他人から聞いた情報を伝える表現で、情報源を明示しない間接的な伝達方法です。普通形に直接जोडाइし、話し手が直接確認していない事実や噂を表現する際にप्रयोगします。", "mistakes": "❌ 明日雨が降りそうです（様態の「そうだ」と混同）→ ✅ 明日雨が降るそうです（伝聞）/ ❌ 田中さんは病気だそうでした → ✅ 田中さんは病気だったそうです", "similar": [{"form": "〜そうだ（様態）", "diff": "伝聞は普通形जोडाइで他人からの情報、様態は形容詞語幹・動詞ます形जोडाइで外見からの推測"}, {"form": "〜ということだ", "diff": "より硬い表現で書き言葉的、「そうだ」は日常会話でよくप्रयोग"}], "quiz": [{"q": "田中さんは来月結婚____。", "opts": ["A. するそうです", "B. しそうです", "C. するということです", "D. するらしいです"], "ans": "A", "exp": "伝聞の「そうだ」は普通形にजोडाइ。「しそう」は様態、他もसम्भावनाだが最も自然"}, {"q": "この店の料理は____。", "opts": ["A. おいしそうです", "B. おいしいそうです", "C. おいしいようです", "D. おいしいみたいです"], "ans": "B", "exp": "伝聞表現なら「おいしいそうです」。「おいしそう」は見た目からの判断（様態）"}, {"q": "昨日の会議は____。", "opts": ["A. 長そうでした", "B. 長いそうでした", "C. 長かったそうです", "D. 長くそうでした"], "ans": "C", "exp": "過去の伝聞は「過去形＋そうです」の形。「そうでした」は使わない"}]}, "20": {"analysis": "〜ようだ/みたいだ都जनाउँछअनुमान或比喻，但接续方式फरक：ようだ接普通形，みたいだ接名詞和形容詞词干。两者在बोलीचाली中みたいだ更常用，लिखित语中ようだ更औपचारिक。", "mistakes": "❌雨が降るみたいです → ✅雨が降るようです（動詞接ようだ）; ❌子供ようだ → ✅子供みたいだ（名詞接みたいだ）; ❌静かようだ → ✅静かなようだ（な形容詞要加な）", "similar": [{"form": "〜そうだ", "diff": "そうだजनाउँछ外观印象，ようだ/みたいだ可表अनुमान和比喻"}, {"form": "〜らしい", "diff": "らしい基于传闻信息，ようだ/みたいだ基于直观判断"}], "quiz": [{"q": "彼女は学生____。", "opts": ["A.ようだ", "B.みたいだ", "C.そうだ", "D.らしい"], "ans": "B", "exp": "名詞「学生」后面用みたいだ"}, {"q": "雨が降り____ですね。", "opts": ["A.そう", "B.みたい", "C.よう", "D.らしい"], "ans": "C", "exp": "動詞普通形后接ようです"}, {"q": "この料理は美味し____です。", "opts": ["A.そう", "B.みたい", "C.よう", "D.いよう"], "ans": "C", "exp": "い形容詞去い接ようです"}]}, "21": {"analysis": "「らしい」जनाउँछ基于某种客观证据或信息的अनुमान，与「そうだ」的भिन्नता在于更जोड दिनु有具体अनुसार。另外，「らしい」还可जनाउँछ典型特征，如「男らしい」（有男子气概），此时不是अनुमान而是评价。", "mistakes": "❌ 雨が降るらしそうです → ✅ 雨が降るらしいです（सक्दैन与そう重复प्रयोग）\n❌ 彼は学生らしくない → ✅ 彼は学生らしくありません（नकारात्मक形用ありません）", "similar": [{"form": "〜そうだ", "diff": "そうだ基于视觉印象अनुमान，らしい基于听到的信息或证据अनुमान"}, {"form": "〜ようだ", "diff": "ようだ是说话人的主观判断，らしい更客观，基于外部信息"}], "quiz": [{"q": "田中さんは今日会社を休む____。", "opts": ["A. らしいです", "B. らしそうです", "C. らしくです", "D. らしいそうです"], "ans": "A", "exp": "らしいजनाउँछ基于信息的अनुमान，直接用らしいです"}, {"q": "彼女は本当に先生____。", "opts": ["A. らしそうです", "B. らしいです", "C. らしくありません", "D. らしいありません"], "ans": "B", "exp": "らしいजनाउँछ符合典型特征，सकारात्मक形用らしいです"}, {"q": "この子は子供____。", "opts": ["A. らしいです", "B. らしくないです", "C. らしくありません", "D. らしそうじゃありません"], "ans": "C", "exp": "जनाउँछ不符合典型特征时，नकारात्मक形用らしくありません"}]}, "23": {"analysis": "「かもしれない」जनाउँछ说话人对某种情况的不确定अनुमान，सम्भावना性约为50%左右。与中文「也许、सम्भावना」相似，但更偏重于主观的不确定感。接续时動詞、形容詞、名詞都用普通形，但な形容詞和名詞要去掉「だ」。", "mistakes": "❌ 雨だかもしれない → ✅ 雨かもしれない（名詞直接接续，不要「だ」）\n❌ きれいだかもしれない → ✅ きれいかもしれない（な形容詞去掉「だ」）\n❌ かもしれないです → ✅ かもしれません（敬语形式）", "similar": [{"form": "〜でしょう", "diff": "でしょうजनाउँछ较确信的अनुमान（70-80%），かもしれないजनाउँछ不确定的अनुमान（50%左右）"}, {"form": "〜と思う", "diff": "と思うजनाउँछवटा人主观想法，かもしれないजोड दिनुसम्भावना性的不确定"}], "quiz": [{"q": "田中さんは今日来ない____。", "opts": ["A. かもしれない", "B. かもしれません", "C. でしょう", "D. と思います"], "ans": "B", "exp": "敬语场合用「かもしれません」，जनाउँछ不确定的अनुमान"}, {"q": "この映画は面白い____。", "opts": ["A. だかもしれない", "B. かもしれません", "C. かもしれない", "D. のかもしれない"], "ans": "C", "exp": "い形容詞直接接「かもしれない」，不आवश्यक「だ」"}, {"q": "彼は学生____。", "opts": ["A. だかもしれない", "B. かもしれない", "C. でしょう", "D. かもしれません"], "ans": "B", "exp": "名詞接「かもしれない」时要去掉「だ」，直接接续"}]}, "24": {"analysis": "「〜はずだ」जनाउँछ基于客观事实或合理推理得出的确信判断，जोड दिनु说话人有充分अनुसार相信某事गर्नुपर्छ如此。与अनुमान表现फरक，它带有强烈的确信色彩，常प्रयोग गरिन्छ对已知信息的逻辑推断。", "mistakes": "सामान्य गल्तीहरू：与अनुमान混淆。❌明日は雨が降るはずです（仅凭天气预报）→ ✅明日は雨が降るでしょう；❌彼は来るはずです（无अनुसार期待）→ ✅彼は約束したから、来るはずです", "similar": [{"form": "〜でしょう", "diff": "でしょうजनाउँछअनुमान，はずだजनाउँछ有अनुसार的确信"}, {"form": "〜に違いない", "diff": "に違いない更जोड दिनु断定，はずだजोड दिनु合理性"}], "quiz": [{"q": "彼は日本に5年住んでいるから、日本語が____。", "opts": ["A.上手なはずです", "B.上手でしょう", "C.上手かもしれません", "D.上手になります"], "ans": "A", "exp": "基于5年居住अनुभव这वटा客观事实，有अनुसार地判断日语गर्नुपर्छ很好"}, {"q": "電車は10分前に出たから、もう____。", "opts": ["A.着くでしょう", "B.着いているはずです", "C.着くかもしれません", "D.着きます"], "ans": "B", "exp": "基于电车已发车10分钟这वटा事实，有अनुसार地确信गर्नुपर्छपहिलेनै到达"}, {"q": "田中さんはいつも早く来るのに、今日は遅いですね。何か____。", "opts": ["A.あったはずです", "B.あるはずです", "C.あったでしょう", "D.あるでしょう"], "ans": "B", "exp": "基于平时早到但今天迟到这वटा反常现象，推断वर्तमानगर्नुपर्छ有什么事情"}]}, "25": {"analysis": "「〜に違いない」जनाउँछ说话者基于某种अनुसार或状况，对事实进行强烈的अनुमान和断定，बराबर हो中文的「一定是」「सकारात्मक」。与单纯的अनुमानफरक，这वटा句型带有很强的确信度，几乎等同于断言。常प्रयोग गरिन्छ对客观事实的推断，而非主观愿望。", "mistakes": "❌ 雨が降るに違いありません（过度敬语）→ ✅ 雨が降るに違いない（固定形式不परिवर्तन）\n❌ 彼は学生に違いないでしょう（重复अनुमान）→ ✅ 彼は学生に違いない\n❌ 行くに違いない（意志表现）→ ✅ 彼は行くに違いない（客观推断）", "similar": [{"form": "〜はずだ", "diff": "「はずだ」是基于常理的अनुमान，「に違いない」是基于证据的强烈确信"}, {"form": "〜だろう/でしょう", "diff": "जनाउँछ不确定的अनुमान，确信度比「に違いない」低很多"}], "quiz": [{"q": "あの人は日本人____。日本語がとても上手だから。", "opts": ["A. に違いない", "B. はずだ", "C. だろう", "D. かもしれない"], "ans": "A", "exp": "基于「日语很好」这वटा证据，说话者强烈确信对方是日本人，用「に違いない」最合适"}, {"q": "この問題は難し____。誰も答えられないから。", "opts": ["A. いでしょう", "B. いに違いない", "C. いはずだ", "D. いと思う"], "ans": "B", "exp": "形容詞い形式+に違いない，基于「谁都答不出来」这वटा事实进行强烈断定"}, {"q": "彼は忙し____。最近全然会えないから。", "opts": ["A. いに違いない", "B. いでしょう", "C. いと思います", "D. いようです"], "ans": "A", "exp": "基于「最近पूर्ण见不到面」这वटा现象，强烈推断他很忙，प्रयोग「に違いない」"}]}, "26": {"analysis": "「〜こと」是形式名詞，प्रयोग गरिन्छ将動詞名詞化，使其能充当वाक्य的कर्ता或宾语。与中文फरक，日语अनिवार्यमार्फत「こと」将動詞转换成名詞性质才能को रूपमाकर्ताप्रयोग。这वटा用法在表达बानी、क्षमता、अनुभव等抽象概念时极为重要。", "mistakes": "易混淆「こと」与「の」的用法。❌ 本を読むのが好きです（गर्नुपर्छ用のजनाउँछ具体行为）→ ✅ 本を読むことが好きです（抽象的喜好）。❌ 泳ぐことを見ました（具体कार्य用の）→ ✅ 泳ぐのを見ました。", "similar": [{"form": "〜の（準体助詞）", "diff": "「の」प्रयोग गरिन्छ具体可见的行为，「こと」प्रयोग गरिन्छ抽象概念和सामान्यतया性叙述"}, {"form": "〜とき", "diff": "「とき」जनाउँछसमय点，「こと」जनाउँछ事情本身"}], "quiz": [{"q": "毎朝ジョギング____が健康にいいです。", "opts": ["A. する", "B. すること", "C. するの", "D. した"], "ans": "B", "exp": "表达सामान्यतया性的抽象概念时用「すること」"}, {"q": "彼女が歌____を聞きました。", "opts": ["A. うこと", "B. うの", "C. って", "D. った"], "ans": "B", "exp": "具体可见的行为用「の」，这里是听到具体的歌声"}, {"q": "日本語を勉強____は楽しいです。", "opts": ["A. する", "B. すること", "C. するの", "D. している"], "ans": "B", "exp": "学习日语这件事（抽象概念）很有趣，用「すること」"}]}, "27": {"analysis": "「〜の」是形式名詞「こと」的बोलीचाली化表达，प्रयोग गरिन्छ将動詞名詞化。相比「こと」更显亲近自然，常प्रयोग गरिन्छ日常会话中表达喜好、क्षमता、अनुभव等。接续时動詞保持辞书形，后接助詞が/を/は等。", "mistakes": "❌ 音楽を聴くことが好きです（过于औपचारिक）→ ✅ 音楽を聴くのが好きです（自然बोलीचाली）\n❌ 泳ぐのを上手です → ✅ 泳ぐのが上手です（用が不用を）\n❌ 読書するのは好きです → ✅ 本を読むのが好きです（避免サ变動詞+する的重复感）", "similar": [{"form": "〜こと", "diff": "こと更औपचारिकलिखित，の更बोलीचाली自然"}, {"form": "〜の（所有格）", "diff": "所有格表归属，形式名詞の表कार्य名詞化"}], "quiz": [{"q": "映画を（____）が好きです。", "opts": ["A. 見る", "B. 見るの", "C. 見ること", "D. 見るに"], "ans": "B", "exp": "動詞辞书形+のजनाउँछकार्य的名詞化，बोलीचाली中常用"}, {"q": "日本語を勉強する（____）は大変です。", "opts": ["A. の", "B. こと", "C. が", "D. を"], "ans": "A", "exp": "句尾用です时，の和こと都सकिन्छ，但の更बोलीचाली化"}, {"q": "料理を作る（____）上手ですね。", "opts": ["A. のを", "B. のに", "C. のが", "D. のは"], "ans": "C", "exp": "जनाउँछक्षमता或अवस्था时，用「〜のが+形容詞」的句型"}]}, "28": {"analysis": "「〜ために」是N4重要文法，जनाउँछउद्देश्य或कारण。作उद्देश्य时बराबर हो中文「को लागि」，作कारण时बराबर हो「किनभने/由于」。आवश्यकअनुसारसन्दर्भ判断是उद्देश्य还是कारण用法。", "mistakes": "सामान्य गल्तीहरू：उद्देश्य和कारण用法混淆。❌雨のために、散歩に行きました。→ ✅雨のために、散歩に行けませんでした。（कारण用法गर्नुपर्छ是消极नतिजा）", "similar": [{"form": "〜ように", "diff": "ために表直接उद्देश्य，ように表期望的अवस्थापरिवर्तन"}, {"form": "〜ので", "diff": "ために可表उद्देश्य和कारण，ので只表कारण且更客观"}], "quiz": [{"q": "日本語を勉強____、日本に行きました。", "opts": ["A.するために", "B.したために", "C.しているために", "D.してために"], "ans": "A", "exp": "उद्देश्य用法用辞書形，「勉強するために」जनाउँछ「को लागि学习」"}, {"q": "事故____、電車が遅れました。", "opts": ["A.するために", "B.したために", "C.のために", "D.をために"], "ans": "C", "diff": "名詞+のために表原因，「事故のために」表示「因为事故」"}, {"q": "試験に合格____、一生懸命勉強しています。", "opts": ["A.したために", "B.するために", "C.しているために", "D.のために"], "ans": "B", "exp": "उद्देश्य用法，「合格するために」जनाउँछ「को लागि合格」这一उद्देश्य"}]}, "29": {"analysis": "「〜ように」是N4重要文法，जनाउँछ三种用法：①उद्देश्य（को लागि达到某种नतिजा）②样态（像某种अवस्था一样）③指示（要求做到某种मात्रा）。与「〜ために」फरक，「ように」后接的動詞通常是无意志動詞或सम्भावना形，जोड दिनु自然发生的अवस्था或नतिजा。", "mistakes": "❌ 合格するように、勉強したいです → ✅ 合格するために、勉強したいです（表उद्देश्य用ために）❌ 静かなように話してください → ✅ 静かに話してください（副詞修饰用に）❌ 忘れるようにしないでください → ✅ 忘れないようにしてください（नकारात्मक形接续）", "similar": [{"form": "〜ために", "diff": "ために表主观उद्देश्य，ように表客观नतिजा或अवस्था"}, {"form": "〜みたいに", "diff": "みたいに更बोलीचाली化，मुख्य表比喻样态"}, {"form": "〜そうに", "diff": "そうに表看起来的样子，ように表实际的方式"}], "quiz": [{"q": "風邪を____、気をつけてください。", "opts": ["A.ひかないように", "B.ひかないために", "C.ひかないそうに", "D.ひかないみたいに"], "ans": "A", "exp": "जनाउँछको लागि不感冒的उद्देश्य，用「ひかないように」"}, {"q": "子供が____、静かに話しましょう。", "opts": ["A.起きるために", "B.起きないように", "C.起きそうに", "D.起きるみたいに"], "ans": "B", "exp": "को लागि不吵醒孩子，用「起きないように」表उद्देश्य"}, {"q": "彼は鳥____自由に空を飛んでいる。", "opts": ["A.のように", "B.のために", "C.らしく", "D.について"], "ans": "A", "exp": "जनाउँछ像鸟一样的样态，用「のように」"}]}, "30": {"analysis": "「〜ようになる」जनाउँछमार्फत某种परिवर्तन过程，获得了अघि没有的क्षमता或अवस्था。与瞬间性的「できる」फरक，它जोड दिनु渐进的परिवर्तन过程。常与「練習して」「慣れて」等जनाउँछ过程的词语搭配प्रयोग。", "mistakes": "❌ 昨日からピアノが弾けるようになりました → ✅ 練習して、ピアノが弾けるようになりました（आवश्यक体现परिवर्तन过程，不是突然获得क्षमता）", "similar": [{"form": "〜ことができる", "diff": "जनाउँछवर्तमान的क्षमताअवस्था，不जोड दिनुपरिवर्तन过程"}, {"form": "〜ようにする", "diff": "जनाउँछ有意识的努力或决心，主观意志性强"}], "quiz": [{"q": "毎日練習して、やっと自転車に（____）ようになりました。", "opts": ["A. 乗る", "B. 乗れる", "C. 乗って", "D. 乗った"], "ans": "B", "exp": "जनाउँछ获得क्षमता用सम्भावना形＋ようになる"}, {"q": "子供の頃は野菜が嫌いでしたが、今は（____）ようになりました。", "opts": ["A. 食べない", "B. 食べる", "C. 食べられる", "D. 食べて"], "ans": "C", "exp": "从不喜欢到能吃，जनाउँछक्षमतापरिवर्तन用सम्भावना形"}, {"q": "日本に来てから、箸を上手に（____）ようになりました。", "opts": ["A. 使う", "B. 使える", "C. 使って", "D. 使った"], "ans": "A", "exp": "「上手に使う」本身就जनाउँछक्षमता，直接用辞書形即可"}]}, "31": {"analysis": "「〜ようにする」जनाउँछ说话人有意识地努力做某事，जोड दिनु主观意志和持续性努力。与单纯的「〜する」फरक，它含有「努力去做」「ध्यान दिनुहोस्做」的语感，常प्रयोग गरिन्छ表达好बानी的养成或坏बानी的改正。", "mistakes": "सामान्य गल्तीहरू：与「〜ようになる」混淆。❌毎日運動するようになります → ✅毎日運動するようにします（जनाउँछ自己的努力意志）；❌早く寝ないようになる → ✅早く寝ないようにする（जनाउँछ努力不晚睡）", "similar": [{"form": "〜ようになる", "diff": "「ようになる」जनाउँछ自然परिवर्तन或क्षमता获得，无主观意志；「ようにする」जनाउँछ有意识的努力"}, {"form": "〜ことにする", "diff": "「ことにする」जनाउँछ决定做某事，一次性决定；「ようにする」जनाउँछ持续性的努力बानी"}], "quiz": [{"q": "健康のために、お酒を____。", "opts": ["A. 飲まないようにする", "B. 飲まないようになる", "C. 飲まないことになる", "D. 飲まないはずだ"], "ans": "A", "exp": "जनाउँछको लागि健康而努力不喝酒，是主观意志的体现，用「ようにする」"}, {"q": "子供の頃は野菜が嫌いでしたが、今は食べられる____。", "opts": ["A. ようにする", "B. ようになりました", "C. ことにしました", "D. はずです"], "ans": "B", "exp": "जनाउँछक्षमता或अवस्था的自然परिवर्तन，从सक्दैन吃到能吃，用「ようになる」"}, {"q": "医者に言われて、塩分を少なく____。", "opts": ["A. するようになった", "B. することになった", "C. するようにしている", "D. するはずだった"], "ans": "C", "exp": "जनाउँछ听从医生सुझाव，努力减少盐分摄取，是持续性的努力行为"}]}, "32": {"analysis": "「〜すぎる」जनाउँछमात्रा过度，超出正常范围，通常带有负面含义。動詞接续时去掉「ます」，形容詞去掉「い」或「な」后直接加「すぎる」。该文法जोड दिनु的是「过头了」的概念，暗示这种过度अवस्था会带来不良后果。", "mistakes": "❌ 美味しいすぎる → ✅ 美味しすぎる（い形容詞去掉い）\n❌ 静かなすぎる → ✅ 静かすぎる（な形容詞去掉な）\n❌ 勉強しますすぎる → ✅ 勉強しすぎる（動詞去掉ます）", "similar": [{"form": "〜とても/すごく", "diff": "とてもजनाउँछमात्रा很高但不过度，すぎるजोड दिनु超出正常限度"}, {"form": "〜ばかり", "diff": "ばかりजनाउँछ只做某事，すぎるजनाउँछ做得过度"}, {"form": "あまり〜", "diff": "あまりप्रयोग गरिन्छनकारात्मक句जनाउँछ不太，すぎるप्रयोग गरिन्छसकारात्मक句जनाउँछ过于"}], "quiz": [{"q": "昨日は勉強____、今日は頭が痛いです。", "opts": ["A. しすぎて", "B. しますすぎて", "C. するすぎて", "D. すぎて"], "ans": "A", "exp": "動詞「勉強します」去掉「ます」变成「勉強し」，再加「すぎて」"}, {"q": "この料理は辛____、食べられません。", "opts": ["A. いすぎて", "B. すぎて", "C. くすぎて", "D. なすぎて"], "ans": "B", "exp": "い形容詞「辛い」去掉「い」变成「辛」，再加「すぎて」"}, {"q": "部屋が____、窓を開けました。", "opts": ["A. 暖かいすぎるから", "B. 暖かなすぎるから", "C. 暖かすぎるから", "D. 暖かくすぎるから"], "ans": "C", "exp": "い形容詞「暖かい」去掉「い」加「すぎる」变成「暖かすぎる」"}]}, "33": {"analysis": "「〜し〜し」是N4重要的并列助詞，प्रयोग गरिन्छ列举多वटा理由或शर्त，जोड दिनु这些因素都成立。与「〜て〜て」फरक，「し」更जोड दिनु理由性，常प्रयोग गरिन्छ说明判断或决定的अनुसार。语气तुलना随意，多प्रयोग गरिन्छबोलीचाली。", "mistakes": "❌ 彼は優しいだし、頭もいいだし → ✅ 彼は優しいし、頭もいいし（「だし」是重复，直接用「し」）❌ 雨が降るし、寒いし、だから家にいます → ✅ 雨も降るし、寒いし、家にいます（避免「だから」重复表达因果关系）", "similar": [{"form": "〜て〜て", "diff": "「て」जनाउँछकार्य的连续或अवस्था的并列，「し」更जोड दिनु列举理由"}, {"form": "〜から〜から", "diff": "「から」明确जनाउँछ因果关系，「し」语气更轻松，理由性稍弱"}], "quiz": [{"q": "今日は時間もない（____）、お金もない（____）、映画は見られない。", "opts": ["A. し、し", "B. て、て", "C. から、から", "D. けど、けど"], "ans": "A", "exp": "列举两वटा理由说明सक्दैन看电影，用「し」最自然"}, {"q": "この町は静か（____）、空気もきれい（____）、住みやすいです。", "opts": ["A. だから、だから", "B. し、し", "C. ので、ので", "D. けれど、けれど"], "ans": "B", "exp": "并列列举这वटा町的优点，用「し」जनाउँछ多वटा积极因素"}, {"q": "彼女は料理も上手（____）、歌も上手（____）、本当にすごいですね。", "opts": ["A. で、で", "B. だし、だし", "C. し、し", "D. な、な"], "ans": "C", "exp": "形容動詞词干后直接加「し」，不आवश्यक「だ」"}]}, "34": {"analysis": "〜てもजनाउँछ逆接让步，पनि前项शर्त成立，后项नतिजा也不会改变。与中文'पनि...也...'पूर्ण对应，是表达坚定意志或客观事实不受शर्त影响的重要句型。動詞用て形+も，い形容詞去い+くても，な形容詞/名詞+でも。", "mistakes": "时态混用：❌明日雨が降ったても行きます → ✅明日雨が降っても行きます；形容詞接续错误：❌高いても買います → ✅高くても買います；な形容詞接续：❌静かても勉強できません → ✅静かでも勉強できません", "similar": [{"form": "〜けれど/けど", "diff": "けれどजनाउँछ轻微对比转折，てもजनाउँछ强烈让步，语气更坚决"}, {"form": "〜のに", "diff": "のにजनाउँछ意外的逆接नतिजा，てもजनाउँछ预设शर्त下的坚持"}], "quiz": [{"q": "どんなに忙し（____）、家族との時間を大切にします。", "opts": ["A.ても", "B.くても", "C.でも", "D.ので"], "ans": "B", "exp": "い形容詞忙しい去い+くても，जनाउँछपनि再忙也要珍惜家庭समय"}, {"q": "彼は病気（____）、毎日会社に来ています。", "opts": ["A.ても", "B.くても", "C.でも", "D.だから"], "ans": "C", "exp": "な形容詞/名詞病気+でも，जनाउँछपनि生病也每天来公司"}, {"q": "いくら説明し（____）、彼は理解してくれません。", "opts": ["A.ても", "B.くても", "C.でも", "D.たら"], "ans": "A", "exp": "動詞説明するのて形+も，जनाउँछचाहे怎么解释他都不理解"}]}, "35": {"analysis": "「〜のに」जनाउँछ期待与现实的落差，带有说话者的不满或意外情绪。与「〜けれど」等单纯逆接फरक，「のに」जोड दिनुनतिजा与预期相反的遗憾心情。接续时，い形容詞和な形容詞词干直接加「のに」，動詞和名詞用普通形。", "mistakes": "时态混用：❌明日雨が降るのに、ピクニックに行きます → ✅明日雨が降るのに、ピクニックに行くつもりです（表达不满时应保持时态一致）；敬语误用：❌先生が来られたのに、誰もいません → ✅先生が来たのに、誰もいません（のに前不用敬语）", "similar": [{"form": "〜けれど", "diff": "けれど是中性逆接，のに带有不满情绪"}, {"form": "〜ても", "diff": "てもजनाउँछअनुमान让步，のにजनाउँछ既成事实的逆接"}, {"form": "〜くせに", "diff": "くせに含有轻蔑批判，のに是不满遗憾"}], "quiz": [{"q": "高い薬を飲んだ____、病気が治らない。", "opts": ["A. のに", "B. ので", "C. から", "D. けれど"], "ans": "A", "exp": "जनाउँछ期待落空的不满情绪，用「のに」最恰当"}, {"q": "彼は約束した____、来なかった。", "opts": ["A. ので", "B. のに", "C. のは", "D. のを"], "ans": "B", "exp": "约定了却没来，表达说话者的不满，用「のに」"}, {"q": "天気がいい____、外に出たくない。", "opts": ["A. のに", "B. ので", "C. ために", "D. ように"], "ans": "A", "exp": "天气好却不想出门，जनाउँछ与常理相反的情况，用「のに」"}]}, "36": {"analysis": "「〜間に」जनाउँछ在某वटासमय段内发生कार्य，जोड दिनुसमय的界限性。「間に」后接瞬间कार्य，「間」后接持续अवस्था。与中文「在...期间」相似，但日语更注重कार्य的完结性。", "mistakes": "सामान्य गल्तीहरू：समय表达混淆。❌ 勉強している間に、音楽を聞きます → ✅ 勉強している間、音楽を聞きます（持续अवस्था用「間」）❌ 休憩の間、コーヒーを飲みました → ✅ 休憩の間に、コーヒーを飲みました（瞬间कार्य用「間に」）", "similar": [{"form": "〜うちに", "diff": "「うちに」जोड दिनु趁某अवस्था还存在时行动，带有紧迫感；「間に」是中性的समय表达"}, {"form": "〜時に", "diff": "「時に」जनाउँछ具体时刻，「間に」जनाउँछसमय段"}], "quiz": [{"q": "母が買い物に行っている____、掃除をしました。", "opts": ["A. 間に", "B. 間", "C. 時に", "D. うちに"], "ans": "A", "exp": "瞬间完成的「掃除」कार्य在持续अवस्था中发生，用「間に」"}, {"q": "会議の____、ずっと資料を読んでいました。", "opts": ["A. 間に", "B. 間", "C. 時", "D. 頃"], "ans": "B", "exp": "持续अवस्था「読んでいる」在समय段内进行，用「間」"}, {"q": "子供が寝ている____に、仕事を終わらせたいです。", "opts": ["A. 間", "B. 時", "C. 間に", "D. 頃に"], "ans": "C", "exp": "趁孩子睡觉的समय段内完成工作这वटाकार्य，用「間に」"}]}, "37": {"analysis": "「〜前に」和「〜後で」是जनाउँछसमय顺序的重要文法，前者用動詞辞书形，后者用動詞た形。ध्यान दिनुहोस्「前に」后面常用助詞「に」，而「後で」用「で」，这是किनभने「前に」जनाउँछसमय点，「後で」जनाउँछसमय段或अवस्था。", "mistakes": "सामान्य गल्तीहरू：❌ 寝た前に、歯を磨きます → ✅ 寝る前に、歯を磨きます（前に前面用辞书形）；❌ 食べる後で、薬を飲みます → ✅ 食べた後で、薬を飲みます（後で前面用た形）", "similar": [{"form": "〜てから", "diff": "〜てからजोड दिनु前一कार्य完成后才进行后一कार्य，而〜た後でमात्र单纯जनाउँछसमय先后"}, {"form": "〜ときに", "diff": "〜ときにजनाउँछ某वटासमय点发生的事，不जोड दिनु先后顺序关系"}], "quiz": [{"q": "学校に行く____、朝ごはんを食べます。", "opts": ["A. 前に", "B. 後で", "C. 前で", "D. 後に"], "ans": "A", "exp": "去学校अघि吃早饭，जनाउँछ先后顺序，用「前に」"}, {"q": "宿題を____、テレビを見ました。", "opts": ["A. する前に", "B. する後で", "C. した前に", "D. した後で"], "ans": "D", "exp": "做完作业后看电视，「後で」前面用動詞た形"}, {"q": "映画を見る____、ポップコーンを買いましょう。", "opts": ["A. 前に", "B. 後で", "C. 前で", "D. 後に"], "ans": "A", "exp": "看电影अघि买爆米花，जनाउँछ先买后看的顺序"}]}, "38": {"analysis": "「〜時」是जनाउँछसमय关系的重要文法，प्रयोग गरिन्छ描述某वटाकार्य或अवस्था发生的समय点。与中文「的时候」相对应，但日语中सकिन्छ省略助詞「に」。आवश्यकध्यान दिनुहोस्動詞时态的呼应关系。", "mistakes": "❌ 困る時は、遠慮なく言ってください → ✅ 困った時は、遠慮なく言ってください（应प्रयोगभूतकाल形जनाउँछ假定状况）", "similar": [{"form": "〜とき vs 〜ながら", "diff": "〜時是समय点，〜ながらजनाउँछ同时进行的两वटाकार्य"}, {"form": "〜時 vs 〜間", "diff": "〜時जनाउँछसमय点，〜間जनाउँछ持续的समय段"}], "quiz": [{"q": "日本に____時、桜がきれいでした。", "opts": ["A. 行く", "B. 行った", "C. 行って", "D. 行き"], "ans": "B", "exp": "भूतकाल的具体अनुभव用भूतकाल形，जनाउँछ「去日本的时候」"}, {"q": "暇な____、本を読みます。", "opts": ["A. 時に", "B. 時で", "C. 時を", "D. 時は"], "ans": "A", "exp": "形容詞词干+な+時に，जनाउँछ「空闲的时候」"}, {"q": "子供の____、よく公園で遊びました。", "opts": ["A. 時に", "B. 時で", "C. 時が", "D. 時から"], "ans": "A", "exp": "名詞+の+時に，जनाउँछ「小时候」的बानी性कार्य"}]}, "39": {"analysis": "「〜ていただけますか」是敬语表达，जनाउँछ对对方的礼貌अनुरोध。相比「〜てください」更加谦逊客气，适प्रयोग गरिन्छ对长辈、客户、初次见面的人等आवश्यकजनाउँछ敬意的场合。这वटा文法体现了日语敬语中「谦让语」的特点，मार्फत降低自己的立场来提升对方的地位。", "mistakes": "易混淆敬语等级：❌「すみません、手伝ってください」（对上级太直接）→ ✅「恐れ入りますが、お手伝いいただけますか」；时态错误：❌「昨日来ていただけますか」→ ✅「明日来ていただけますか」（अनुरोधप्रयोग गरिन्छभविष्यकाल行为）", "similar": [{"form": "〜てください", "diff": "普通敬语，「いただけますか」更谦逊客气"}, {"form": "〜てもらえますか", "diff": "普通语体，「いただけますか」是敬语体"}, {"form": "〜ていただきたいのですが", "diff": "更加委婉间接的表达方式"}], "quiz": [{"q": "すみません、このかばんを____いただけますか。", "opts": ["A.持って", "B.持つ", "C.持った", "D.持ち"], "ans": "A", "exp": "「いただけますか」前面用動詞て形，「持つ」的て形是「持って」"}, {"q": "会議に____いただけますか。", "opts": ["A.出席して", "B.出席を", "C.出席に", "D.出席が"], "ans": "A", "exp": "「出席する」的て形是「出席して」，构成「出席していただけますか」"}, {"q": "明日____いただけますか。", "opts": ["A.来る", "B.来て", "C.来た", "D.来ます"], "ans": "B", "exp": "「来る」的て形是「来て」，प्रयोग गरिन्छ构成敬语अनुरोध表达"}]}, "40": {"analysis": "お〜になる/ご〜になる是日语中最基础的尊敬语表现形式，用来जनाउँछ对方或第三者的कार्य，体现说话者的敬意。「お」多प्रयोग गरिन्छ和语词汇，「ご」多प्रयोग गरिन्छ汉语词汇，这种敬语形式在商务场合和日常礼貌用语中प्रयोग频率极高。", "mistakes": "सामान्य गल्तीहरू：词汇选择和सन्दर्भप्रयोग。❌ 私はお帰りになります → ✅ 私は帰ります（सक्दैन对自己प्रयोग尊敬语）；❌ ご来店になる → ✅ お越しになる（部分词汇有固定搭配）；❌ お食べになる → ✅ 召し上がる（「食べる」的尊敬语是特殊形式）", "similar": [{"form": "〜れる/られる（尊敬）", "diff": "お〜になる更加郑重，多प्रयोग गरिन्छऔपचारिक场合；れる/られる较为简洁，日常对话中常用"}, {"form": "いらっしゃる", "diff": "いらっしゃる是「いる・来る・行く」的特殊尊敬语，而お〜になる适用范围更广"}], "quiz": [{"q": "部長はもう____。", "opts": ["A. お帰りです", "B. お帰りになりました", "C. 帰りになりました", "D. 帰られました"], "ans": "B", "exp": "「お帰りになる」是「帰る」的正确尊敬语形式，भूतकाल时用「になりました」"}, {"q": "お客様は何を____ますか。", "opts": ["A. お飲みに", "B. 飲まれ", "C. 召し上がり", "D. お飲みになり"], "ans": "C", "exp": "「飲む」的尊敬语是「召し上がる」，不用お〜になる的形式"}, {"q": "田中さんは____いらっしゃいますか。", "opts": ["A. お元気で", "B. 元気に", "C. お元気に", "D. 元気で"], "ans": "A", "exp": "「元気」前加「お」जनाउँछ尊敬，「元気でいる」的敬语是「お元気でいらっしゃる」"}]}, "41": {"analysis": "お〜する/ご〜する是日语谦让语的基本形式，जन orm": "〜です", "diff": "普通礼貌语，日常会话प्रयोग"}, {"form": "〜であります", "diff": "军队、警察等特殊场合的敬语"}, {"form": "〜いらっしゃいます", "diff": "对他人行为的尊敬语表达"}], "quiz": [{"q": "店员对客人说「いらっしゃいませ。何か____」", "opts": ["A. お探しですか", "B. お探しございますか", "C. お探しでございますか", "D. 探していますか"], "ans": "C", "exp": "对客人प्रयोग最高敬语「でございます」जनाउँछ礼貌，询问是否在寻找什么商品"}, {"q": "接待员自我介绍：「私、受付の山田____」", "opts": ["A. です", "B. であります", "C. でございます", "D. だ"], "ans": "C", "exp": "接待场合自我介绍时प्रयोग「でございます」जनाउँछ谦逊和礼貌"}, {"q": "客服回应客人感谢：「____。またお越しください。」", "opts": ["A. どういたしまして", "B. とんでもございません", "C. いえいえ", "D. 大丈夫です"], "ans": "B", "exp": "「とんでもございません」是「とんでもない」的最高敬语形式，प्रयोग गरिन्छ谦逊地回应感谢"}]}, "44": {"analysis": "「〜ほど」是जनाउँछमात्रा或比喻的重要句型，有两种मुख्य用法：①单独प्रयोग时जनाउँछ「到了某种मात्रा」，常प्रयोग गरिन्छ夸张表达；②「〜ば〜ほど」形式जनाउँछ「越...越...」的比例关系。需ध्यान दिनुहोस्区分其मात्रा表达和比例表达的फरकसन्दर्भ。", "mistakes": "❌ 彼は天才ほど賢いです → ✅ 彼は天才ほど賢くはありません（नकारात्मक形更自然）/ ❌ 勉強すればするほど、頭がよくなります → ✅ 勉強すればするほど、成績がよくなります（逻辑更合理）", "similar": [{"form": "〜くらい/〜ぐらい", "diff": "「ほど」多प्रयोग गरिन्छ夸张表达和比例关系；「くらい」更多जनाउँछ大概的मात्रा"}, {"form": "〜につれて", "diff": "「につれて」जोड दिनु伴随परिवर्तन；「〜ば〜ほど」जोड दिनु比例递增关系"}], "quiz": [{"q": "昨日は（____）忙しくて、昼ご飯を食べる時間もありませんでした。", "opts": ["A. 死ぬほど", "B. 死ぬくらい", "C. 死ぬまで", "D. 死ぬばかり"], "ans": "A", "exp": "जनाउँछमात्रा极高的夸张表达，「死ぬほど」最适合"}, {"q": "練習すれば（____）、上手になります。", "opts": ["A. するたび", "B. するほど", "C. するばかり", "D. するまま"], "ans": "B", "exp": "「〜ば〜ほど」जनाउँछ「越...越...」的比例关系"}, {"q": "彼女の歌声は天使の声（____）美しい。", "opts": ["A. ほど", "B. まで", "C. ばかり", "D. だけ"], "ans": "A", "exp": "「〜ほど」प्रयोग गरिन्छ比喻表达，जनाउँछ达到某种मात्रा"}]}, "45": {"analysis": "「だけ」是N4重要助詞，जनाउँछ限定范围或मात्रा。可接名詞、動詞辞书形等，常与「で」搭配प्रयोग。需区分限定用法（只有）和मात्रा用法（...的मात्रा）两种含义。", "mistakes": "❌ 私だけが行きます → ✅ 私だけ行きます（限定时不आवश्यक「が」）\n❌ できるだけで頑張ります → ✅ できるだけ頑張ります（मात्रा表达时通常不加「で」）", "similar": [{"form": "〜しか", "diff": "「しか」अनिवार्य与नकारात्मक形搭配，「だけ」可用सकारात्मक形"}, {"form": "〜ばかり", "diff": "「ばかり」जोड दिनु大致数量，「だけ」जोड दिनु精确限定"}], "quiz": [{"q": "お金は1000円____持っていません。", "opts": ["A.だけ", "B.しか", "C.ばかり", "D.など"], "ans": "B",  "〜て間もない", "diff": "「て間もない」更औपचारिक，多प्रयोग गरिन्छलिखित语，「たばかり」更बोलीचाली化"}], "quiz": [{"q": "彼は大学を____。", "opts": ["A. 卒業するばかりだ", "B. 卒業したばかりだ", "C. 卒業ばかりだ", "D. 卒業のばかりだ"], "ans": "B", "exp": "「たばかり」अनिवार्य接在動詞た形后面，जनाउँछ刚刚完成的कार्य"}, {"q": "赤ちゃんが____、まだ歩けません。", "opts": ["A. 生まれたばかりで", "B. 生まれるばかりで", "C. 生まれているばかりで", "D. 生まればかりで"], "ans": "A", "exp": "जनाउँछ「刚出生」用「生まれたばかり」，でजनाउँछकारण"}, {"q": "この本を____から、まだよくわかりません。", "opts": ["A. 読むばかり", "B. 読んでいるばかり", "C. 読んだばかり", "D. 読みばかり"], "ans": "C", "exp": "「読んだばかり」जनाउँछ刚读完，与后句「还不太懂」形成逻辑关系"}]}, "54": {"analysis": "这三वटा文法是動詞复合形式，जनाउँछकार्य的开始、结束和持续अवस्था。接续时आवश्यक将前面的動詞变为ます形后去掉ます，再加上始める/終わる/続ける。这类复合動詞在日语中प्रयोग频率很高，是表达कार्यअवस्थापरिवर्तन的重要व्याकरण点。", "mistakes": "सामान्य गल्तीहरू：❌雨が降る始めました → ✅雨が降り始めました（अनिवार्य用ます形去掉ます）；❌本を読んで続けます → ✅本を読み続けます（सक्दैन用て形）；❌勉強が終わりました → ✅勉強を終わりました（ध्यान दिनुहोस्助詞प्रयोग）", "similar": [{"form": "〜出す", "diff": "出すजोड दिनु突然开始的कार्य，始めるजोड दिनुकार्य的开端过程"}, {"form": "〜ている", "diff": "ているजनाउँछ持续अवस्था，続けるजोड दिनु有意识地持续进行"}], "quiz": [{"q": "彼は昨日から日本語を（____）。", "opts": ["A. 習い始めました", "B. 習う始めました", "C. 習って始めました", "D. 習い出しました"], "ans": "A", "exp": "動詞复合形आवश्यक用ます形去掉ます+始める的形式"}, {"q": "やっと宿題を（____）。", "opts": ["A. し終わります", "B. して終わります", "C. 終わりました", "D. し終わりました"], "ans": "D", "exp": "する的ます形是します，去掉ます后是し，त्यसैले是し終わりました"}, {"q": "毎日運動を（____）います。", "opts": ["A. し続け", "B. して続け", "C. 続き", "D. 続けて"], "ans": "A", "exp": "続ける是一段動詞，ています形式是し続けています"}]}, "55": {"analysis": "〜でも具有双重功能：①例示用法जनाउँछ「~之类的」，暗示还有其他选择，语气较随意；②让步用法जनाउँछ「就算~也」，जोड दिनुपनि在某种情况下也成立。与疑問詞结合时多जनाउँछ全面性，如「何でも」「誰でも」。", "mistakes": "❌ 何かでも食べましょう（redundant） → ✅ 何でも食べます（疑問詞+でも直接连接）; ❌ 雨が降ってもでも行きます → ✅ 雨でも行きます（不与ても重复प्रयोग）", "similar": [{"form": "〜ても", "diff": "でも更随意，例示性强；ても更औपचारिक，शर्त性强"}, {"form": "〜など", "diff": "でもबोलीचाली化，带主观选择；などलिखित语，客观列举"}, {"form": "〜とか", "diff": "でも单一例示；とか多项列举"}], "quiz": [{"q": "今日は暑いですね。冷たいもの____飲みませんか。", "opts": ["A. でも", "B. ても", "C. など", "D. から"], "ans": "A", "exp": "例示用法，जनाउँछ「冷饮之类的」，でも最自然"}, {"q": "彼は子供____知っている簡単な問題です。", "opts": ["A. ても", "B. でも", "C. など", "D. とか"], "ans": "B", "exp": "让步用法，जनाउँछ「就算是孩子也知道」"}, {"q": "時間がないので、サンドイッチ____買って食べよう。", "opts": ["A. など", "B. とか", "C. でも", "D. ても"], "ans": "C", "exp": "例示用法，जनाउँछ随意选择「三明治之类的」"}]}, "56": {"analysis": "「〜かどうか」是जनाउँछ间接疑问的重要句型，प्रयोग गरिन्छ表达不确定或询问某事是否成立。与直接疑问句फरक，它将疑问内容嵌入到陈述句中，常与「わからない」「知らない」等जनाउँछ不确定的词汇搭配प्रयोग。", "mistakes": "सामान्य गल्तीहरू：❌彼は来るですかどうかわからない → ✅彼は来るかどうかわからない（普通形接续，不用です/ます形）；❌雨が降るかどうかですか → ✅雨が降るかどうかわかりますか（间接疑问不直接用ですか）", "similar": [{"form": "〜か", "diff": "「〜か」可जनाउँछ直接疑问，「〜かどうか」专门जनाउँछ间接疑问的是否"}, {"form": "〜かもしれない", "diff": "「〜かもしれない」जनाउँछअनुमानसम्भावना性，「〜かどうか」जनाउँछ不确定是否"}], "quiz": [{"q": "田中さんが明日____、まだ分からない。", "opts": ["A. 来ますかどうか", "B. 来るかどうか", "C. 来るのかどうか", "D. 来ることかどうか"], "ans": "B", "exp": "「〜かどうか」前接普通形，त्यसैले用「来る」"}, {"q": "この薬が効く____試してみます。", "opts": ["A. かどうか", "B. かどうかを", "C. かどうかが", "D. かどうかに"], "ans": "A", "exp": "「〜かどうか」后面直接接動詞，不आवश्यक助詞"}, {"q": "彼女が本当のことを言っている____疑問だ。", "opts": ["A. かどうかは", "B. かどうかが", "C. かどうかを", "D. かどうか"], "ans": "A", "exp": "को रूपमा主题时用「かどうかは」，जनाउँछ「是否~这一点」"}]}, "57": {"analysis": "「という」是N4核心व्याकरण，प्रयोग गरिन्छ定义、引用或传达信息。它将前面的内容को रूपमा后面名詞的说明或定义，बराबर हो中文的「叫做」「名为」「所谓的」。常प्रयोग गरिन्छ介绍新概念、引用他人话语或传达听到的信息。", "mistakes": "❌ 私は田中という人を知っています。（语序错误）→ ✅ 私は田中という人を知っています。; ❌ 明日雨が降るといういう天気予報です。（重复という）→ ✅ 明日雨が降るという天気予報です。; ❌ 彼は学生というです。（缺少名詞）→ ✅ 彼は学生という人です。", "similar": [{"form": "〜といった", "diff": "という是特定指称，といったजनाउँछ列举同类事物"}, {"form": "〜と言われている", "diff": "という直接引用定义，と言われているजनाउँछ传闻或सामान्यतया认知"}], "quiz": [{"q": "「寿司」____、日本の伝統的な料理です。", "opts": ["A. という", "B. といった", "C. というのは", "D. ということは"], "ans": "C", "exp": "定义说明用「というのは」，जोड दिनु「寿司」这वटा概念的定义"}, {"q": "田中____先生に会ったことがありますか。", "opts": ["A. という", "B. といった", "C. というのは", "D. ということ"], "ans": "A", "exp": "「田中という先生」指名叫田中的老师，用という连接人名和身份"}, {"q": "彼は明日来ない____話を聞きました。", "opts": ["A. という", "B. といった", "C. というのは", "D. ということ"], "ans": "A", "exp": "传达听到的内容用「という話」，जनाउँछ听说的消息"}]}, "58": {"analysis": "「まで」जनाउँछकार्य持续的终点，बराबर हो中文的\"到...为止\"；「までに」जनाउँछ截止期限，बराबर हो\"在...अघि\"。关键भिन्नता在于「まで」जोड दिनु持续性，「までに」जोड दिनु完成时限。", "mistakes": "❌ 5時まで来てください → ✅ 5時までに来てください（约定समय用までに）\n❌ 昨日までに働きました → ✅ 昨日まで働きました（持续कार्य用まで）", "similar": [{"form": "〜から〜まで", "diff": "जनाउँछ从起点到终点的完整समय段，まで单独प्रयोग时只表终点"}, {"form": "〜前に", "diff": "前に仅表\"अघि\"，までに含有截止期限的紧迫感"}], "quiz": [{"q": "会議は3時____始まります。", "opts": ["A. まで", "B. までに", "C. から", "D. で"], "ans": "C", "exp": "जनाउँछ开始समय用「から」，3时开始会议"}, {"q": "レポートを来週の金曜日____出してください。", "opts": ["A. まで", "B. までに", "C. から", "D. に"], "ans": "B", "exp": "提交截止期限用「までに」，在周五अघि提交"}, {"q": "図書館は夜9時____開いています。", "opts": ["A. まで", "B. までに", "C. から", "D. で"], "ans": "A", "exp": "जनाउँछ营业持续到9点为止，用「まで」"}]}, "59": {"analysis": "「〜ように言う」是जनाउँछ间接आदेश或अनुरोध传达的重要句型。与直接आदेश「〜なさい」फरक，这वटा句型更委婉地传达他人的要求或指示。常प्रयोग गरिन्छ第三人称转述场景，体现了日语中重视礼貌和间接表达的特点。", "mistakes": "易混淆直接आदेश与间接传达：❌ 先生は「静かにしなさい」と言いました → ✅ 先生は静かにするように言いました（间接传达更自然）；时态错配：❌ 母は早く寝るように言っています → ✅ 母は早く寝るように言いました（भूतकाल的传达用भूतकाल时）", "similar": [{"form": "〜と言う", "diff": "直接引用原话，「〜ように言う」是间接传达आदेशअनुरोध"}, {"form": "〜てください", "diff": "直接अनुरोध，「〜ように言う」是转述他人的अनुरोध"}], "quiz": [{"q": "医者は薬を____ように言いました。", "opts": ["A.飲む", "B.飲んで", "C.飲み", "D.飲んだ"], "ans": "A", "exp": "「〜ように言う」前接動詞辞書形，जनाउँछ间接传达आदेश"}, {"q": "母は私に野菜を____ように言います。", "opts": ["A.食べない", "B.食べなくない", "C.食べる", "D.食べて"], "ans": "C", "exp": "सकारात्मक的间接आदेश用辞書形＋ように言う"}, {"q": "先生は学生に宿題を____ように言いました。", "opts": ["A.忘れる", "B.忘れない", "C.忘れて", "D.忘れた"], "ans": "B", "exp": "नकारात्मक的间接आदेश用ない形＋ように言う，जनाउँछ「不要忘记」"}]}, "60": {"analysis": "んです是のです的缩约形，प्रयोग गरिन्छ解释说明现状、जोड दिनु理由或为后续话题做铺垫。与单纯陈述फरक，它带有「向对方说明情况」的语感，使表达更加委婉自然。んですが则在此基础上增加了转折或अनुरोध的预备性质。", "mistakes": "सामान्य गल्तीहरू：❌今日は暑いんですね → ✅今日は暑いですね（感叹不用んです）；❌彼は学生なんです → ✅彼は学生なんです（な形容詞去な加んです）", "similar": [{"form": "〜ています", "diff": "ています表अवस्था持续，んです表解释说明"}, {"form": "〜でしょう", "diff": "でしょう表अनुमान，んです表确定的解释"}], "quiz": [{"q": "A：どうして遅れましたか。B：電車が遅れた____。", "opts": ["A.です", "B.んです", "C.でしょう", "D.ました"], "ans": "B", "exp": "解释迟到的理由，用んです表说明"}, {"q": "明日パーティーがある____、来ませんか。", "opts": ["A.んです", "B.んですが", "C.です", "D.ですが"], "ans": "B", "exp": "んですがप्रयोग गरिन्छ邀请前的情况说明铺垫"}, {"q": "この料理はとても____んです。", "opts": ["A.おいしい", "B.おいしいな", "C.おいしく", "D.おいしかった"], "ans": "A", "exp": "い形容詞直接加んです，表जोड दिनु说明"}]}, "61": {"analysis": "「〜と思っている」जनाउँछ说话人持续性的想法、意图或信念，जोड दिनु这种想法从भूतकाल开始一直延续到वर्तमान。与「〜と思う」的瞬间判断फरक，「〜と思っている」体现了思考अवस्था的持续性。当接续意向形时जनाउँछ持续的打算，接续普通形时जनाउँछ持续的看法或信念。", "mistakes": "❌ 明日映画を見ると思っています → ✅ 明日映画を見ようと思っています（表意图用意向形）\n❌ 彼はいい人と思う → ✅ 彼はいい人だと思っている（持续看法用ている形）\n❌ 来年留学すると思っている → ✅ 来年留学しようと思っている（自己意图用意向形）", "similar": [{"form": "〜と思う", "diff": "瞬间的判断或想法，不जोड दिनु持续性"}, {"form": "〜つもりだ", "diff": "更强烈的意志和决心，बराबर हो'打定主意'"}, {"form": "〜ようと考えている", "diff": "更औपचारिक的表达，多प्रयोग गरिन्छलिखित语"}], "quiz": [{"q": "私は来月____。", "opts": ["A. 結婚すると思っている", "B. 結婚しようと思っている", "C. 結婚するつもりと思っている", "D. 結婚することと思っている"], "ans": "B", "exp": "जनाउँछ自己的意图时，用意向形＋と思っている"}, {"q": "田中さんは____人だと思っています。", "opts": ["A. やさしい", "B. やさしく", "C. やさしかった", "D. やさしくて"], "ans": "A", "exp": "形容詞的普通形接续と思っている，जनाउँछ持续的看法"}, {"q": "彼女は____。", "opts": ["A. 医者になると思っている", "B. 医者になろうと思っている", "C. 医者になるつもりと思っている", "D. 医者になることと思っている"], "ans": "B", "exp": "जनाउँछ第三人称的意图时也用意向形＋と思っている"}]}, "62": {"analysis": "「〜てほしい」表达对他人行为的愿望或期待，是自己इच्छा别人做某事的表现。与「〜たい」फरक，这वटा文法专门प्रयोग गरिन्छ表达对他人的期望，सक्दैनप्रयोग गरिन्छ自己想做的事情。प्रयोग时ध्यान दिनुहोस्लक्ष्य用「に」标记，体现了日语中他动性的व्याकरण特征。", "mistakes": "❌ 私は勉強してほしいです → ✅ 私は彼に勉強してほしいです（अनिवार्य有明确的期望लक्ष्य）\n❌ 母が料理したいです → ✅ 母に料理してほしいです（期望他人做某事用てほしい）\n❌ 友達を手伝ってほしいです → ✅ 友達に手伝ってほしいです（लक्ष्य标记用に，不用を）", "similar": [{"form": "〜たい", "diff": "たい表达自己的愿望，てほしい表达对他人的期望"}, {"form": "〜てもらいたい", "diff": "てもらいたい更加敬语化，てほしい较为直接"}, {"form": "〜てください", "diff": "てください是अनुरोध，てほしい是愿望表达"}], "quiz": [{"q": "私は弟に宿題を____。", "opts": ["A. してほしいです", "B. したいです", "C. してくださいです", "D. してもらいます"], "ans": "A", "exp": "表达इच्छा弟弟做作业的愿望，用「してほしい」"}, {"q": "田中さん____もっと頑張ってほしいと思います。", "opts": ["A. を", "B. が", "C. に", "D. で"], "ans": "C", "exp": "期望的लक्ष्य用助詞「に」来标记"}, {"q": "友達____一緒に映画を見てほしいです。", "opts": ["A. が", "B. に", "C. を", "D. と"], "ans": "B", "exp": "表达इच्छा朋友一起看电影，期望लक्ष्य用「に」"}]}, "63": {"analysis": "「〜ているところだ」は動作の進行状態を強調する文法で、「今まさに」のニュアンスを含む。単純な「〜ている」より具体的な時点での動作を表現し、話し手の「今この瞬間」という意識が強く反映される。", "mistakes": "❌今、勉強するところです。→ ✅今、勉強しているところです。（進行中は「ている」をप्रयोग）❌昨日、映画を見ているところでした。→ ✅昨日、映画を見ていたところでした。（過去は「ていた」）", "similar": [{"form": "〜ている", "diff": "「ところだ」は「今まさに」の強調があり、より具体的な時点を示す"}, {"form": "〜最中だ（さいちゅうだ）", "diff": "「最中」はより改まった表現で、長時間の動作にप्रयोगされる傾向"}], "quiz": [{"q": "すみません、今食事を（____）ところです。", "opts": ["A. する", "B. した", "C. している", "D. していた"], "ans": "C", "exp": "進行中の動作なので「ている」をप्रयोग"}, {"q": "電話がかかってきた時、ちょうど宿題を（____）ところでした。", "opts": ["A. する", "B. している", "C. していた", "D. した"], "ans": "C", "exp": "過去の進行状態なので「ていた」をप्रयोग"}, {"q": "今、友達を（____）ところです。", "opts": ["A. 待つ", "B. 待った", "C. 待っている", "D. 待っていた"], "ans": "C", "exp": "現在進行中の動作を表すので「待っている」が正解"}]}, "64": {"analysis": "「〜がする」是जनाउँछ感官感受的重要文法，मुख्यप्रयोग गरिन्छ描述嗅觉、听觉、味觉等感知体验。此句型的特点是कर्ताअनिवार्य是感官相关的名詞（におい、音、味、気等），動詞「する」在此处不是「做」的अर्थ，而是「感受到、散发出」的含义。与中文「有...的感觉/散发...」相对应，是日语中描述感官体验的固定表达方式。", "mistakes": "❌ このケーキは甘い味をします（这वटा蛋糕有甜味）→ ✅ このケーキは甘い味がします。助詞अनिवार्य用「が」सक्दैन用「を」。❌ 花がいいにおいをしています → ✅ 花からいいにおいがします。जनाउँछ来源时आवश्यक用「から」。", "similar": [{"form": "〜ている", "diff": "「〜ている」जनाउँछअवस्था持续，而「〜がする」专门प्रयोग गरिन्छ感官感受，सक्दैन互换"}, {"form": "〜を感じる", "diff": "「感じる」आवश्यक人作कर्ता主动感受，「〜がする」是客观描述感官现象"}], "quiz": [{"q": "隣の部屋から変な音（____）。", "opts": ["A.をします", "B.がします", "C.にします", "D.でします"], "ans": "B", "exp": "感官動詞「する」前अनिवार्य用助詞「が」，जनाउँछ听到奇怪的声音"}, {"q": "この料理は（____）味がしますね。", "opts": ["A.から", "B.しょっぱい", "C.しょっぱく", "D.しょっぱいな"], "ans": "B", "exp": "「味がする」前आवश्यक用い形容詞修饰，「しょっぱい」जनाउँछ咸味"}, {"q": "ガスの（____）がしませんか。", "opts": ["A.音", "B.味", "C.におい", "D.気持ち"], "ans": "C", "exp": "ガス（煤气）通常用嗅觉感知，त्यसैले用「におい」（气味）最合适"}]}, "65": {"analysis": "「〜場合は」是जनाउँछ假定शर्त或特定情况的句型，多प्रयोग गरिन्छऔपचारिक场合和लिखित语。与「〜時」फरक，「場合」जोड दिनु的是某种状况或शर्त的设定，而非समय点。常प्रयोग गरिन्छ规则说明、ध्यान दिनुहोस्事项等औपचारिक文体中。", "mistakes": "❌ 雨が降る場合は、傘を持って行く。→ ✅ 雨が降った場合は、傘を持って行く。（应प्रयोगभूतकाल式जनाउँछ假定शर्त）\n❌ 病気場合は、休んでください。→ ✅ 病気の場合は、休んでください。（名詞后आवश्यक加の）", "similar": [{"form": "〜時は", "diff": "「時」जनाउँछसमय点，「場合」जनाउँछशर्त或状况"}, {"form": "〜なら", "diff": "「なら」更बोलीचाली化，「場合は」更औपचारिक"}, {"form": "〜ば", "diff": "「ば」是सामान्यतयाशर्त句，「場合は」जोड दिनु特定情况"}], "quiz": [{"q": "火事の____は、すぐに119番に電話してください。", "opts": ["A. 時", "B. 場合", "C. とき", "D. 間"], "ans": "B", "exp": "जनाउँछ紧急情况的शर्त设定，用「場合」最适合"}, {"q": "分からない____は、先生に聞いてください。", "opts": ["A. 場合に", "B. 場合を", "C. 場合は", "D. 場合が"], "ans": "C", "exp": "जनाउँछशर्त时用「場合は」，助詞はजनाउँछ主题सुझाव"}, {"q": "この薬は、____場合は服用しないでください。", "opts": ["A. 妊娠する", "B. 妊娠した", "C. 妊娠している", "D. 妊娠の"], "ans": "C", "exp": "जनाउँछ持续अवस्था的शर्त，用「〜ている」形最恰当"}]}, "66": {"analysis": "「〜というのは」प्रयोग गरिन्छ定义或解释概念，बराबर हो中文的「所谓…是…」。常प्रयोग गरिन्छऔपचारिक场合或学术सन्दर्भ中，对专业术语、概念进行客观说明。句型结构为「A というのは B ということだ/である」，其中A是被定义的लक्ष्य，B是定义内容。", "mistakes": "❌「侘び寂び」ということは日本独自の美意識です。→ ✅「侘び寂び」というのは日本独自の美意識です。（定义句अनिवार्य用「というのは」而非「ということは」）❌ 愛というのを大切なभावनाです。→ ✅ 愛というのは大切なभावनाです。（助詞अनिवार्य用「は」）", "similar": [{"form": "〜ということは", "diff": "जनाउँछअनुमान判断「这अर्थ着…」，而非定义说明"}, {"form": "〜とは", "diff": "更简洁的定义表达，「というのは」更औपचारिक详细"}, {"form": "〜って", "diff": "बोलीचाली化的解释，非औपचारिक场合प्रयोग"}], "quiz": [{"q": "「環境問題」____地球全体に関わる大きな課題のことです。", "opts": ["A. ということは", "B. というのは", "C. といえば", "D. について"], "ans": "B", "exp": "定义「环境问题」这वटा概念，गर्नुपर्छप्रयोग「というのは」"}, {"q": "「おもてなし」というのは日本の____精神です。", "opts": ["A. 伝統的な", "B. 伝統的", "C. 伝統", "D. 伝統の"], "ans": "A", "exp": "修饰名詞「精神」आवश्यक形容動詞的连体形「伝統的な」"}, {"q": "彼が遅刻したということ____、電車が遅れたからでしょう。", "opts": ["A. というのは", "B. は", "C. を", "D. が"], "ans": "B", "exp": "这里是अनुमानकारण，不是定义，त्यसैले用「は」而不是「というのは」"}]}, "67": {"analysis": "「〜に対して」是जनाउँछलक्ष्य、दिशा或对比的重要文法，常प्रयोग गरिन्छऔपचारिक场合。它既सकिन्छजनाउँछकार्य的लक्ष्य（针对某人/某事），也सकिन्छजनाउँछ对比关系（相को लागि）。与「〜について」相比，「に対して」更जोड दिनु明确的目标性和对立性。", "mistakes": "❌ 友達に対して話しました → ✅ 友達と話しました（朋友间用「と」，不用「に対して」）\n❌ この問題について対して考える → ✅ この問題について考える 或 この問題に対して考える（सक्दैन重复प्रयोग）", "similar": [{"form": "〜について", "diff": "「について」仅जनाउँछ话题，「に対して」还含有对立、针对的अर्थ"}, {"form": "〜に向けて", "diff": "「に向けて」जोड दिनुदिशा性，「に対して」更जोड दिनुलक्ष्य性和对比性"}], "quiz": [{"q": "政府の政策（____）国民が反対している。", "opts": ["A. について", "B. に対して", "C. に向けて", "D. によって"], "ans": "B", "exp": "जनाउँछ针对政府政策的反对，用「に対して」जनाउँछलक्ष्य"}, {"q": "先生は学生の質問（____）親切に答えてくれた。", "opts": ["A. に対して", "B. について", "C. に向かって", "D. に関して"], "ans": "A", "exp": "「質問に対して答える」是固定搭配，जनाउँछ针对问题回答"}, {"q": "日本の人口は中国（____）少ない。", "opts": ["A. について", "B. によって", "C. に対して", "D. に関して"], "ans": "C", "exp": "जनाउँछ与中国相तुलना，用「に対して」जनाउँछ对比关系"}]}, "68": {"analysis": "「〜に気がつく/気づく」जनाउँछ无意识中自然发现或意识到某事，जोड दिनु发现的自然性和突然性。与中文'ध्यान दिनुहोस्到'、'发现'相对应，但更जोड दिनु非主观刻意的察觉过程。", "mistakes": "सामान्य गल्तीहरू：❌ 財布を忘れることに気がつきました → ✅ 財布を忘れたことに気がつきました（भूतकाल的事实用た形）；❌ 雨が降ることに気がつく → ✅ 雨が降っていることに気がつく（进行अवस्था用ている形）", "similar": [{"form": "〜に気をつける", "diff": "気をつける是主观的ध्यान दिनुहोस्、小心；気がつく是客观的发现、察觉"}, {"form": "〜を見つける", "diff": "見つけるजोड दिनु视觉上的找到；気がつくसकिन्छ是各种感官的察觉"}], "quiz": [{"q": "彼が来ない____に気がつきました。", "opts": ["A. こと", "B. の", "C. と", "D. を"], "ans": "A", "exp": "普通形＋ことに気がつく的固定搭配"}, {"q": "間違い____気がついて、すぐに直しました。", "opts": ["A. を", "B. が", "C. に", "D. と"], "ans": "C", "exp": "気がつく后面接助詞に，जनाउँछ发现的लक्ष्य"}, {"q": "友達が____ことに気がつきませんでした。", "opts": ["A. 泣く", "B. 泣いた", "C. 泣いている", "D. 泣こう"], "ans": "C", "exp": "जनाउँछ当时朋友正在哭这वटाअवस्था，用ている形"}]}, "69": {"analysis": "「〜によると」是जनाउँछ信息来源的文法，प्रयोग गरिन्छ引用从某处获得的信息。常与「〜そうだ」「〜とのことだ」等传闻表现搭配प्रयोग，जनाउँछ所说内容并非亲身经历而是从他处得知的信息。", "mistakes": "सामान्य गल्तीहरू：❌ 友達によると、彼は来ます → ✅ 友達によると、彼は来るそうです（अनिवार्य用传闻表现）；❌ テレビによると見ました → ✅ テレビによると見たそうです（时态错误）", "similar": [{"form": "〜によれば", "diff": "अर्थपूर्ण相同，但「によれば」更औपचारिक，多प्रयोग गरिन्छलिखित语"}, {"form": "〜によって", "diff": "जनाउँछ手段方法或कारण，不是引用信息来源"}], "quiz": [{"q": "ニュース（____）、地震があったそうです。", "opts": ["A. によって", "B. によると", "C. について", "D. に対して"], "ans": "B", "exp": "引用新闻को रूपमा信息来源，用「によると」"}, {"q": "先生（____）、明日テストがあるとのことです。", "opts": ["A. によると", "B. によって", "C. に関して", "D. として"], "ans": "A", "exp": "引用老师的话को रूपमा信息来源，用「によると」"}, {"q": "新聞（____）、新しい法律ができる（____）。", "opts": ["A. によると・です", "B. によって・そうです", "C. によると・そうです", "D. について・そうです"], "ans": "C", "exp": "「によると」引用信息源，अनिवार्य搭配传闻表现「そうです」"}]}, "70": {"analysis": "「〜に慣れる」जनाउँछ经过一段समय的接触和练习后，对某种环境、बानी或行为变得熟悉和适应。这是一वटा渐进性的过程，जोड दिनु从不बानी到बानी的अवस्थापरिवर्तन。与中文「बानी」फरक，日语更जोड दिनु适应的过程性。", "mistakes": "सामान्य गल्तीहरू：動詞接续时忘记加「こと」。❌ 早く起きるに慣れました → ✅ 早く起きることに慣れました（बानी了早起）。另外容易与「〜を慣らす」（使~बानी）混淆。", "similar": [{"form": "〜を慣らす", "diff": "他動詞，जनाउँछ「使某人/某物बानी」，如「子供を早寝に慣らす」"}, {"form": "〜ようになる", "diff": "जनाउँछक्षमता或अवस्था的परिवर्तन，如「日本語が話せるようになった」"}], "quiz": [{"q": "毎日残業____慣れてしまいました。", "opts": ["A. を", "B. に", "C. が", "D. で"], "ans": "B", "exp": "「慣れる」は「〜に慣れる」の形で使い、慣れる対象を「に」で表す"}, {"q": "一人で住む____慣れるまで時間がかかりました。", "opts": ["A. ことに", "B. のに", "C. ように", "D. ために"], "ans": "A", "exp": "動詞＋ことに慣れる の形。「住むことに慣れる」が正しい"}, {"q": "この会社の____にもう慣れました。", "opts": ["A. 働くこと", "B. 雰囲気", "C. 忙しいの", "D. 仕事する"], "ans": "B", "exp": "名詞の場合は直接「に」にजोडाइ。「雰囲気に慣れる」が自然"}]}, "71": {"analysis": "「〜まま」जनाउँछ保持某种अवस्था不变，जोड दिनु在不改变当前अवस्था的情况下进行某वटाकार्य。与中文「就这样」「保持...अवस्था」相对应。接续时，動詞た形जनाउँछ已完成कार्य后保持该अवस्था，ない形जनाउँछ保持未做某事的अवस्था，名詞直接加まま。", "mistakes": "易混淆「まま」与「ながら」的用法。❌コーヒーを飲みながら、寝ました。→ ✅コーヒーを飲んだまま、寝ました。（喝着咖啡就睡了）❌電気をつけないで、勉強しています。→ ✅電気をつけないまま、勉強しています。（不开灯就在学习）", "similar": [{"form": "〜ながら", "diff": "ながらजनाउँछ同时进行两वटाकार्य，ままजनाउँछ保持某अवस्था不变"}, {"form": "〜たまま", "diff": "たままजोड दिनुकार्य完成后अवस्था的持续，单独のまま可接名詞"}], "quiz": [{"q": "電気を（____）寝てしまいました。", "opts": ["A.つけたまま", "B.つけながら", "C.つけてから", "D.つけても"], "ans": "A", "exp": "「つけたまま」जनाउँछ开着电灯的अवस्था下睡觉，符合ままजनाउँछअवस्था维持的用法"}, {"q": "子供の（____）大人になりました。", "opts": ["A.ときまま", "B.間まま", "C.ころまま", "D.頃のまま"], "ans": "D", "exp": "「子供の頃のまま」जनाउँछ保持着孩童时期的样子，名詞＋のまま的用法"}, {"q": "宿題を（____）学校に来ました。", "opts": ["A.しながら", "B.しないまま", "C.しなくて", "D.しないで"], "ans": "B", "exp": "「しないまま」जनाउँछ保持没做作业的अवस्था来学校，ない形＋ままの用法"}]}, "73": {"analysis": "「わけだ」जनाउँछ基于前述事实得出的合理结论或必然नतिजा，बराबर हो中文的「难怪」「原来如此」「理所当然」。它जोड दिनु说话人मार्फत逻辑推理得出的结论，具有恍然大悟的语气。常与「から」「ので」等कारण表达搭配प्रयोग。", "mistakes": "❌ 明日雨が降るわけだ → ✅ 明日雨が降るそうだ（预测天气用そうだ而非わけだ）\n❌ 彼は学生なわけだ → ✅ 彼は学生だ（单纯陈述事实不用わけだ）\n❌ これは高いわけですね → ✅ これは高いんですね（感叹用んです而非わけだ）", "similar": [{"form": "はずだ", "diff": "はずだजनाउँछ基于常识的अनुमान，わけだजनाउँछ基于事实的必然结论"}, {"form": "そうだ（样态）", "diff": "そうだजनाउँछ外观印象的अनुमान，わけだजनाउँछ逻辑推理的结论"}], "quiz": [{"q": "彼は毎日３時間練習している。____上手なわけだ。", "opts": ["A. だから", "B. でも", "C. それに", "D. ただし"], "ans": "A", "exp": "わけだ前常用だからजनाउँछकारण，जोड दिनु基于前述事实得出的理所当然的结论"}, {"q": "一人暮らしを始めたばかりで、まだ慣れない____。", "opts": ["A. わけだ", "B. はずだ", "C. そうだ", "D. ようだ"], "ans": "A", "exp": "基于「刚开始独自生活」这वटा事实，得出「还不बानी是理所当然的」结论，用わけだ"}, {"q": "毎日コーヒーを10杯も飲む。それで眠れない____。", "opts": ["A. そうだ", "B. らしい", "C. わけだ", "D. かもしれない"], "ans": "C", "exp": "基于「每天喝10杯咖啡」的事实，得出「睡不着是理所当然的」结论"}]}, "74": {"analysis": "「〜のではないか」是जनाउँछ委婉अनुमान的文法，比直接断定更加礼貌和谦逊。它将说话者的अनुमान以疑问的形式表达，给听者留有思考和反驳的余地。敬语形式「〜のではないでしょうか」在商务场合和औपचारिक对话中प्रयोग频率很高，体现了日语重视委婉表达的语言特征。", "mistakes": "सामान्य गल्तीहरू：时态和语气搭配。❌明日は雨が降るのではないかでした → ✅明日は雨が降るのではないでしょうか（अनुमान不用भूतकाल式）。❌もっと頑張るのではないかと思います → ✅もっと頑張った方がいいのではないでしょうか（सुझाव用法आवश्यक「た方がいい」）", "similar": [{"form": "〜かもしれない", "diff": "「かもしれない」是直接अनुमान，「のではないか」是疑问形式的委婉अनुमान，更礼貌"}, {"form": "〜と思う", "diff": "「と思う」表达वटा人想法，「のではないか」暗示इच्छा得到对方认同"}], "quiz": [{"q": "彼は忙しくて来られない____。", "opts": ["A.のではないか", "B.かもしれない", "C.と思う", "D.はずだ"], "ans": "A", "exp": "委婉अनुमान用「のではないか」最合适，比其他选项更礼貌"}, {"q": "もう帰った____でしょうか。", "opts": ["A.の", "B.のでは", "C.ので", "D.から"], "ans": "B", "exp": "敬语形式「のではないでしょうか」जनाउँछ委婉अनुमान"}, {"q": "この料理は少し塩辛い____。", "opts": ["A.のだ", "B.のではないか", "C.のです", "D.のでしょう"], "ans": "B", "exp": "对现状的委婉अनुमान，暗示इच्छा对方也同意这वटा看法"}]}, "75": {"analysis": "「〜てほしくない」जनाउँछ对他人的नकारात्मक性愿望，即इच्छा他人不要做某事。这是「〜てほしい」的नकारात्मक形式，प्रयोग गरिन्छ表达说话人不इच्छा某人做某种行为的心情。ध्यान दिनुहोस्「ほしい」是形容詞，त्यसैलेनकारात्मक时用「ほしくない」而不是「ほしいじゃない」。", "mistakes": "❌ 彼に来ないでほしくない → ✅ 彼に来てほしくない（不इच्छा他来）❌ あなたが行かないほしくない → ✅ あなたに行ってほしくない（不इच्छा你去）❌ 母に心配してほしくありません → ✅ 母に心配してほしくないです（不इच्छा母亲担心）", "similar": [{"form": "〜ないでほしい", "diff": "两者अर्थ相同但语感फरक。「〜ないでほしい」更直接地जनाउँछ「请不要做」，而「〜てほしくない」侧重表达说话人的心情和愿望"}, {"form": "〜てもらいたくない", "diff": "「〜てもらいたくない」更औपचारिक，常प्रयोग गरिन्छलिखित语；「〜てほしくない」更बोलीचाली化，表达वटा人情感更强烈"}], "quiz": [{"q": "子どもには危険なゲームを（____）。", "opts": ["A. してほしい", "B. してほしくない", "C. しないでほしい", "D. BとCどちらも正しい"], "ans": "D", "exp": "「してほしくない」和「しないでほしい」都जनाउँछ不इच्छा孩子玩危险游戏，अर्थ相同"}, {"q": "友達に秘密を他の人に（____）。", "opts": ["A. 話してほしい", "B. 話してほしくない", "C. 話さないほしくない", "D. 話すほしくない"], "ans": "B", "exp": "不इच्छा朋友把秘密告诉别人，用「話してほしくない」。C和D的व्याकरण都不正确"}, {"q": "彼には無理を（____）と思います。", "opts": ["A. してほしくない", "B. しないでほしくない", "C. してほしい", "D. しないほしくない"], "ans": "A", "exp": "不इच्छा他勉强自己，用「してほしくない」。B和D在व्याकरण上都不正确"}]}, "12": {"analysis": "使役形「～（さ）せる」जनाउँछकर्ता让或使他人做某事，体现了कार्य的使动关系。一段動詞词尾परिवर्तन为「させる」，五段動詞按照ない形去掉「ない」加「せる」的规律परिवर्तन。这वटा文法जोड दिनु的是कर्ता的意志或强制力，使他人执行某वटाकार्य。", "mistakes": "सामान्य गल्तीहरू：動詞परिवर्तन规律混淆。❌ 食べる→食べせる → ✅ 食べる→食べさせる；❌ 読む→読ませる → ✅ 読む→読ませる；助詞प्रयोग错误：❌ 子どもを野菜を食べさせる → ✅ 子どもに野菜を食べさせる", "similar": [{"form": "～（ら）れる（受身）", "diff": "使役是让别人做，受身是被别人做。使役：母が子どもに薬を飲ませる；受身：子どもが母に薬を飲まされる"}, {"form": "～てもらう", "diff": "使役带有强制性，～てもらうजनाउँछअनुरोध帮助。使役：子どもに掃除させる（让孩子打扫）；～てもらう：子どもに掃除してもらう（请孩子帮忙打扫）"}], "quiz": [{"q": "先生は学生に漢字を____。", "opts": ["A. 書かせます", "B. 書きせます", "C. 書かされます", "D. 書いてもらいます"], "ans": "A", "exp": "「書く」是五段動詞，使役形是「書かせる」。老师让学生写汉字，प्रयोग使役形जनाउँछ。"}, {"q": "母は私____早く寝させました。", "opts": ["A. が", "B. を", "C. に", "D. で"], "ans": "B", "exp": "使役句中，被使役者用「を」标示是常见用法，विशेष是在जनाउँछ强制的सन्दर्भ下。"}, {"q": "「見る」の使役形は____ですか。", "opts": ["A. 見せる", "B. 見させる", "C. 見らせる", "D. 見させられる"], "ans": "B", "exp": "「見る」是一段動詞，使役形是去掉「る」加「させる」，即「見させる」。ध्यान दिनुहोस्「見せる」是「显示、给某人看」的अर्थ。"}]}, "17": {"analysis": "「〜なら」जनाउँछ基于对方提到的情况或अनुमान提出सुझाव、意见的शर्त表达。与单纯的अनुमानशर्तफरक，它जोड दिनु「既然你这么说/यदि是这样的话」的सन्दर्भ，常प्रयोग गरिन्छ给出सुझाव或表达वटा人看法。", "mistakes": "❌ 雨が降るなら、傘を持って行きます。（单纯अनुमान）→ ✅ 雨が降るなら、家にいましょう。（基于情况的सुझाव）/ ❌ 学生だなら、学割が使えます。→ ✅ 学生なら、学割が使えます。（名詞后直接接なら）", "similar": [{"form": "〜たら", "diff": "たらजनाउँछसमय顺序的शर्त，ならजोड दिनु基于对方话题的शर्त"}, {"form": "〜ば", "diff": "ばजनाउँछसामान्यतया性शर्त，なら更多प्रयोग गरिन्छ给सुझाव"}, {"form": "〜と", "diff": "とजनाउँछ自然नतिजा，ならजनाउँछ主观判断和सुझाव"}], "quiz": [{"q": "A：映画を見に行きたいんです。B：映画____、あの新作がおすすめですよ。", "opts": ["A. を見るなら", "B. を見たら", "C. を見ると", "D. を見れば"], "ans": "A", "exp": "基于A提到要看电影，B给出सुझाव，用なら最自然"}, {"q": "時間____、もう少しゆっくり説明してください。", "opts": ["A. があったら", "B. があるなら", "C. があると", "D. があれば"], "ans": "B", "exp": "「यदि有समय的话」，基于अनुमान情况提出अनुरोध，用なら"}, {"q": "先生____、田中先生が一番やさしいです。", "opts": ["A. だなら", "B. であるなら", "C. なら", "D. だったら"], "ans": "C", "exp": "名詞＋なら的形式，「यदि说老师的话」"}]}, "22": {"analysis": "「でしょう」是N4重要的推量助動詞，जनाउँछ说话者基于一定अनुसार的अनुमान或征求对方同意。比「かもしれません」语气更强，含有「गर्नुपर्छ是这样」的确信度。在敬语场面多用「でしょう」，普通场面可用「だろう」。", "mistakes": "❌ 雨が降っているでしょう（看到正在下雨时） → ✅ 雨が降るでしょう（अनुमान会下雨）；❌ な形容詞＋だでしょう → ✅ な形容詞＋でしょう", "similar": [{"form": "かもしれません", "diff": "でしょう确信度更高，かもしれませんजनाउँछसम्भावना性较低的अनुमान"}, {"form": "と思います", "diff": "でしょう可征求同意，と思います仅表达वटा人想法"}], "quiz": [{"q": "明日は雨が____。", "opts": ["A. 降るでしょう", "B. 降っているでしょう", "C. 降りでしょう", "D. 降るだでしょう"], "ans": "A", "exp": "对未来的अनुमान用「普通形＋でしょう」"}, {"q": "田中さんはもう帰った____。", "opts": ["A. でしょう", "B. だでしょう", "C. かもしれません", "D. と思います"], "ans": "A", "exp": "た形＋でしょうजनाउँछ对भूतकाल事实的अनुमान"}, {"q": "この料理は____でしょう？", "opts": ["A. おいしいだ", "B. おいしい", "C. おいしくて", "D. おいしかった"], "ans": "B", "exp": "い形容詞直接＋でしょう，征求对方同意"}]}, "50": {"analysis": "「について」是जनाउँछ话题、内容的助詞，बराबर हो中文的「बारेमा」「就」。常प्रयोग गरिन्छजनाउँछ谈话、思考、学习等行为的लक्ष्य或内容。与「に関して」अर्थ相近，但「について」更बोलीचाली化，प्रयोग频率更高。", "mistakes": "❌ 友達について話している → ✅ 友達のことについて話している（谈论朋友时आवश्यक加「のこと」）\n❌ 今日について天気 → ✅ 今日の天気について（「について」前सक्दैन直接接समय词修饰其他名詞）", "similar": [{"form": "〜に関して", "diff": "「に関して」更औपचारिक，多प्रयोग गरिन्छलिखित语；「について」更बोलीचाली化，日常会话常用"}, {"form": "〜のことで", "diff": "「のことで」जोड दिनु因某事而产生的नतिजा或影响；「について」单纯जनाउँछ话题内容"}], "quiz": [{"q": "日本の文化____研究しています。", "opts": ["A. について", "B. にとって", "C. において", "D. に対して"], "ans": "A", "exp": "जनाउँछ研究的内容话题，用「について」"}, {"q": "この問題____どう思いますか。", "opts": ["A. には", "B. について", "C. として", "D. による"], "ans": "B", "exp": "询问对某问题的看法，जनाउँछ话题用「について」"}, {"q": "昨日の会議____報告します。", "opts": ["A. について", "B. によって", "C. に対して", "D. として"], "ans": "A", "exp": "报告会议的内容，जनाउँछ报告的话题用「について」"}]}, "72": {"analysis": "「〜くらい/〜ぐらい」जनाउँछ大概的मात्रा或数量，是धेरै实用的日语表达。接在名詞或数量词后，जनाउँछ「大约～」的अर्थ。两种形式अर्थपूर्ण相同，「くらい」稍显औपचारिक，「ぐらい」更बोलीचाली化。", "mistakes": "❌ 三時間くらいで到着する予定です → ✅ 三時間ぐらいで到着する予定です（बोलीचाली中更自然）；❌ 100円くらいです高い → ✅ 100円ぐらい高いです（语序错误）", "similar": [{"form": "〜ほど", "diff": "「ほど」जोड दिनुमात्रा上限，「くらい」仅जनाउँछ大概数量"}, {"form": "〜だけ", "diff": "「だけ」जनाउँछ限定范围，「くらい」जनाउँछ大概估计"}], "quiz": [{"q": "映画は（____）見ましたか。", "opts": ["A. 何本くらい", "B. 何本だけ", "C. 何本ほど", "D. 何本まで"], "ans": "A", "exp": "询问大概数量用「何本くらい」最自然"}, {"q": "この本は（____）で読めます。", "opts": ["A. 一日ぐらい", "B. 一日だけ", "C. 一日まで", "D. 一日ずつ"], "ans": "A", "exp": "जनाउँछ大概आवश्यक的समय用「一日ぐらい」"}, {"q": "りんごを（____）買いました。", "opts": ["A. 五個だけ", "B. 五個くらい", "C. 五個まで", "D. 五個ずつ"], "ans": "B", "exp": "जनाउँछ大概的数量用「五個くらい」"}]}};
</script>

/* ═══════════════════════════════════════════════════════

/* ═══════════════════════════════════════════════
   GrammarApp
   ═══════════════════════════════════════════════ */
class GrammarApp {
  constructor(cfg) {
    this.level    = cfg.level;
    this.color    = cfg.color;
    this.bg       = cfg.bgGradient;
    this.G        = cfg.grammar;
    this.fgs      = cfg.filterGroups || [];
    this.label    = cfg.levelLabel || cfg.level;

    this.view     = 'card';
    this.filter   = 'all';
    this.search   = '';
    this.curMod   = null;
    this.deck     = [...this.G];
    this.cur      = 0;
    this.kCache   = {};
    this.kCur     = null;
    // per-card furigana cache  { cardId: [{text,reading,pos,isGram},...] }
    // 从 localStorage 加载已विश्लेषण的注音缓存
    this._furiKey = 'jlpt_furi_' + (cfg.level || 'XX');
    try { this.furiCache = JSON.parse(localStorage.getItem(this._furiKey) || '{}'); }
    catch { this.furiCache = {}; }

    try { this.cs = JSON.parse(localStorage.getItem(CARD_ST_KEY) || '{}'); }
    catch { this.cs = {}; }
    if (!this.cs.favs)     this.cs.favs = {};
    if (!this.cs.mastered) this.cs.mastered = {};

    const s = document.createElement('style');
    s.textContent = SHARED_CSS;
    document.head.insertBefore(s, document.head.firstChild);
    document.body.style.background = this.bg;

    this._buildHTML();
    this._bind();
    this._setView('card');
    this._initSwipe();
    if (window.speechSynthesis)
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }

  /* ─────────── BIND ─────────── */
  _bind() {
    // view
    document.getElementById('vCard').addEventListener('click', () => this._setView('card'));
    document.getElementById('vGrid').addEventListener('click', () => this._setView('grid'));
    // filter
    document.getElementById('fbar').addEventListener('click', e => {
      const b = e.target.closest('.fbtn'); if (!b) return;
      document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      this.filter = b.dataset.f;
      this.deck = this._fDeck();
      this.cur = 0;
      if (this.view === 'card') this._renderCard();
      else this._renderGrid();
    });
    // card nav
    document.getElementById('prevBtn').addEventListener('click', () => this._go(-1));
    document.getElementById('nextBtn').addEventListener('click', () => this._go(1));
    document.getElementById('shuffleBtn').addEventListener('click', () => {
      this._hideBack();
      this._shuffle();
    });
    document.getElementById('rndBtn').addEventListener('click', () => {
      this._hideBack();
      this.cur=Math.floor(Math.random()*this.deck.length);
      this._renderCard();
    });
    document.addEventListener('keydown', e => {
      if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
      if (e.key==='ArrowLeft'||e.key==='a') this._go(-1);
      if (e.key==='ArrowRight'||e.key==='d') this._go(1);
      if (e.key==='f'||e.key==='F') this._toggleFav();
      if (e.key==='m'||e.key==='M') this._toggleMst();
    });
    document.getElementById('cStar').addEventListener('click', () => this._toggleFav());
    document.getElementById('cCheck').addEventListener('click', () => this._toggleMst());
    
    // grid
    document.getElementById('srch').addEventListener('input', e => { this.search=e.target.value.trim(); this._renderGrid(); });
    // modal
    document.getElementById('mClose').addEventListener('click', () => this._closeMod());
    document.getElementById('mov').addEventListener('click', e => { if(e.target===document.getElementById('mov'))this._closeMod(); });
    // 整句点击播放
    document.addEventListener('click', e => {
      const ex = e.target.closest('.exb[data-speak]');
      if (!ex) return;
      if (e.target.closest('.fw,.kword,button,input')) return;
      this._playExample(ex, ex.dataset.speak || '');
    });
  }

  /* ─────────── VIEW ─────────── */
  _setView(v) {
    this.view = v;
    document.getElementById('vCard').classList.toggle('on', v==='card');
    document.getElementById('vGrid').classList.toggle('on', v==='grid');
    document.getElementById('main-wrap').style.display = v==='card' ? 'flex' : 'none';
    document.getElementById('cstage').classList.toggle('on', v==='card');
    document.getElementById('gstage').classList.toggle('on', v==='grid');
    document.getElementById('progWrap').style.display = 'none';
    document.getElementById('fbar').style.display = v==='card'?'none':'flex';
    document.getElementById('bnav').style.display = v==='card'?'flex':'none';
    (document.getElementById('tbSub')||{textContent:''}).textContent = v==='card'
      ? '← → キーで切替 ｜ F:मनपर्ने M:已掌握'
      : '点击查看详情 ｜ 点击汉字查词';
    this.deck = this._fDeck();
    this.cur = 0;
    if (v==='card') this._renderCard();
    else this._renderGrid();
  }

  /* ─────────── FILTER ─────────── */
  _fDeck() {
    let arr = this.G;
    if (this.filter==='fav') arr=arr.filter(g=>this.cs.favs[g.id]);
    else if (this.filter==='unmastered') arr=arr.filter(g=>!this.cs.mastered[g.id]);
    else if (this.filter.startsWith('★')) arr=arr.filter(g=>g.d===this.filter);
    else if (this.filter!=='all') arr=arr.filter(g=>g.cat===this.filter);
    return arr;
  }
  _matchS(g) {
    if(!this.search)return true;
    const q=this.search.toLowerCase();
    return g.t.includes(q)||g.m.includes(q)||g.mz.includes(q)||g.e.includes(q)||g.ez.includes(q);
  }

  /* ─────────── CARD RENDER ─────────── */
  _renderCard(dir) {
    const g = this.deck[this.cur];
    if (!g) {
      document.getElementById('fcard').innerHTML='<div style="padding:60px;text-align:center;color:#aaa;font-size:16px">没有相关व्याकरण</div>';
      return;
    }
    const card = document.getElementById('fcard');
    const render = () => {
      if (!(document.getElementById('cNum'))) return;
      (document.getElementById('cNum')||{textContent:''}).textContent = g.id;
      document.getElementById('cGram').innerHTML = `～<span class="hl">${g.hl}</span>`;
      (document.getElementById('cMean')||{textContent:''}).textContent = g.m;
      (document.getElementById('cMzh')||{textContent:''}).textContent = g.mz;
      document.getElementById('cPat').innerHTML = g.p;

      const grp = this.fgs.find(x=>x.key===g.cat);
      document.getElementById('cTags').innerHTML =
        (grp?`<span class="ctag" style="background:${grp.color||'#e8f0ff'};color:${grp.fg||'#3a5bc7'}">${grp.label}</span>`:'') +
        `<span class="cdiff">${g.d}</span>`;

      const fav=!!this.cs.favs[g.id], mst=!!this.cs.mastered[g.id];
      (document.getElementById('cStar')||{textContent:''}).textContent=fav?'⭐':'☆';
      document.getElementById('cStar').className='cact'+(fav?' fav':'');
      (document.getElementById('cCheck')||{textContent:''}).textContent=mst?'✅':'◯';
      document.getElementById('cCheck').className='cact'+(mst?' mst':'');
      document.getElementById('mstRib').className='mst-rib'+(mst?' on':'');

      // Render examples
      // 优先用内置注音（已批量生成写入HTML的）
      const builtin = g.furi || null;
      const cached  = this.furiCache[g.id] || builtin;
      if (cached) {
        // 同步到内存cache（方便后续切换कार्ड不重读）
        if (!this.furiCache[g.id] && builtin) this.furiCache[g.id] = builtin;
        this._renderFuri(g, cached);
      } else {
        this._renderPlain(g);
      }

      // AI reset

      // Progress
      const pct=((this.cur+1)/this.deck.length*100).toFixed(1);
      (document.getElementById('navIdx')||{textContent:''}).textContent=this.cur+1;
      (document.getElementById('navTot')||{textContent:''}).textContent=this.deck.length;
      document.getElementById('prevBtn').disabled=this.cur===0;
      (document.getElementById('nextBtn')||{disabled:false}).disabled=this.cur===this.deck.length-1;
      this._renderBack(g);
    };

    if (dir) {
      card.classList.add(dir==='L'?'aL':'aR');
      setTimeout(()=>{ card.classList.remove('aL','aR'); render(); }, 160);
    } else { render(); }
  }

  /* render plain (no furigana yet) */
  _renderPlain(g) {
    document.getElementById('posLegend').style.display='none';
    const allEx = [{j:g.eh,z:g.ez,main:true},...g.ex.map(e=>({j:e.j,z:e.z}))];
    document.getElementById('cExList').innerHTML = allEx.map(ex => {
      const plain = ex.j.replace(/<[^>]*>/g,'');
      const safe = plain.replace(/"/g,'&quot;');
      return `<div class="exb ${ex.main?'main':'sub'}" data-speak="${safe}">
        <div class="plain-ex">${ex.j}</div>
        <div class="ex-zh">${ex.z}</div>
      </div>`;
    }).join('');
    // 让汉字可点击查词
  }

  /* render with furigana tokens */
  _renderFuri(g, tokenSets) {
    
    
    

    const allEx = [{j:g.eh,z:g.ez,main:true},...g.ex.map(e=>({j:e.j,z:e.z}))];
    const listEl = document.getElementById('cExList');
    listEl.innerHTML='';

    allEx.forEach((ex,i) => {
      const toks = tokenSets[i];
      const plain = ex.j.replace(/<[^>]*>/g,'').replace(/'/g,"\\'");
      const div = document.createElement('div');
      div.className = 'exb '+(ex.main?'main':'sub');

      const furiDiv = document.createElement('div');
      furiDiv.className='furi-wrap';

      if (toks && toks.length) {
        toks.forEach(t => {
          if (t.pos==='punc') {
            const sp=document.createElement('span');
            sp.className='fpunc';
            const ru=document.createElement('span'); ru.className='fr'; ru.textContent='';
            const ft=document.createElement('span'); ft.className='ft'; ft.textContent=t.text;
            sp.appendChild(ru); sp.appendChild(ft);
            furiDiv.appendChild(sp);
          } else {
            const POS_CLASS={noun:'pN',verb:'pV',adj:'pA',adv:'pD',part:'pP',conj:'pC',aux:'pX'};
            const w=document.createElement('span');
            w.className='fw '+(POS_CLASS[t.pos]||'')+(t.isGram?' isG':'');
            const ru=document.createElement('span'); ru.className='fr'; ru.textContent=t.reading||'';
            const ft=document.createElement('span'); ft.className='ft'; ft.textContent=t.text;
            w.appendChild(ru); w.appendChild(ft);
            furiDiv.appendChild(w);
            // tooltip
            const POS_LBL={noun:'名詞',verb:'動詞',adj:'形容詞',adv:'副詞',part:'助詞',conj:'接续詞',aux:'助動詞'};
            const lbl = t.isGram ? '🔴 文法ポイント' : (POS_LBL[t.pos]||t.pos);
            w.addEventListener('mouseenter', ev => {
              const tip=document.getElementById('posTip');
              tip.textContent=lbl+(t.reading?' · '+t.reading:'');
              tip.style.display='block';
              tip.style.left=(ev.clientX+10)+'px';
              tip.style.top=(ev.clientY-28)+'px';
            });
            w.addEventListener('mouseleave',()=>{ const _pt=document.getElementById('posTip'); if(_pt)_pt.style.display='none'; });
            w.addEventListener('mousemove',ev=>{ const t2=document.getElementById('posTip'); if(!t2)return; t2.style.left=(ev.clientX+10)+'px'; t2.style.top=(ev.clientY-28)+'px'; });
          }
        });
      } else {
        furiDiv.innerHTML=`<span class="plain-ex">${ex.j}</span>`;
      }

      const zh=document.createElement('div'); zh.className='ex-zh'; zh.textContent=ex.z;
      div.dataset.speak = ex.j.replace(/<[^>]*>/g,'');
      div.appendChild(furiDiv);
      div.appendChild(zh);
      listEl.appendChild(div);
    });
  }

  _go(d) {
    const n=this.cur+d;
    if(n<0||n>=this.deck.length)return;
    this._hideBack();
    this.cur=n;
    this._renderCard(d>0?'L':'R');
  }
  _shuffle() {
    for(let i=this.deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[this.deck[i],this.deck[j]]=[this.deck[j],this.deck[i]];}
    this.cur=0; this._renderCard();
  }
  _toggleFav() {
    const g=this.deck[this.cur]; if(!g)return;
    this.cs.favs[g.id]=!this.cs.favs[g.id];
    this._saveCS(); this._renderCard();
  }
  _toggleMst() {
    const g=this.deck[this.cur]; if(!g)return;
    this.cs.mastered[g.id]=!this.cs.mastered[g.id];
    this._saveCS(); this._renderCard();
  }
  _saveCS() { localStorage.setItem(CARD_ST_KEY, JSON.stringify(this.cs)); }

  /* ─────────── GRID ─────────── */
  _renderGrid() {
    const grid=document.getElementById('grid');
    grid.innerHTML='';
    let n=0;
    const src=this.filter!=='all'?this.deck:this.G;
    src.filter(g=>this._matchS(g)).forEach(g=>{ n++; grid.appendChild(this._makeGC(g)); });
    if(!n){const d=document.createElement('div');d.className='empty';d.textContent='🔍 没有找到相关व्याकरण';grid.appendChild(d);}
    (document.getElementById('visCt')||{textContent:''}).textContent=n;
    const _cb=document.getElementById('cntBadge'); if(_cb)_cb.textContent=`जम्मा ${this.G.length} 项`;
    setTimeout(()=>{
      grid.querySelectorAll('.speakable').forEach(el=>{
        el.addEventListener('click', ev => {
          if (ev.target.closest('.kword')) return;
          const txt = el.dataset.speak || el.textContent || '';
          this._playSpeakable(el, txt);
        });
      });
    },60);
  }
  _makeGC(g) {
    const d=document.createElement('div'); d.className='gc';
    const grp=this.fgs.find(x=>x.key===g.cat);
    const tb=grp?.color||'#e8f0ff', tf=grp?.fg||'#3a5bc7';
    const et=g.e.replace(/'/g,"\\'");
    d.innerHTML=`
    <div class="gch"><div class="gnum" style="background:${this.color}">${g.id}</div>
      <div class="gt">～<span class="hl">${g.hl}</span></div>
      ${grp?`<span class="gtag" style="background:${tb};color:${tf}">${grp.label}</span>`:''}
      <div class="gd">${g.d}</div></div>
    <div class="gea speakable" data-speak="${et}"><div class="gejp">${g.eh}</div><div class="gezh">${g.ez}</div></div>
    <div class="gi">
      <div class="gmb"><span class="lb">意思</span>${g.m}<br><span style="font-size:10.5px;color:#999">${g.mz}</span></div>
      <div class="gpb"><span class="lb">接续</span>${g.p}</div></div>
    <button class="gmt" onclick="const m=this.nextElementSibling;const o=m.classList.toggle('on');this.textContent=o?'▾ 收起':'▸ 更多例句'">▸ 更多例句</button>
    <div class="gme">${g.ex.map(e=>`<div class="gei">${e.j}<span class="tr">${e.z}</span></div>`).join('')}</div>`;
    d.querySelector('.gch').addEventListener('click',()=>{
      const idx=this.deck.findIndex(x=>x.id===g.id);
      if(idx!==-1){this.cur=idx;this._setView('card');window.scrollTo(0,0);}
      else{this._openMod(g.id);}
    });
    return d;
  }

  /* ─────────── MODAL ─────────── */
  _openMod(id) {
    const g=this.G.find(x=>x.id===id); if(!g)return;
    this.curMod=id;
    (document.getElementById('mNum')||{textContent:''}).textContent=g.id;
    document.getElementById('mTit').innerHTML=`～<span class="hl">${g.hl}</span> <span style="font-size:13px;color:#f5b942">${g.d}</span>`;
    document.getElementById('mEx').innerHTML=`<div class="gei speakable" data-speak="${g.e.replace(/<[^>]*>/g,'').replace(/'/g,"\\'")}">${g.eh}</div>`;
    (document.getElementById('mZh')||{textContent:''}).textContent=g.ez;
    document.getElementById('mMean').innerHTML=`${g.m}<br><span style="font-size:11px;color:#aaa">${g.mz}</span>`;
    document.getElementById('mPat').innerHTML=g.p;
    document.getElementById('mMore').innerHTML=g.ex.map(e=>`<div class="gei speakable" data-speak="${e.j.replace(/<[^>]*>/g,'').replace(/'/g,"\\'")}">${e.j}<span class="tr">${e.z}</span></div>`).join('');
    document.getElementById('mov').classList.add('on');
    document.body.style.overflow='hidden';
    setTimeout(()=>{
      document.querySelectorAll('#mEx .speakable, #mMore .speakable').forEach(el=>{
        el.addEventListener('click', ev => {
          if (ev.target.closest('.kword')) return;
          const txt = el.dataset.speak || el.textContent || '';
          this._playSpeakable(el, txt);
        });
      });
    },60);
  }
  _closeMod() {
    document.getElementById('mov').classList.remove('on');
    document.body.style.overflow='';
    window.speechSynthesis&&window.speechSynthesis.cancel();
    this.curMod=null;
  }
  _spkMod(r) {
    if(!this.curMod)return;
    const g=this.G.find(x=>x.id===this.curMod);
    if(g)this.speak(g.e,r);
  }

  /* ─────────── TTS ─────────── */
  _clearPlaying() {
    document.querySelectorAll('.exb.playing,.gea.playing,.gei.playing').forEach(x => x.classList.remove('playing'));
    this._playingExample = null;
  }

  _playSpeakable(el,text) {
    if(!window.speechSynthesis || !text) return;
    this._clearPlaying();
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = 1.0;
    const vs = window.speechSynthesis.getVoices();
    const jp = vs.find(v => v.lang === 'ja-JP') || vs.find(v => v.lang && v.lang.startsWith('ja'));
    if (jp) u.voice = jp;
    this._playingExample = el;
    el.classList.add('playing');
    const clear = () => {
      if (this._playingExample === el) this._playingExample = null;
      el.classList.remove('playing');
    };
    u.onend = clear;
    u.onerror = clear;
    window.speechSynthesis.speak(u);
  }

  _renderBack(g) {
    const BACK_DATA = (typeof N2_BACK !== 'undefined') ? N2_BACK :
                      (typeof N1_BACK !== 'undefined') ? N1_BACK :
                      (typeof N3_BACK !== 'undefined') ? N3_BACK :
                      (typeof N4_BACK !== 'undefined') ? N4_BACK :
                      (typeof N5_BACK !== 'undefined') ? N5_BACK : null;
    const back = BACK_DATA ? BACK_DATA[String(g.id)] : null;

    const fcard = document.getElementById('fcard');
    if (!fcard) return;

    // 确保fcardBack存在
    let el = document.getElementById('fcardBack');
    if (!el) {
      el = document.createElement('div');
      el.id = 'fcardBack';
      el.className = 'fcard-back-panel';
      fcard.parentNode.insertBefore(el, fcard.nextSibling);
    }
    el.style.display = 'none';

    // 翻转按钮（每次切换कार्ड时cbody被重建，需重新插入）
    const cbody = fcard.querySelector('.cbody');
    if (cbody) {
      let flipBtn = cbody.querySelector('.flip-btn');
      if (!flipBtn) {
        flipBtn = document.createElement('button');
        flipBtn.className = 'flip-btn';
        flipBtn.onclick = () => this._toggleFlip();
        cbody.appendChild(flipBtn);
      }
      flipBtn.textContent = back ? '📖 查看व्याख्या & अभ्यास प्रश्न' : '📖 व्याख्या暂未收录';
      flipBtn.disabled = !back;
    }

    if (!back) { el.innerHTML = '<div class="no-back">此वटा文法व्याख्या暂未收录</div>'; return; }

    // 相似文法
    const mistakesHtml = (back.mistakes||'').split('\n').join('<br>');
    const similarHtml = (back.similar||[]).map(s =>
      `<div class="similar-item"><span class="similar-form">${s.form}</span><span class="similar-diff">— ${s.diff}</span></div>`
    ).join('');

    // अभ्यास प्रश्न
    const quizHtml = (back.quiz||[]).map((q, qi) => {
      const opts = (q.opts||[]).map((opt, oi) => {
        const letter = ['A','B','C','D'][oi];
        return `<button class="quiz-opt" data-qi="${qi}" data-letter="${letter}" data-ans="${q.ans}" onclick="window._quizClick(this)">${opt}</button>`;
      }).join('');
      return `<div class="quiz-item">
        <div class="quiz-q">${q.q}</div>
        <div class="quiz-opts">${opts}</div>
        <div class="quiz-exp" id="qexp-${qi}">${q.exp}</div>
      </div>`;
    }).join('');

    el.innerHTML = `
      <div class="back-header">
        <button class="flip-back-btn" onclick="window._flipBack()">← फर्कनुहोस्正面</button>
        <span class="back-title">व्याख्या · ${g.t}</span>
      </div>
      <div class="back-body">
        <div class="back-section">
          <div class="back-label">📌 深度व्याख्या</div>
          <div class="back-analysis">${back.analysis||''}</div>
        </div>
        <div class="back-section">
          <div class="back-label">⚠️ सामान्य गल्तीहरू</div>
          <div class="back-mistakes">${mistakesHtml}</div>
        </div>
        ${similarHtml ? `<div class="back-section">
          <div class="back-label">🔀 相似文法</div>
          <div class="back-similar">${similarHtml}</div>
        </div>` : ''}
        ${quizHtml ? `<div class="back-section">
          <div class="back-label">✏️ अभ्यास प्रश्न</div>
          ${quizHtml}
        </div>` : ''}
      </div>`;
  }

  _hideBack() {
    const back = document.getElementById('fcardBack');
    const fcard = document.getElementById('fcard');
    if (back) back.style.display = 'none';
    if (fcard) fcard.style.display = '';
  }

  _toggleFlip() {
    const fcard = document.getElementById('fcard');
    const back = document.getElementById('fcardBack');
    if (!back) return;
    const showing = back.style.display === 'block';
    if (showing) {
      this._hideBack();
    } else {
      if (fcard) fcard.style.display = 'none';
      back.style.display = 'block';
    }
  }

  _playExample(el,text) {
    this._playSpeakable(el,text);
  }

  speak(text,rate) {
    if(!window.speechSynthesis)return;
    this._clearPlaying();
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='ja-JP'; u.rate=rate||1.0;
    const vs=window.speechSynthesis.getVoices();
    const jp=vs.find(v=>v.lang==='ja-JP')||vs.find(v=>v.lang && v.lang.startsWith('ja'));
    if(jp)u.voice=jp;
    window.speechSynthesis.speak(u);
  }


  /* ─── SWIPE ─── */
  _initSwipe() {
    const el = document.getElementById('fcard');
    if (!el) return;
    let startX = 0, startY = 0;
    el.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, {passive: true});
    el.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
      if (dx < 0) this._go(1);
      else this._go(-1);
    }, {passive: true});
  }

  if (container.querySelector('.correct,.wrong')) return; // 已答
  const isCorrect = btn.dataset.letter === btn.dataset.ans;
  container.querySelectorAll('.quiz-opt').forEach(b => {
    if (b.dataset.letter === btn.dataset.ans) b.classList.add('correct');
    else if (b === btn) b.classList.add('wrong');
  });
  const exp = document.getElementById('qexp-'+qi);
  if (exp) exp.classList.add('show');
};
window._flipBack = function() {
  const fcard = document.getElementById('fcard');
  const back = document.getElementById('fcardBack');
  if (back) back.style.display = 'none';
  if (fcard) fcard.style.display = '';
};
