<script>
const N3_BACK = {"1": {"analysis": "「〜ため（に）」是N3重要व्याकरण，既可जनाउँछकारण也可जनाउँछउद्देश्य。作कारण时बराबर हो「〜から」，但更औपचारिक；作उद्देश्य时बराबर हो「〜ように」。需要根据सन्दर्भ判断是कारण还是उद्देश्य用法。", "mistakes": "❌ 病気のために、学校を休んだ。（उद्देश्य用法गलत）→ ✅ 病気のため、学校を休んだ。（कारण用法，表उद्देश्य时才加に）", "similar": [{"form": "〜から", "diff": "「ため」更औपचारिक，多प्रयोग गरिन्छलिखित语；「から」更बोलीचाली化"}, {"form": "〜ように", "diff": "「ように」只表उद्देश्य；「ため（に）」可表कारण和उद्देश्य"}, {"form": "〜せいで", "diff": "「せいで」只表负面कारण；「ため」可表中性或正面कारण"}], "quiz": [{"q": "健康の____、毎日運動している。", "opts": ["A.ため", "B.ために", "C.せいで", "D.から"], "ans": "B", "exp": "जनाउँछउद्देश्य时प्रयोग「ために」，这里是为了健康而运动"}, {"q": "台風の____、飛行機が欠航になった。", "opts": ["A.ために", "B.ように", "C.ため", "D.ので"], "ans": "C", "exp": "जनाउँछकारण时प्रयोग「ため」，台风是飞机停飞的कारण"}, {"q": "試験に合格する____、一生懸命勉強した。", "opts": ["A.ため", "B.ために", "C.せいで", "D.によって"], "ans": "B", "exp": "जनाउँछउद्देश्य时प्रयोग「ために」，为了考试合格而努力学习"}]}, "2": {"analysis": "「せいで」和「おかげで」都जनाउँछकारण，但भावना色彩截然相反。「せいで」प्रयोग गरिन्छ负面नतिजा，जनाउँछ责备或抱怨的语气；「おかげで」प्रयोग गरिन्छ正面नतिजा，जनाउँछ感谢或庆幸的心情。两者在व्याकरण上完全相同，भिन्नता在于说话者对नतिजा的主观评价。", "mistakes": "混淆प्रयोग场合：❌ 雨のおかげで、遠足が中止になった → ✅ 雨のせいで、遠足が中止になった（रद्द गर्नुहोस्远足是坏事，用せいで）；❌ 先生のせいで、日本語が上手になった → ✅ 先生のおかげで、日本語が上手になった（进步是好事，用おかげで）", "similar": [{"form": "〜ために", "diff": "ために是客观व्याख्याकारणउद्देश्य，せいで/おかげで带有主观的भावना色彩和评价"}, {"form": "〜から/ので", "diff": "から/ので是一般的因果关系表达，せいで/おかげでजोड दिनुकारण对नतिजा的直接影响和责任归属"}], "quiz": [{"q": "彼の親切な指導（____）、試験に合格できた。", "opts": ["A. せいで", "B. おかげで", "C. ために", "D. によって"], "ans": "B", "exp": "考试合格是好नतिजा，गर्नुपर्छ用「おかげで」जनाउँछ感谢"}, {"q": "交通渋滞（____）、会議に遅れてしまった。", "opts": ["A. おかげで", "B. ために", "C. せいで", "D. によると"], "ans": "C", "exp": "开会迟到是坏नतिजा，गर्नुपर्छ用「せいで」जनाउँछ抱怨"}, {"q": "友達の励まし（____）、最後まで頑張ることができた。", "opts": ["A. せいで", "B. から", "C. ために", "D. おかげで"], "ans": "D", "exp": "能够坚持到最后是好नतिजा，用「おかげで」表达对朋友鼓励的感谢"}]}, "3": {"analysis": "「〜ことから」जनाउँछ根据某वटा事实或现象得出结论、进行命名或判断的依据。与「〜ので」फरक，它更जोड दिनु客观事实作为依据的逻辑关系，常प्रयोग गरिन्छ解释命名由来、得出结论等场合。这वटा文法带有较强的लिखित语色彩。", "mistakes": "❌ 雨が降ったことから、出かけません。→ ✅ 雨が降ったので、出かけません。（जनाउँछ单纯因果关系时不用ことから）❌ 彼は優しいことから好かれている。→ ✅ 彼は優しいということから好かれている。（需要加「という」）", "similar": [{"form": "〜ので", "diff": "のでजनाउँछ一般因果关系，ことからजोड दिनु以某事实为依据进行判断或命名"}, {"form": "〜から", "diff": "からजनाउँछ主观理由，ことからजनाउँछ客观事实作为依据"}, {"form": "〜ために", "diff": "ためにजनाउँछउद्देश्य或कारण，ことから专指以事实为根据"}], "quiz": [{"q": "この花は香りがよい____、「においざくら」と名付けられた。", "opts": ["A. ので", "B. ことから", "C. ために", "D. として"], "ans": "B", "exp": "जनाउँछ命名的依据，用「ことから」最合适"}, {"q": "彼の行動____判断すると、嘘をついているようだ。", "opts": ["A. ことから", "B. ので", "C. だから", "D. として"], "ans": "A", "exp": "以某वटा事实为依据进行判断，प्रयोग「ことから」"}, {"q": "今日は暑い____、エアコンをつけました。", "opts": ["A. ことから", "B. ので", "C. ために", "D. として"], "ans": "B", "exp": "जनाउँछ单纯的因果关系，用「ので」而不是「ことから」"}]}, "4": {"analysis": "「〜だけに」जनाउँछ基于前项理由，后项नतिजा理所当然。与单纯的因果关系फरक，它जोड दिनु说话人对नतिजा的认同感和合理性。常प्रयोग गरिन्छ赞扬、理解或接受某种नतिजा时。", "mistakes": "सामान्य गल्तीहरू：与「〜ので」「〜から」混用。❌ 雨が降っているだけに、外に出ない → ✅ 雨が降っているので、外に出ない（单纯因果用ので）。❌ 学生だけに、勉強しなければならない → ✅ プロだけに、技術が優れている（だけにप्रयोग गरिन्छ积极评价）", "similar": [{"form": "〜ので", "diff": "のでजनाउँछ客观因果，だけにजोड दिनु理所当然的认同感"}, {"form": "〜から", "diff": "からजनाउँछ主观理由，だけにजनाउँछ基于身份地位的合理性"}, {"form": "〜からこそ", "diff": "からこそजोड दिनु「正因为」，だけにजोड दिनु「毕竟」的理解"}], "quiz": [{"q": "彼は医者（　　）、病気のことがよくわかる。", "opts": ["A. だけに", "B. ので", "C. から", "D. ために"], "ans": "A", "exp": "医生身份使其了解疾病理所当然，体现认同感，用だけに"}, {"q": "子供（　　）、素直で可愛い。", "opts": ["A. なので", "B. だけに", "C. だから", "D. ために"], "ans": "B", "exp": "孩子天真可爱是理所当然的，जनाउँछ认同用だけに"}, {"q": "ベテランの料理人（　　）、味が格別だ。", "opts": ["A. から", "B. ので", "C. だけに", "D. によって"], "ans": "C", "exp": "资深厨师做菜味道特别是理所当然的，जनाउँछ合理认同用だけに"}]}, "5": {"analysis": "「〜のに」जनाउँछ逆接विपरीत，带有说话人的不满或意外情绪，बराबर हो中文的「明明～却～」。与「〜けれど」等纯粹जनाउँछविपरीतफरक，「のに」जोड दिनुनतिजा与期待相反时的情感色彩。", "mistakes": "सामान्य गल्तीहरू：误प्रयोग गरिन्छ客观陈述。❌お金があるのに、買わない → ✅お金があるけれど、買わない（客观विपरीत用けれど）；❌雨が降っているのに、出かける → ✅雨が降っているのに、出かけるなんて（のに需要情感色彩）", "similar": [{"form": "〜けれど/〜が", "diff": "けれど是客观विपरीत，のに带有主观不满或意外情绪"}, {"form": "〜ても", "diff": "てもजनाउँछअनुमान让步，のにजनाउँछ既成事实的विपरीत"}], "quiz": [{"q": "薬を飲んだ（____）、まだ熱が下がらない。", "opts": ["A.のに", "B.ので", "C.から", "D.ために"], "ans": "A", "exp": "जनाउँछ不满情绪的逆接विपरीत，用「のに」"}, {"q": "彼は約束した（____）、来なかった。", "opts": ["A.ので", "B.のに", "C.ために", "D.だけ"], "ans": "B", "exp": "明明约定了却没来，जनाउँछ意外和不满，用「のに」"}, {"q": "一生懸命勉強した（____）、試験に落ちてしまった。", "opts": ["A.ので", "B.から", "C.のに", "D.ために"], "ans": "C", "exp": "努力学习却落榜，जनाउँछनतिजा与期待相反的不满，用「のに」"}]}, "6": {"analysis": "「〜くせに」是जनाउँछ批判性逆接的文法，与「〜のに」相比带有更强烈的不满和批判情绪。说话者对前项事实感到不满，认为后项行为不合理或令人失望。", "mistakes": "❌ 彼は日本人くせに、日本語が下手だ。→ ✅ 彼は日本人のくせに、日本語が下手だ。（名詞后需要加「の」）❌ 金持ちくせして、けちだ。→ ✅ 金持ちのくせに、けちだ。（「くせして」是बोलीचाली用法，लिखित语用「くせに」）", "similar": [{"form": "〜のに", "diff": "「のに」是中性的逆接，「くせに」含批判情绪"}, {"form": "〜ながら", "diff": "「ながら」जनाउँछ矛盾行为，「くせに」जोड दिनु不满批判"}, {"form": "〜癖して", "diff": "「癖して」是「くせに」的बोलीचाली形式，更随意"}], "quiz": [{"q": "彼は大学生____、漢字が読めない。", "opts": ["A. なのに", "B. のくせに", "C. ながら", "D. けれど"], "ans": "B", "exp": "批判大学生不会读汉字这一不合理现象，用「のくせに」最合适"}, {"q": "お金がない____、高い服ばかり買っている。", "opts": ["A. くせに", "B. のに", "C. から", "D. ので"], "ans": "A", "exp": "批判没钱却买贵衣服的矛盾行为，用「くせに」表达不满"}, {"q": "医者____、タバコを吸うなんて信じられない。", "opts": ["A. だくせに", "B. のくせに", "C. というくせに", "D. であるくせに"], "ans": "B", "exp": "名詞「医者」后接「のくせに」，批判医生吸烟的不当行为"}]}, "7": {"analysis": "「にもかかわらず」是लिखित语的逆接表现，比「のに」更औपचारिक庄重，多प्रयोग गरिन्छऔपचारिकलेख、新闻报道等场合。它जोड दिनु前后两वटा事实的对比性，जनाउँछ后项नतिजा出乎意料或与常理相反。", "mistakes": "❌ 雨が降るにもかかわらず → ✅ 雨にもかかわらず（名詞直接接续，不需要「が降る」）\n❌ 忙しいですにもかかわらず → ✅ 忙しいにもかかわらず（接普通形，不用丁寧語）", "similar": [{"form": "〜のに", "diff": "बोलीचाली常用，语气较轻松随意"}, {"form": "〜ものの", "diff": "लिखित语，含有「虽然如此，但还是...」的无奈语气"}], "quiz": [{"q": "彼は病気（____）、会議に出席した。", "opts": ["A. なのに", "B. にもかかわらず", "C. ものの", "D. けれど"], "ans": "B", "exp": "औपचारिक的लिखितसन्दर्भ中表达逆接关系，用「にもかかわらず」最合适"}, {"q": "困難（____）、プロジェクトは成功した。", "opts": ["A. にもかかわらず", "B. のにもかかわらず", "C. であるにもかかわらず", "D. A和C都对"], "ans": "D", "exp": "名詞可以直接接「にもかかわらず」，也可以加「である」变成「であるにもかかわらず」"}, {"q": "次の中で最も書面語的な表現はどれですか。", "opts": ["A. 雨なのに出かけた", "B. 雨にもかかわらず出かけた", "C. 雨だけど出かけた", "D. 雨でも出かけた"], "ans": "B", "exp": "「にもかかわらず」は書面語の逆接表現で、最もऔपचारिकで硬い表現"}]}, "8": {"analysis": "「〜とはいえ」जनाउँछ承认前项事实，但后项呈现与此不符或相反的情况，体现了「让步逆接」的व्याकरण特征。与单纯的逆接「〜が」फरक，此文法जोड दिनु说话人对前项事实的认可态度，然后提出例外或相反情况。", "mistakes": "❌ 学生とはいえ、お金を持っている → ✅ 学生とはいえ、お金がない（逻辑要合理）\n❌ 冬とはいえるから、寒いです → ✅ 冬とはいえ、今日は暖かい（不可加「る」）\n❌ 忙しいとはいえで、手伝います → ✅ 忙しいとはいえ、手伝います（不可加「で」）", "similar": [{"form": "〜といっても", "diff": "更बोलीचाली化，语气较轻松随意"}, {"form": "〜ものの", "diff": "लिखित语色彩更强，常प्रयोग गरिन्छऔपचारिक文体"}, {"form": "〜けれども", "diff": "单纯逆接，不जोड दिनु对前项的认可态度"}], "quiz": [{"q": "子供____、しっかりした考えを持っている。", "opts": ["A. とはいえ", "B. といえば", "C. というと", "D. といえる"], "ans": "A", "exp": "承认是孩子这一事实，但有相反的表现，用「とはいえ」जनाउँछ让步逆接"}, {"q": "有名な店____、味はそれほどでもない。", "opts": ["A. といえば", "B. とはいえ", "C. というか", "D. といって"], "ans": "B", "exp": "承认是有名的店，但味道并不怎么样，典型的让步逆接用法"}, {"q": "安い____、品質は悪くない。", "opts": ["A. とはいえ", "B. といえば", "C. というと", "D. といっても"], "ans": "A", "exp": "承认价格便宜，但质量并不差，「とはいえ」जनाउँछ让步विपरीत"}]}, "9": {"analysis": "「〜さえ〜ば」जनाउँछ最低限度的充分शर्त，जोड दिनु只要满足这一वटाशर्त就足够了。与「〜だけで」फरक，「さえ」带有更强的जोड दिनु语气，暗示这वटाशर्तसम्भावना是意外的或者超出预期的最低要求。", "mistakes": "❌ 時間さえあったら、旅行したい → ✅ 時間さえあれば、旅行したい（「さえ」后面अनिवार्य用「ば」形，不能用「たら」）；❌ 彼さえ来ますれば → ✅ 彼さえ来れば（動詞时直接用ば形，不需要「ます」）", "similar": [{"form": "〜だけで", "diff": "「だけで」仅जनाउँछ充分शर्त，「さえ〜ば」含有जोड दिनु和意外性"}, {"form": "〜ばいい", "diff": "「ばいい」जनाउँछसुझाव或最好的छनौट，「さえ〜ば」जोड दिनु最低限度शर्त"}], "quiz": [{"q": "健康____あれば、他に何もいらない。", "opts": ["A.が", "B.を", "C.さえ", "D.でも"], "ans": "C", "exp": "जनाउँछ最低限度的शर्त用「さえ」，健康是最重要的शर्त"}, {"q": "君____来てくれれば、安心だ。", "opts": ["A.さえ", "B.だけ", "C.も", "D.は"], "ans": "A", "exp": "जोड दिनु只要你来就足够了，用「さえ」जनाउँछ最低限度शर्त"}, {"q": "この薬____飲めば、すぐ治ります。", "opts": ["A.を", "B.が", "C.さえ", "D.でも"], "ans": "C", "exp": "「さえ〜ば」जनाउँछ只要服用这वटा药就能治好，जोड दिनु最低限度शर्त"}]}, "10": {"analysis": "「としたら/としても」是N3重要的अनुमान表现，前者जनाउँछअनुमानशर्त，后者जनाउँछ让步अनुमान。与「たら/ても」相比，「としたら/としても」更जोड दिनुअनुमान性，常प्रयोग गरिन्छ现实सम्भावना性较低的情况。", "mistakes": "易混淆अनुमान与现实：❌ 明日雨が降るとしたら、試合は中止です → ✅ 明日雨が降ったら、試合は中止です（现实सम्भावना性高用「た "「てはいけない」是निषेध表现，「わけにはいかない」是基于责任感的不得已"}, {"form": "〜ことはできない", "diff": "「ことはできない」जनाउँछक्षमता上做不到，「わけにはいかない」जनाउँछ道义上不允许"}], "quiz": [{"q": "親の面倒を見ないわけには（　　）。", "opts": ["A.いけない", "B.いかない", "C.ならない", "D.できない"], "ans": "B", "exp": "「わけにはいかない」是固定表达，不能用其他形式替换"}, {"q": "借りたお金を（　　）わけにはいかない。", "opts": ["A.返さない", "B.返す", "C.返して", "D.返した"], "ans": "A", "exp": "「わけにはいかない」前接動詞नकारात्मक形，जनाउँछ不能不做某事"}, {"q": "会社の秘密を他人に（　　）わけにはいかない。", "opts": ["A.話す", "B.話した", "C.話して", "D.話さない"], "ans": "A", "exp": "「わけにはいかない」接動詞辞书形，जनाउँछ不能做某事"}]}, "23": {"analysis": "「〜てよかった」表达对भूतकाल某वटा行为或अवस्था的庆幸、满足情绪，जोड दिनुनतिजा的积极性。与单纯的「よかった」फरक，这里的「て形+よかった」突出了行为的完成性和由此带来的安心感。", "mistakes": "易混淆时态和सन्दर्भ：❌「明日行ってよかった」→ ✅「昨日行ってよかった」（अनिवार्य是已完成的事）；❌「雨が降ってよかった」（客观事实）→ ✅「傘を持ってきてよかった」（自己的行为）", "similar": [{"form": "〜なくてよかった", "diff": "जनाउँछ没做某事的庆幸，如「行かなくてよかった」vs「行ってよかった」"}, {"form": "〜でよかった", "diff": "对अवस्था的满足，如「晴れでよかった」vs「準備してよかった」（行为）"}], "quiz": [{"q": "早く家に帰っ____。雨が降り始めた。", "opts": ["A. てよかった", "B. でよかった", "C. なくてよかった", "D. ばよかった"], "ans": "A", "exp": "对自己提前回家这वटा行为感到庆幸，用「て形+よかった」"}, {"q": "あの映画を見____。とてもつまらなかった。", "opts": ["A. てよかった", "B. なくてよかった", "C. でよかった", "D. ばよかった"], "ans": "B", "exp": "庆幸没有看那部电影，用「なくてよかった」जनाउँछ没做某事的庆幸"}, {"q": "薬を飲ん____。もう熱が下がった。", "opts": ["A. でよかった", "B. なくてよかった", "C. てよかった", "D. ばよかった"], "ans": "C", "exp": "对吃药这वटा行为感到庆幸，因为烧已经退了，用「て形+よかった」"}]}, "25": {"analysis": "「〜というのは」是प्रयोग गरिन्छ定义和解释概念的重要句型，बराबर हो中文的「所谓〜就是」。前接词语或概念，后面अनिवार्य跟上解释व्याख्या，形成完整的定义句。常प्रयोग गरिन्छ教学、व्याख्या和澄清概念的场合。", "mistakes": "❌「友情」というのは大切です → ✅「友情」というのは大切なものです（缺少解释内容）\n❌ 勉強するというのは → ✅ 勉強するというのは知識を身につけることです（動詞后需要完整解释）", "similar": [{"form": "〜とは", "diff": "更简洁，多प्रयोग गरिन्छलिखित语定义"}, {"form": "〜ということは", "diff": "जोड दिनु推论नतिजा，不是单纯定义"}, {"form": "〜というもの", "diff": "带有भावना色彩的解释व्याख्या"}], "quiz": [{"q": "「環境問題」____地球の自然を守ることです。", "opts": ["A. ということは", "B. というのは", "C. といえば", "D. について"], "ans": "B", "exp": "定义解释「環境問題」这वटा概念，用「というのは」最合适"}, {"q": "彼が言った「頑張る」____どういうअर्थですか。", "opts": ["A. というのは", "B. ということは", "C. といったら", "D. について"], "ans": "A", "exp": "询问「頑張る」这वटा词的定义解释，प्रयोग「というのは」"}, {"q": "「時間を大切にする」____毎日を無駄にしない____です。", "opts": ["A. ということは...ということ", "B. というのは...ということ", "C. といえば...ということ", "D. について...ということ"], "ans": "B", "exp": "前半用「というのは」提出要解释的概念，后半用「ということ」完成解释"}]}, "26": {"analysis": "「〜べきだ」जनाउँछ说话人认为某事在道德上、社会常识上或义务上गर्नुपर्छ做，语气比「〜ほうがいい」更强烈，带有强制性。它常प्रयोग गरिन्छ表达社会规范、道德义务或理所当然的事情，不是वटा人सुझाव而是客观判断。", "mistakes": "❌ 明日早く起きるべきだった。(भूतकाल形गलत) → ✅ 明日早く起きるべきだ。❌ 学生はもっと勉強するべきがいい。(混用) → ✅ 学生はもっと勉強するべきだ。❌ 彼に謝るべきでした。(敬语प्रयोगगलत) → ✅ 彼に謝るべきだった。", "similar": [{"form": "〜ほうがいい", "diff": "「べきだ」是义务性सुझाव，「ほうがいい」是一般性सुझाव，语气较温和"}, {"form": "〜なければならない", "diff": "「べきだ」जोड दिनु应然性，「なければならない」जोड दिनु必然性和义务"}, {"form": "〜はずだ", "diff": "「べきだ」जनाउँछ义务，「はずだ」जनाउँछअनुमान或理所当然的नतिजा"}], "quiz": [{"q": "学生は時間を____守るべきだ。", "opts": ["A. に", "B. を", "C. で", "D. と"], "ans": "B", "exp": "「時間を守る」是固定搭配，जनाउँछ遵守समय，用をजनाउँछलक्ष्य"}, {"q": "そんな失礼なことを言う____。", "opts": ["A. べきだ", "B. べきではない", "C. べきでした", "D. べきだった"], "ans": "B", "exp": "失礼的事情不गर्नुपर्छ说，用नकारात्मक形「べきではない」"}, {"q": "親は子供を____べきだ。", "opts": ["A. 大切にする", "B. 大切にした", "C. 大切にして", "D. 大切だ"], "ans": "A", "exp": "「べきだ」前接動詞辞书形，「大切にする」是動詞辞书形"}]}, "27": {"analysis": "「〜てはならない」是जनाउँछ强烈निषेध的文法，比「〜てはいけない」更加औपचारिक和严厉。常प्रयोग गरिन्छ法律वटा文、规则व्याख्या等औपचारिक场合，带有绝对不允许的语气。相比बोलीचाली化的「だめ」，这वटा表达更具权威性。", "mistakes": "❌ 遅刻してはならないです → ✅ 遅刻してはなりません（敬语形式गर्नुपर्छ统一）\n❌ ここで喫煙してはならないよ → ✅ ここで喫煙してはいけないよ（日常对话用「いけない」更自然）\n❌ 秘密を言ってはならない → ✅ 秘密を話してはならない（「言う」गर्नुपर्छ用「話す」）", "similar": [{"form": "〜てはいけない", "diff": "「ならない」更औपचारिक严厉，「いけない」更बोलीचाली化温和"}, {"form": "〜禁止", "diff": "「निषेध」是名詞，「てはならない」是動詞表达，व्याकरण功能फरक"}], "quiz": [{"q": "学校の規則では、授業中に携帯電話をप्रयोग（____）。", "opts": ["A.してはならない", "B.してもいい", "C.しなければならない", "D.したほうがいい"], "ans": "A", "exp": "学校规则中निषेध在上课时प्रयोग手机，गर्नुपर्छ用जनाउँछ强烈निषेध的「してはならない」"}, {"q": "この薬は子供が（____）ところに置いてはならない。", "opts": ["A.触れる", "B.触れられる", "C.触れた", "D.触れよう"], "ans": "B", "exp": "「触れられる」是सम्भावना形，जनाउँछ「孩子能够触摸到的地方」，符合सन्दर्भ"}, {"q": "法律により、未成年者はお酒を（____）。", "opts": ["A.飲んではいけません", "B.飲んではなりません", "C.飲まなければなりません", "D.飲んでもいいです"], "ans": "B", "exp": "法律वटा文प्रयोगऔपचारिक的「飲んではなりません」更合适，जनाउँछ严格निषेध"}]}, "28": {"analysis": "「〜ないといけない」जनाउँछ义务或必要性，बराबर हो中文的「अनिवार्य」「得」。由動詞ない形+といけない构成，是दैनिक कुराकानी中最常用的义务表达。ध्यान दिनुहोस्与「〜てはいけない」的भिन्नता：前者जनाउँछ「अनिवार्य做」，后者जनाउँछ「不能做」。", "mistakes": "सामान्य गल्तीहरू：混淆सकारात्मक义务和नकारात्मकनिषेध。❌ 宿題をしてはいけない（不能做作业）→ ✅ 宿題をしないといけない（अनिवार्य做作业）。❌ 早く行かないといけない（语序गलत）→ ✅ 早く行かないといけない（अनिवार्य早点去）。", "similar": [{"form": "〜なければならない", "diff": "更औपचारिक，लिखित语色彩强"}, {"form": "〜なくてはいけない", "diff": "बोलीचाली缩约形，更随意"}, {"form": "〜てはいけない", "diff": "जनाउँछनिषेध「不能做」，अर्थ相反"}], "quiz": [{"q": "薬を____。", "opts": ["A. 飲んではいけない", "B. 飲まないといけない", "C. 飲むといけない", "D. 飲んでいけない"], "ans": "B", "exp": "根据सन्दर्भ「अनिवार्य吃药」，用「飲まないといけない」जनाउँछ义务"}, {"q": "子供は夜遅く____。", "opts": ["A. 寝ないといけない", "B. 起きないといけない", "C. 起きてはいけない", "D. 寝てはいけない"], "ans": "C", "exp": "「孩子晚上不能晚睡」जनाउँछनिषेध，用「起きてはいけない」"}, {"q": "明日のテストの準備を____。", "opts": ["A. してはいけない", "B. しないといけない", "C. するといけない", "D. していけない"], "ans": "B", "exp": "「अनिवार्य准备明天的考试」जनाउँछ义务，用「しないといけない」"}]}, "29": {"analysis": "「〜に比べて」是जनाउँछतुलना的重要व्याकरण，प्रयोग गरिन्छ对比两वटा事物的差异。与中文「与~相比」अर्थ相同，常प्रयोग गरिन्छवर्णनपरिवर्तन或差异。ध्यान दिनुहोस्「に比べて」和「に比べると」अर्थ完全相同，可以互换प्रयोग。", "mistakes": "❌ 今年は去年に比べて暑くなった → ✅ 去年に比べて、今年は暑くなった（तुलना基准放在句首更自然）; ❌ 兄に比べて私が背が高い → ✅ 兄に比べて、私は背が高い（कर्ता用は而非が）", "similar": [{"form": "〜より", "diff": "「より」更直接简洁，「に比べて」更औपचारिक，जोड दिनु对比感"}, {"form": "〜と比べて", "diff": "अर्थ相同，但「と比べて」稍显生硬，日常多用「に比べて」"}], "quiz": [{"q": "昨日____今日は涼しいですね。", "opts": ["A. に比べて", "B. によって", "C. について", "D. にとって"], "ans": "A", "exp": "जनाउँछ与昨天相比的तुलना，用「に比べて」"}, {"q": "日本の物価は中国____高いと思います。", "opts": ["A. について", "B. に比べて", "C. によると", "D. に対して"], "ans": "B", "exp": "तुलना日本和中国的物价差异，用「に比べて」"}, {"q": "この店は他の店____、サービスがいいです。", "opts": ["A. に比べて", "B. に関して", "C. に向けて", "D. に基づいて"], "ans": "A", "exp": "与其他店铺进行服务质量的तुलना，प्रयोग「に比べて」"}]}, "30": {"analysis": "「〜にしては」जनाउँछ基于某种身份、状况或标准的一般预期，实际情况却出乎意料地好或坏。常प्रयोग गरिन्छ表达「虽然是~，但是~」的对比关系，暗含说话者的意外感。", "mistakes": "❌ 彼は学生にしては、お金を持っていない。→ ✅ 彼は学生にしては、お金を持っている。（应表达与预期相反的积极评价）\n❌ 初心者なのにしては上手だ。→ ✅ 初心者にしては上手だ。（不能加「なのに」）", "similar": [{"form": "〜のわりに", "diff": "「のわりに」更客观，「にしては」带有更强的意外感和主观评价"}, {"form": "〜にしても", "diff": "「にしても」जनाउँछ即使如此，「にしては」जोड दिनु与预期的对比"}], "quiz": [{"q": "子供____、よく考えて行動しますね。", "opts": ["A. なのに", "B. にしては", "C. について", "D. として"], "ans": "B", "exp": "जनाउँछ对孩子来说出乎意料地成熟，用「にしては」"}, {"q": "この店は安い____、味がとてもいい。", "opts": ["A. にしては", "B. について", "C. に対して", "D. として"], "ans": "A", "exp": "便宜的店通常味道一般，但这家店味道很好，与预期相反"}, {"q": "彼は外国人____、日本語が下手だ。", "opts": ["A. として", "B. にしては", "C. について", "D. に対して"], "ans": "B", "exp": "外国人日语不好是正常的，但此句想表达「对外国人来说（意外地）不好」"}]}, "31": {"analysis": "「〜ないで/ずに」जनाउँछ在不做某事的अवस्था下进行另一वटाकार्य，जोड दिनु两वटाकार्य的同时性。「ないで」是बोलीचाली形式，「ずに」是लिखित语形式，अर्थ完全相同。这वटा文法重点在于表达「未做A而做B」的逻辑关系。", "mistakes": "❌ 何も言わなくて出かけた → ✅ 何も言わないで出かけた（什么都没说就出门了）；❌ 宿題をしずに寝た → ✅ 宿題をしないで寝た/宿題をせずに寝た（没做作业就睡了）", "similar": [{"form": "〜なくて", "diff": "जनाउँछकारण理由，不जोड दिनु同时性"}, {"form": "〜ず", "diff": "古典व्याकरण，现代多用「ずに」"}, {"form": "〜ないまま", "diff": "जोड दिनुअवस्था的持续，含有遗憾语气"}], "quiz": [{"q": "彼は挨拶も（　　）帰ってしまった。", "opts": ["A. しなくて", "B. しないで", "C. しなかった", "D. しません"], "ans": "B", "exp": "「挨拶もしないで」जनाउँछ没有打招呼就回去了，用「〜ないで」जनाउँछ未做某事的अवस्था下进行另一कार्य"}, {"q": "薬を（　　）病気が治った。", "opts": ["A. 飲まずに", "B. 飲まなくて", "C. 飲まないから", "D. 飲まないので"], "ans": "A", "exp": "「飲まずに」是「〜ずに」的形式，जनाउँछ没吃药病就好了，लिखित语表达"}, {"q": "電気を（　　）本を読むのは目に悪い。", "opts": ["A. つけなくて", "B. つけないで", "C. つけずに", "D. つけないから"], "ans": "C", "exp": "「つけずに」जनाउँछ不开灯看书，「する」的未然形是「せず」，所以是「つけずに」"}]}, "32": {"analysis": "「〜ずにはいられない」जनाउँछ无法抑制的强烈冲动或भावना，带有不由自主、情不自禁的含义。这是一种情感表达，जोड दिनु内心的冲动强烈到无法控制的मात्रा。接续时要ध्यान दिनुहोस्「ない」去掉后加「ず」，特殊動詞「する」变为「せず」，「来る」变为「こず」。", "mistakes": "❌ 面白い映画を見て、笑わないではいられない → ✅ 面白い映画を見て、笑わずにはいられない（接续गलत，गर्नुपर्छ用「ず」而非「ないで」）❌ 彼の話を聞いて、感動しずにはいられない → ✅ 彼の話を聞いて、感動せずにはいられない（「する」的परिवर्तन形是「せず」）", "similar": [{"form": "〜ないではいられない", "diff": "अर्थ相同但较为बोलीचाली化，「ずには」更औपचारिकलिखित"}, {"form": "〜てたまらない", "diff": "都जनाउँछ强烈भावना，但「てたまらない」侧重难以忍受的मात्रा"}], "quiz": [{"q": "美しい景色を見ると、写真を撮ら____。", "opts": ["A. ないではいられない", "B. ずにはいられない", "C. てたまらない", "D. なければならない"], "ans": "B", "exp": "जनाउँछ看到美景忍不住想拍照，用「ずにはいられない」जनाउँछ无法抑制的冲动"}, {"q": "その悲しいニュースを聞いて、涙を流さ____。", "opts": ["A. ずにはいられない", "B. なくてもいい", "C. ねばならない", "D. ないことがある"], "ans": "A", "exp": "听到悲伤消息忍不住流泪，जनाउँछ情感上的不由自主"}, {"q": "彼の優しさに触れて、感謝____。", "opts": ["A. しないではいられない", "B. しずにはいられない", "C. せずにはいられない", "D. さずにはいられない"], "ans": "C", "exp": "「する」的ない形是「しない」，去掉「ない」后变为「せず」"}]}, "33": {"analysis": "「〜わけではない」是部分नकारात्मक表现，用来缓和नकारात्मक语气，表达「并不是完全这样」的含义。与完全नकारात्मकफरक，它暗示存在其他सम्भावना性或मात्रा上的差异，常प्रयोग गरिन्छ委婉表达或为后续विपरीत做铺垫。", "mistakes": "सामान्य गल्तीहरू：误用为完全नकारात्मक。❌ 彼が悪いわけではない。（完全नकारात्मक，不自然）→ ✅ 彼が悪いわけではないが、もう少しध्यान दिनुहोस्してほしい。（部分नकारात्मक，后接विपरीत更自然）", "similar": [{"form": "〜とは限らない", "diff": "「わけではない」重在नकारात्मक断言，「とは限らない」重在जनाउँछ不确定性"}, {"form": "〜というものではない", "diff": "「わけではない」बोलीचाली化，「というものではない」更लिखित化和औपचारिक"}], "quiz": [{"q": "お金がない（　　）、ただ今は買う必要がないだけです。", "opts": ["A. わけではない", "B. ことではない", "C. ものではない", "D. はずではない"], "ans": "A", "exp": "जनाउँछ部分नकारात्मक「并不是没钱」，为后面的真实कारण做铺垫"}, {"q": "彼女は美人（　　）が、とても優しい人だ。", "opts": ["A. というわけだが", "B. なわけではない", "C. のわけだが", "D. だというわけだが"], "ans": "B", "exp": "「美人なわけではない」जनाउँछ「并不是美人」，后接「が」形成विपरीत"}, {"q": "日本語が難しい（　　）、勉強方法が悪いのかもしれません。", "opts": ["A. わけではないが", "B. ものではないが", "C. ことではないが", "D. はずではないが"], "ans": "A", "exp": "जनाउँछ「并不是日语难」，暗示सम्भावना是其他कारण（学习方法）"}]}, "34": {"analysis": "「〜てもらう」जनाउँछ说话者从他人那里得到恩惠或好处，जोड दिनु接受帮助的一方（说话者）的受益感。与单纯的被动语态फरक，这वटाव्याकरण带有感谢和受惠的情感色彩。「もらう」प्रयोग गरिन्छ对同辈或晚辈，「いただく」प्रयोग गरिन्छ对长辈或上级，体现了日语的敬语体系。", "mistakes": "❌ 先生は私に本を読んでもらった。(老师让我读了书) → ✅ 私は先生に本を読んでもらった。(我请老师给我读了书)。कर्ताअनिवार्य是受益者，不能是施惠者。❌ 友だちを荷物を持ってもらった。(助詞गलत) → ✅ 友だちに荷物を持ってもらった。施惠者用「に」标记。", "similar": [{"form": "〜てくれる", "diff": "जोड दिनु他人主动给予恩惠，视点在施惠者；〜てもらうजोड दिनु自己接受恩惠，视点在受益者"}, {"form": "〜てもらいたい", "diff": "जनाउँछइच्छा得到他人帮助的愿望；〜てもらうजनाउँछ已经得到帮助的事实"}, {"form": "〜ていただく", "diff": "〜てもらう的敬语形式，प्रयोग गरिन्छ对长辈或地位高的人表达感谢"}], "quiz": [{"q": "昨日、母____料理を作ってもらいました。", "opts": ["A. が", "B. を", "C. に", "D. で"], "ans": "C", "exp": "施惠者（母亲）用助詞「に」标记，जनाउँछ从母亲那里得到做饭的帮助"}, {"q": "部長____この資料を確認していただきました。", "opts": ["A. は", "B. が", "C. を", "D. に"], "ans": "D", "exp": "对上级प्रयोग敬语「いただく」，部長是施惠者用「に」标记"}, {"q": "友だち____宿題を手伝ってもらって、とても助かりました。", "opts": ["A. は", "B. が", "C. を", "D. に"], "ans": "D", "exp": "朋友是提供帮助的人（施惠者），用「に」标记，जनाउँछ从朋友那里得到帮助"}]}, "35": {"analysis": "「〜させられる」是使役受身形，जनाउँछ被迫或不情愿地做某事。它结合了使役形「させる」和受身形「られる」，जोड दिनुकार्य的非自愿性和被强制性。与单纯的受身फरक，这वटा文法突出了说话人的不满或无奈情绪。", "mistakes": "❌ 友達に映画を見させられた → ✅ 友達に映画を見に行かせられた（ध्यान दिनुहोस्動詞的使役形परिवर्तन）; ❌ 母に野菜を食べさせられる → ✅ 母に野菜を食べさせられた（时态要一致）; ❌ 先生に勉強させられている → ✅ 先生に勉強させられている（进行时सही，但要ध्यान दिनुहोस्सन्दर्भ是否自然）", "similar": [{"form": "〜れる/られる（受身）", "diff": "单纯受身不जोड दिनु被迫感，させられるजोड दिनु不情愿和被强制"}, {"form": "〜させる（使役）", "diff": "使役是主动让别人做，させられる是被动被迫做"}, {"form": "〜なければならない", "diff": "जनाउँछ义务अनिवार्य，させられるजोड दिनु外力强制和不情愿"}], "quiz": [{"q": "子供の頃、母に毎日ピアノを（____）。", "opts": ["A. 練習させた", "B. 練習させられた", "C. 練習された", "D. 練習しさせられた"], "ans": "B", "exp": "被母亲强迫练钢琴，用使役受身「練習させられた」जनाउँछ被迫和不情愿"}, {"q": "会議で突然発表を（____）、とても困った。", "opts": ["A. させた", "B. された", "C. させられて", "D. させられた"], "ans": "C", "exp": "「させられて、困った」，て形连接两वटाकार्य，जनाउँछ因为被迫发表而困扰"}, {"q": "昨日は友達に夜遅くまで付き合（____）。", "opts": ["A. わせた", "B. わされた", "C. わせられた", "D. われた"], "ans": "C", "exp": "「付き合わせられた」，う動詞的使役受身形，जनाउँछ被迫陪伴到很晚"}]}, "36": {"analysis": "「〜はずがない」जनाउँछ说话人基于常识、अनुभव或逻辑判断，认为某事绝对不सम्भावना发生。与单纯的नकारात्मकफरक，它जोड दिनु的是「根据道理来说不गर्नुपर्छ」的强烈नकारात्मक，常प्रयोग गरिन्छ为某人辩护或表达确信。", "mistakes": "सामान्य गल्तीहरू：与「〜わけがない」混淆。❌彼が来るわけがない（जोड दिनुनतिजा的不合理）→ ✅彼が来るはずがない（基于了解判断不सम्भावना）；时态गलत：❌彼が嘘をついたはずがない→ ✅彼が嘘をつくはずがない", "similar": [{"form": "〜わけがない", "diff": "「はずがない」基于常识判断，「わけがない」जोड दिनुनतिजा不合理"}, {"form": "〜ことはない", "diff": "「はずがない」表不सम्भावना，「ことはない」表不必要"}], "quiz": [{"q": "あの真面目な田中さんが遅刻する（　　）。", "opts": ["A.はずがない", "B.わけがない", "C.ことはない", "D.べきではない"], "ans": "A", "exp": "基于对田中认真性格的了解，判断他不सम्भावना迟到，用「はずがない」"}, {"q": "こんな簡単な問題が分から（　　）。", "opts": ["A.はずはない", "B.はずがない", "C.はずではない", "D.はずもない"], "ans": "B", "exp": "「はずがない」是固定搭配，不能说「はずはない」或「はずではない」"}, {"q": "彼女がそんなことを言う（　　）、きっと誤解だ。", "opts": ["A.わけがない", "B.ことがない", "C.はずがない", "D.べきがない"], "ans": "C", "exp": "基于对她的了解判断她不सम्भावना说那样的话，用「はずがない」最自然"}]}, "37": {"analysis": "「〜にちがいない」जनाउँछ说话者基于某种根据或观察，对事物做出强烈确信的अनुमान判断。与「〜はずだ」फरक，它更जोड दिनु内心的确信मात्रा，常प्रयोग गरिन्छ眼前能观察到的现象或已知信息的推理。接续时動詞形容詞用普通形，名詞和な形容詞词干直接加「にちがいない」。", "mistakes": "❌ 明日は雨が降るにちがいありません → ✅ 明日は雨が降るにちがいない（不能敬语化）\n❌ 彼は学生だにちがいない → ✅ 彼は学生にちがいない（名詞后不加「だ」）\n❌ きれいだにちがいない → ✅ きれいにちがいない（な形容詞词干直接接续）", "similar": [{"form": "〜はずだ", "diff": "はずだ基于逻辑推理，にちがいない基于直观确信"}, {"form": "〜だろう", "diff": "だろう表अनुमानसम्भावना性，にちがいない表强烈确信"}, {"form": "きっと〜だ", "diff": "きっと是副詞修饰，にちがいない是व्याकरण形式，确信度更强"}], "quiz": [{"q": "あの人は有名な俳優____。みんなが写真を撮っている。", "opts": ["A. にちがいない", "B. だろう", "C. かもしれない", "D. のようだ"], "ans": "A", "exp": "根据大家都在拍照这वटा现象，可以强烈确信那वटा人是有名演员，用「にちがいない」最合适"}, {"q": "この答え____。計算を三回も確認したから。", "opts": ["A. が正しいはずだ", "B. は正しいにちがいない", "C. を正しいだろう", "D. と正しいらしい"], "ans": "B", "exp": "基于三次确认计算这वटा事实，说话者对उत्तरसही性有强烈确信，用「にちがいない」"}, {"q": "彼女は今頃家に____。もう8時だし、いつも早く帰るから。", "opts": ["A. いるはず", "B. いるだろう", "C. いるにちがいない", "D. いるらしい"], "ans": "C", "exp": "基于समय和她平时早回家的बानी，说话者确信她वर्तमान在家，用「にちがいない」表达强烈确信"}]}, "38": {"analysis": "「〜てある」जनाउँछ他動詞कार्य完成后的अवस्था持续存在，जोड दिनु这种अवस्था是有人有意造成的नतिजा。与中文'已经~了'、'~着'相对应，但अनिवार्य体现人为性和持续性。", "mistakes": "सामान्य गल्तीहरू：❌自動詞：窓が開いてある → ✅他動詞：窓が開けてある（窗户开着）；❌非意图性：雨が降ってある → ✅意图性：傘が置いてある（伞放着）", "similar": [{"form": "〜ている", "diff": "〜ているは動作の継続や結果の状態、〜てあるは意図的な準備・配置の状態"}, {"form": "〜ておく", "diff": "〜ておくは事前準備の動作、〜てあるはその結果の状態"}], "quiz": [{"q": "壁に写真が（　　）。", "opts": ["A. 飾っている", "B. 飾ってある", "C. 飾っておく", "D. 飾っていく"], "ans": "B", "exp": "写真を飾るという他動詞の意図的な結果状態を表すので「飾ってある」が正解"}, {"q": "冷蔵庫にビールが（　　）。", "opts": ["A. 入っている", "B. 入ってある", "C. 買ってある", "D. 飲んである"], "ans": "B", "exp": "「入れる」という他動詞の結果状態で、意図的に入れられた状態を表す"}, {"q": "机の上に本が（　　）。", "opts": ["A. あってある", "B. いてある", "C. 置いてある", "D. なってある"], "ans": "C", "exp": "「置く」は他動詞で意図的な配置を表し、その結果状態が「置いてある」"}]}, "39": {"analysis": "「〜ことになっている」जनाउँछ既定的规则、制度或预定，जोड दिनु这是已经决定好的客观अवस्था，而非वटा人意志。与「〜ことにする」（वटा人决定）形成对比，前者是被动接受的规定，后者是主观决定。", "mistakes": "सामान्य गल्तीहरू：与「〜ことにする」混淆。❌私は毎日運動することにしています（表达गलत，गर्नुपर्छ是वटा人बानी）→ ✅私は毎日運動することにしている（我决定每天运动）；❌会議は来週することになります（未来的决定用错时态）→ ✅会議は来週することになっています（会议预定在下周举行）", "similar": [{"form": "〜ことにする", "diff": "主观决定vs客观规定，वटा人意志vs既定事实"}, {"form": "〜はずだ", "diff": "अनुमान判断vs确定的规则预定"}, {"form": "〜予定だ", "diff": "单纯计划vs制度化的安排"}], "quiz": [{"q": "この会社では、毎朝9時に出勤する____。", "opts": ["A. ことにする", "B. ことになっている", "C. はずだ", "D. 予定だ"], "ans": "B", "exp": "公司规定的上班समय是既定制度，用「ことになっている」"}, {"q": "子供は12歳まで映画を一人で見る____。", "opts": ["A. ことができない", "B. ことにしない", "C. ことになっていない", "D. はずではない"], "ans": "C", "exp": "电影院的年龄限制规定，12岁以下不能单独观看"}, {"q": "来月から新しいシステムを使う____。", "opts": ["A. ことにする", "B. ことになっている", "C. つもりだ", "D. だろう"], "ans": "B", "exp": "公司已经决定的新系统导入计划，是既定安排"}]}, "40": {"analysis": "「〜ばかりでなく」जनाउँछ不仅限于前项，还有后项的追加关系，जोड दिनु两वटा或多वटा优点、特征的并存。与「〜だけでなく」अर्थ相同但更लिखित化，常प्रयोग गरिन्छऔपचारिक场合或लिखित语中，体现了日语表达的层次感。", "mistakes": "❌ 彼は日本語ばかりでなく、中国語を話せます → ✅ 彼は日本語ばかりでなく、中国語も話せます（后项需要用「も」呼应前项的नकारात्मक）", "similar": [{"form": "〜だけでなく", "diff": "अर्थ完全相同，但「ばかりでなく」更लिखित化、औपचारिक"}, {"form": "〜のみならず", "diff": "更加लिखित化和औपचारिक，多प्रयोग गरिन्छलिखित语或演讲"}], "quiz": [{"q": "この料理は美味しい____、栄養価も高い。", "opts": ["A. ばかりでなく", "B. ばかりに", "C. ばかりで", "D. ばかりを"], "ans": "A", "exp": "जनाउँछ「不仅美味，营养价值也高」的追加关系，用「ばかりでなく」"}, {"q": "彼女は歌が上手____、踊りも得意だ。", "opts": ["A. だけに", "B. だけでなく", "C. だけで", "D. だけを"], "ans": "B", "exp": "「だけでなく」与「ばかりでなく」अर्थ相同，जनाउँछ不仅会唱歌，还会跳舞"}, {"q": "この本は内容が面白いばかりでなく、____安い。", "opts": ["A. でも", "B. そして", "C. 値段も", "D. 値段が"], "ans": "C", "exp": "प्रयोग「ばかりでなく」时，后项通常用「も」来呼应，जनाउँछ价格也便宜"}]}, "41": {"analysis": "「といった」是प्रयोग गरिन्छउदाहरणव्याख्या的表现形式，बराबर ह [{"form": "〜とともに", "diff": "更जोड दिनु同时性和伴随关系，常प्रयोग गरिन्छ抽象概念；にしたがって更जोड दिनु渐进的परिवर्तन过程"}, {"form": "〜につれ", "diff": "是につれて的缩略形，多प्रयोग गरिन्छलिखित语；につれて在बोलीचाली中更常见"}], "quiz": [{"q": "春が____、桜が咲き始めます。", "opts": ["A. 来るにしたがって", "B. 来たにしたがって", "C. 来るによって", "D. 来ることにしたがって"], "ans": "A", "exp": "動詞辞书形＋にしたがって，जनाउँछ随着春天到来，樱花开始开放的渐进परिवर्तन"}, {"q": "経験を積む____、仕事が上手になった。", "opts": ["A. にしたがって", "B. につれて", "C. とともに", "D. 以上सबै正确"], "ans": "D", "exp": "这三वटा表达都可以जनाउँछ随着अनुभव积累，工作技能提高的连动关系"}, {"q": "物価が上がる____、生活が苦しくなります。", "opts": ["A. について", "B. につれて", "C. によって", "D. にとって"], "ans": "B", "exp": "につれてजनाउँछ随着物价上涨，生活变得困难的同步परिवर्तन关系"}]}, "44": {"analysis": "「〜こそ」是जनाउँछजोड दिनु的助詞，用来突出说话人认为最重要或最符合शर्त的事物。与中文的「正是」、「就是」、「才是」相对应，但日语的जोड दिनु语气更为强烈。常प्रयोग गरिन्छ表达说话人的强烈主张或确信。", "mistakes": "易混淆जोड दिनुलक्ष्य和语序。❌ 友情こそが本当だ → ✅ これこそが本当の友情だ。ध्यान दिनुहोस्「こそ」要紧跟被जोड दिनु的词语，且多与「が」搭配प्रयोग。", "similar": [{"form": "〜にこそ", "diff": "「〜にこそ」प्रयोग गरिन्छजोड दिनुकार्य的लक्ष्य或स्थान，如「君にこそ話したい」"}, {"form": "〜でこそ", "diff": "「〜でこそ」जोड दिनुशर्त或手段，如「努力してこそ成功する」"}, {"form": "〜ばこそ", "diff": "「〜ばこそ」जनाउँछ「正因为...才...」的因果जोड दिनु关系"}], "quiz": [{"q": "彼（　　）真の友達だ。", "opts": ["A. こそが", "B. はこそ", "C. をこそ", "D. でこそ"], "ans": "A", "exp": "जोड दिनुकर्ता时用「こそが」，जनाउँछ「他才是真正的朋友」"}, {"q": "努力して（　　）成功できる。", "opts": ["A. こそが", "B. こそ", "C. はこそ", "D. にこそ"], "ans": "B", "exp": "動詞て形后直接接「こそ」，जनाउँछ「正是因为努力才能成功」"}, {"q": "今日（　　）頑張らなければならない。", "opts": ["A. でこそ", "B. をこそ", "C. こそ", "D. がこそ"], "ans": "C", "exp": "समय名詞后用「こそ」जोड दिनु，जनाउँछ「今天正是要努力的时候」"}]}, "45": {"analysis": "「〜さえ」是जनाउँछ极端例子的助詞，जोड दिनु连最不सम्भावना的情况都成立，其他情况更不用说。与中文「连...都」完全对应，प्रयोग गरिन्छ突出意外性和जोड दिनु效果。", "mistakes": "❌ 彼さえ来なかった。→ ✅ 彼でさえ来なかった。（连他都没来。）ध्यान दिनुहोस्：人称代词后अनिवार्य用「でさえ」而非「さえ」。", "similar": [{"form": "〜でも", "diff": "でもजनाउँछ让步「即使」，さえजनाउँछ极端例子「连...都」"}, {"form": "〜まで", "diff": "までजनाउँछ范围扩大「甚至到」，さえजोड दिनु意外的极端情况"}], "quiz": [{"q": "先生（____）この問題がわからない。", "opts": ["A. さえ", "B. でさえ", "C. まで", "D. でも"], "ans": "B", "exp": "「 . ので", "B. かわりに", "C. ために", "D. けれども"], "ans": "B", "exp": "जनाउँछ以多加班作为交换得到高工资，用「かわりに」"}, {"q": "今日は忙しい____、明日手伝ってもらえませんか。", "opts": ["A. かわりに", "B. ので", "C. のに", "D. から"], "ans": "B", "exp": "जनाउँछकारण理由用「ので」，不是交换关系"}]}, "48": {"analysis": "「においては」和「にかけては」都जनाउँछ在某वटा特定领域或方面的评价，但प्रयोग场合略有फरक。「においては」更औपचारिक，常प्रयोग गरिन्छ学术或औपचारिक场合；「にかけては」更बोलीचाली化，जोड दिनु在某方面的专长或突出表现。两者都比「について」更जोड दिनुसीमित性，即仅在该特定方面的情况。", "mistakes": "❌ 日本語を勉強することにおいては難しい → ✅ 日本語の勉強においては難しい（接续गलत，应接名詞）; ❌ 彼は料理においては上手だ → ✅ 彼は料理にかけては上手だ（जनाउँछ擅长时用「にかけては」更自然）", "similar": [{"form": "について", "diff": "「について」是一般的关于，「においては」更जोड दिनु在特定领域内的सीमित"}, {"form": "に関して", "diff": "「に関して」जनाउँछ与某事相关，「においては」更जोड दिनु在该方面的具体评价或状况"}, {"form": "の点で", "diff": "「の点で」जनाउँछ从某वटा角度看，「においては」更औपचारिक且जोड दिनु领域性"}], "quiz": [{"q": "経済____、この国は発展途上国だ。", "opts": ["A. においては", "B. について", "C. に関して", "D. によって"], "ans": "A", "exp": "जनाउँछ在经济方面的评价，用「においては」最合适"}, {"q": "彼女は語学____、誰にも負けない。", "opts": ["A. について", "B. においては", "C. にかけては", "D. に対して"], "ans": "C", "exp": "जनाउँछ在语言学习方面很擅长，用「にかけては」更自然"}, {"q": "技術の面____、日本は世界一流だ。", "opts": ["A. にかけて", "B. について", "C. においては", "D. に関して"], "ans": "C", "exp": "「面において」是固定搭配，जनाउँछ在某वटा方面"}]}, "49": {"analysis": "「〜にたいして」जनाउँछकार्य或态度的लक्ष्य、दिशा，जोड दिनु「针对」「面向」的概念。与「〜について」相比，更जोड दिनु对立性或回应性，常प्रयोग गरिन्छजनाउँछ对某事物的反应、态度或措施。", "mistakes": "易混淆लक्ष्यछनौट：❌ 友達にたいして話した → ✅ 友達と話した（日常对话用「と」）；❌ 勉強にたいして頑張る → ✅ 勉強を頑張る（努力的लक्ष्य用「を」）", "similar": [{"form": "〜について", "diff": "「について」जनाउँछ话题内容，「にたいして」जनाउँछकार्यलक्ष्य，更具对立性"}, {"form": "〜に向けて", "diff": "「に向けて」जोड दिनुदिशा性，「にたいして」更जोड दिनु回应性和对立关系"}], "quiz": [{"q": "市民の要求（____）、市長は新しい政策を発表した。", "opts": ["A. について", "B. にたいして", "C. によって", "D. として"], "ans": "B", "exp": "जनाउँछ针对市民要求的回应，用「にたいして」जनाउँछलक्ष्य"}, {"q": "この薬は風邪（____）効果がある。", "opts": ["A. にたいして", "B. について", "C. によって", "D. として"], "ans": "A", "exp": "जनाउँछ药物针对感冒的效果，「にたいして」जनाउँछ作用लक्ष्य"}, {"q": "先生の質問（____）、学生は答えられなかった。", "opts": ["A. について", "B. として", "C. にたいして", "D. によって"], "ans": "C", "exp": "जनाउँछ针对老师的提问，学生的反应，用「にたいして」"}]}, "50": {"analysis": "「〜にわたって」जनाउँछसमय或空间的广泛延续，जोड दिनु持续性和范围的广度。与中文「历时/遍及/长达」相对应，常प्रयोग गरिन्छवर्णन长期持续的कार्य或覆盖广泛范围的अवस्था。", "mistakes": "❌ 一日にわたって勉強した → ✅ 一日中勉強した（短समय用「中」）❌ 全国にわたった会議 → ✅ 全国にわたる会議（修饰名詞用「わたる」）", "similar": [{"form": "〜を通じて", "diff": "通じて侧重「通过某种手段/媒介」，にわたって侧重「时空范围的延续」"}, {"form": "〜中（ちゅう）", "diff": "中प्रयोग गरिन्छ相对短的समय段，にわたってप्रयोग गरिन्छ较长समय或广泛范围"}], "quiz": [{"q": "この調査は5か国____行われた。", "opts": ["A. にわたって", "B. を通じて", "C. によって", "D. について"], "ans": "A", "exp": "जनाउँछ调查范围遍及5वटा国家，用「にわたって」जनाउँछ空间范围的广泛性"}, {"q": "10年間____続いた戦争がやっと終わった。", "opts": ["A. を通して", "B. にかけて", "C. にわたって", "D. において"], "ans": "C", "exp": "जनाउँछ战争持续了长达10年，用「にわたって」जोड दिनुसमय的长期延续"}, {"q": "彼の影響は多くの分野____及んでいる。", "opts": ["A. にわたって", "B. に対して", "C. について", "D. において"], "ans": "A", "exp": "जनाउँछ影响遍及多वटा领域，用「にわたって」जनाउँछ范围的广泛性"}]}, "51": {"analysis": "「〜とは思えない」जनाउँछ基于说话者的判断或观察，认为某事不太सम्भावना发生或不符合常理的नकारात्मकअनुमान。与单纯的「〜と思わない」相比，「〜とは思えない」语气更强烈，带有「无论如何都无法相信」的अर्थ。这वटा句型常प्रयोग गरिन्छ表达对他人行为、状况परिवर्तन等的强烈质疑。", "mistakes": "❌ 彼は来ないとは思えない → ✅ 彼は来るとは思えない（नकारात्मकअनुमानगर्नुपर्छ针对सकारात्मक形式）; ❌ 雨が降ったとは思えない → ✅ 雨が降るとは思えない（जनाउँछअनुमान时用非भूतकाल形）", "similar": [{"form": "〜と思わない", "diff": "単純なनकारात्मक的意見，語気較温和"}, {"form": "〜はずがない", "diff": "基于逻辑推理的强烈नकारात्मक，更客观"}, {"form": "〜わけがない", "diff": "जनाउँछ绝对不सम्भावना，语气最强烈"}], "quiz": [{"q": "彼女がそんな嘘を（　　）。", "opts": ["A. つくとは思えない", "B. ついたとは思えない", "C. つくとは思わない", "D. つくと思えない"], "ans": "A", "exp": "जनाउँछनकारात्मकअनुमान时用非भूतकाल形「つく」，且「とは思えない」比「とは思わない」语气更强"}, {"q": "この問題がそう簡単に（　　）。", "opts": ["A. 解決するとは思わない", "B. 解決したとは思えない", "C. 解決するとは思えない", "D. 解決すると思えない"], "ans": "C", "exp": "对未来的नकारात्मकअनुमान用非भूतकाल形，「とは思えない」表达强烈的质疑"}, {"q": "彼がもう帰国（　　）。昨日会ったばかりなのに。", "opts": ["A. するとは思えない", "B. したとは思えない", "C. するとは思わない", "D. したと思えない"], "ans": "B", "exp": "已经发生的事情用भूतकाल形「した」，जनाउँछ无法相信已经发生的事实"}]}, "52": {"analysis": "「〜に決まっている」जनाउँछ说话人对某事的强烈确信，बराबर हो中文的「सकारात्मक是〜」「一定是〜」。与单纯的अनुमानफरक，这वटा文法带有断定的语气，जनाउँछ说话人认为这是理所当然的नतिजा。常प्रयोग गरिन्छ表达基于अनुभव或常识的判断。", "mistakes": "❌ 雨が降るに決まります → ✅ 雨が降るに決まっている（不能用丁宁语）\n❌ 彼が学生であるに決まっている → ✅ 彼は学生に決まっている（名詞直接接续）\n❌ きっと来るに決まっているでしょう → ✅ きっと来るに決まっている（不与अनुमान表现重复प्रयोग）", "similar": [{"form": "〜はずだ", "diff": "「はずだ」是基于客观शर्त的合理अनुमान；「に決まっている」是主观确信的断定"}, {"form": "〜違いない", "diff": "「違いない」जोड दिनु没有疑问；「に決まっている」更जोड दिनु理所当然性"}], "quiz": [{"q": "あの人は有名人____。みんなが写真を撮っている。", "opts": ["A. に決まっている", "B. はずである", "C. かもしれない", "D. だろう"], "ans": "A", "exp": "根据「みんなが写真を撮っている」这वटा明显的证据，说话人确信对方是名人，用「に決まっている」表达断定性确信"}, {"q": "こんな高い値段では、誰も買わない____。", "opts": ["A. はずです", "B. に決まっています", "C. でしょう", "D. と思います"], "ans": "B", "exp": "基于常识判断，这么高的价格当然没人买，表达理所当然的确信用「に決まっている」"}, {"q": "彼は忙しい人だから、今度のパーティーも来ない____。", "opts": ["A. に決まっている", "B. かもしれない", "C. と思う", "D. ようだ"], "ans": "A", "exp": "基于对其忙碌性格的了解，说话人断定他不会来参加聚会，用「に決まっている」表达确信"}]}, "53": {"analysis": "「〜だって」是बोलीचाली中常用的助詞，जनाउँछ「〜でも」「〜も」的अर्थ，带有जोड दिनु语气。可以जनाउँछ追加（पूरकव्याख्या）、反驳（反对某种观点）或जोड दिनु等语感。相比लिखित语的「〜も」，「だって」更加生动自然，常प्रयोग गरिन्छदैनिक कुराकानी中表达说话人的情感态度。", "mistakes": "❌ 私もだって行きたい。→ ✅ 私だって行きたい。（だって本身就包含「も」的अर्थ，不需要重复प्रयोग）❌ 彼はだって学生です。→ ✅ 彼だって学生です。（だって直接接在名詞后，不需要助詞「は」）", "similar": [{"form": "〜も", "diff": "「も」是标准लिखित语表达，「だって」是बोलीचाली化表达，语气更强烈"}, {"form": "〜でも", "diff": "「でも」多जनाउँछ让步或उदाहरण，「だって」更偏向反驳或जोड दिनु"}], "quiz": [{"q": "子供（____）できることなのに、大人ができないなんて。", "opts": ["A. でも", "B. だって", "C. ても", "D. なら"], "ans": "B", "exp": "此处जनाउँछ反驳语气「连孩子都能做到」，用「だって」最自然"}, {"q": "A：君は若いからいいね。B：私（____）もう30歳ですよ。", "opts": ["A. には", "B. だって", "C. から", "D. として"], "ans": "B", "exp": "B在反驳A的话，जनाउँछ「我也已经30岁了」，用「だって」表达反驳语气"}, {"q": "今度の旅行、田中さん（____）参加するそうです。", "opts": ["A. だって", "B. ばかり", "C. しか", "D. さえ"], "ans": "A", "exp": "जनाउँछ追加信息「连田中也要参加」，「だって」प्रयोग गरिन्छबोलीचाली中的追加व्याख्या"}]}, "54": {"analysis": "「〜かな」是表达自言自语、疑问或इच्छा的终助詞，语气तुलना柔和。与「〜だろうか」相比更加बोलीचाली化，常प्रयोग गरिन्छ内心独白或对他人的轻柔询问。可以接在普通形后面，名詞后面通常加「だ」再接「かな」。", "mistakes": "❌ 明日は雨が降りますかな。（过于औपचारिक）→ ✅ 明日は雨が降るかな。（自然的自言自语）\n❌ 学生ですかな。（听起来古怪）→ ✅ 学生かな。（自然的疑问）", "similar": [{"form": "〜だろうか", "diff": "「だろうか」更औपचारिक，常प्रयोग गरिन्छलिखित语；「かな」更बोलीचाली化，多प्रयोग गरिन्छ日常对话"}, {"form": "〜かしら", "diff": "「かしら」主要是女性用语；「かな」男女都可以प्रयोग"}], "quiz": [{"q": "彼はもう帰った____。", "opts": ["A. かな", "B. ですかな", "C. だろうかな", "D. のかな"], "ans": "A", "exp": "「帰った」是भूतकाल形的普通形，直接接「かな」जनाउँछ自言自语的疑问"}, {"q": "今日は暖かい____。", "opts": ["A. ですかな", "B. かな", "C. だかな", "D. のかな"], "ans": "B", "exp": "い形容詞「暖かい」后面直接接「かな」，जनाउँछ对天气的感叹疑问"}, {"q": "あの人は先生____。", "opts": ["A. ですかな", "B. のかな", "C. かな", "D. だかな"], "ans": "C", "exp": "名詞「先生」后面直接接「かな」，जनाउँछ对身份的अनुमान疑问"}]}, "55": {"analysis": "「〜っけ」是जनाउँछ努力回忆或向对方确认的句末助詞，बराबर हो中文的「来着」。它体现了说话人对某件事印象模糊，正在努力回想的心理अवस्था。प्रयोग时语调通常上扬，带有疑问的语气。", "mistakes": "सामान्य गल्तीहरू：时态混乱和प्रयोग场合不当。❌ 明日の会議、何時だっけ？→ ✅ 明日の会議、何時だったっけ？（明天的会议几点来着？）❌ すみません、駅はどこですか？→ ✅ 駅はどこだったっけ？（车站在哪里来着？-प्रयोग गरिन्छ自言自语）", "similar": [{"form": "〜かな", "diff": "「かな」जनाउँछअनुमान或自问，「っけ」专门जनाउँछ努力回忆确认"}, {"form": "〜でしたっけ", "diff": "「でしたっけ」是敬语形式，प्रयोग गरिन्छ对上级或不熟悉的人"}], "quiz": [{"q": "昨日見た映画のタイトル、なん____？", "opts": ["A.だっけ", "B.だったっけ", "C.でしたっけ", "D.かな"], "ans": "B", "exp": "努力回忆भूतकाल的事情用「だったっけ」"}, {"q": "田中さんの電話番号____覚えていますか？", "opts": ["A.っけ", "B.だっけ", "C.を", "D.が"], "ans": "C", "exp": "这里不是回忆确认，而是询问，用「を」"}, {"q": "先生、宿題の締切____？", "opts": ["A.いつだっけ", "B.いつでしたっけ", "C.いつかな", "D.いつですか"], "ans": "B", "exp": "对老师用敬语形式「でしたっけ」"}]}, "56": {"analysis": "〜わ/�/な是日语中重要的终助詞，प्रयोग गरिन्छ表达说话者的भावना和语气。「わ」多प्रयोग गरिन्छ女性，जनाउँछ轻柔的भावना；「ぞ」多प्रयोग गरिन्छ男性，जनाउँछ强烈的意志或决心；「な」प्रयोग गरिन्छनिषेध或感叹，语气较强烈。这些终助詞能够细腻地表达日语特有的语感和人际关系的微妙差别。", "mistakes": "सामान्य गल्तीहरू：混淆प्रयोग场合和性别差异。❌ 男性说「今日は暑いわ」→ ✅「今日は暑いぞ」；❌ 对上级说「頑張るぞ」→ ✅「頑張ります」；❌ 把「な」的निषेध用法用错 ❌「勉強するな」(निषेध学习) → ✅「勉強しなさい」(要学习)", "similar": [{"form": "〜よ", "diff": "「よ」比「ぞ」语气更轻，男女通用"}, {"form": "〜ね", "diff": "「ね」जनाउँछ寻求同意，「な」जनाउँछ感叹或निषेध"}, {"form": "〜だ", "diff": "「だ」是断定，「ぞ」在断定基础上加强语气"}], "quiz": [{"q": "男性がよく使う終助詞はどれですか。明日は試験だ____。", "opts": ["A. わ", "B. ぞ", "C. ね", "D. の"], "ans": "B", "exp": "「ぞ」は男性がよく使う終助詞で、意志や決意を強く表します"}, {"q": "「危険だから近づく____」の____に入る適切な終助詞は？", "opts": ["A. わ", "B. ぞ", "C. な", "D. よ"], "ans": "C", "exp": "「な」はनिषेधを表す終助詞です。「近づくな」で「近づいてはいけない」というअर्थ"}, {"q": "女性がよく使う終助詞で「きれい____」を完成させると？", "opts": ["A. ぞ", "B. な", "C. だ", "D. わ"], "ans": "D", "exp": "「わ」は女性がよく使う終助詞で、感嘆や軽い断定を表します"}]}, "57": {"analysis": "「〜ものだ」是N3重要व्याकरण，表达三种含义：①自然规律或常识（人はいつか老いるものだ），②गर्नुपर्छ做的事情或社会道德（年上の人を敬うものだ），③भूतकाल的बानी（子供の頃はよく川で泳いだものだ）。ध्यान दिनुहोस्区分情感色彩：感慨用भूतकाल式動詞，常识用वर्तमान式。", "mistakes": "❌ 昨日映画を見るものだった → ✅ 昨日映画を見たものだ（भूतकालबानी用た形+ものだ）; ❌ 学生はもっと勉強するものです → ✅ 学生はもっと勉強するものだ（感慨・常识不用です形）; ❌ 子供の時、よく遊ぶものだった → ✅ 子供の時、よく遊んだものだ", "similar": [{"form": "〜べきだ", "diff": "べきだजोड दिनु义务责任，ものだ表达常识或感慨"}, {"form": "〜たものだ", "diff": "たものだ专指भूतकालबानी回忆，ものだ含义更广"}, {"form": "〜はずだ", "diff": "はずだ表अनुमान判断，ものだ表常识感慨"}], "quiz": [{"q": "人間は誰でも間違いを____。", "opts": ["A. するはずだ", "B. するものだ", "C. するべきだ", "D. したものだ"], "ans": "B", "exp": "表达人的本性或常识，用「するものだ」最合适"}, {"q": "子供の頃、祖母の家でよく昔話を____。", "opts": ["A. 聞くものだ", "B. 聞いたものだ", "C. 聞くべきだ", "D. 聞くはずだ"], "ans": "B", "exp": "回忆भूतकाल的बानी，用「聞いたものだ」表达怀念之情"}, {"q": "学生たるもの、勉強に励む____。", "opts": ["A. ものです", "B. はずだ", "C. ものだ", "D. べきだ"], "ans": "C", "exp": "表达作为学生应有的常识或道德观念，用「ものだ」"}]}, "58": {"analysis": "「〜もの/もん」是जनाउँछ理由或辩解的बोलीचाली表达，常प्रयोग गरिन्छ为自己的行为或अवस्था进行解释व्याख्या。「もん」是「もの」的缩略形，更加随意亲密，多प्रयोग गरिन्छ女性和儿童。这वटा文法带有撒娇、辩解的语气，不适合औपचारिक场合प्रयोग。", "mistakes": "सामान्य गल्तीहरू：❌ 明日は雨だものから、行きません → ✅ 明日は雨だもの、行きません（不能加「から」重复जनाउँछ理由）；❌ 先生、疲れているんだもん → ✅ 先生、疲れているんです（对长辈不宜प्रयोग撒娇语气）", "similar": [{"form": "〜から", "diff": "「から」是中性的理由表达，「もの/もん」带有撒娇、辩解的भावना色彩"}, {"form": "〜ので", "diff": "「ので」较为客观礼貌，「もの/もん」更主观且带有辩解अर्थ"}], "quiz": [{"q": "子供が泣いているのは、お腹が空いている____。", "opts": ["A. んだもの", "B. んだから", "C. ので", "D. によって"], "ans": "A", "exp": "जनाउँछ为孩子哭泣进行辩解व्याख्या，用「んだもの」最合适"}, {"q": "「どうして宿題をしなかったの？」「だって、難し過ぎる____。」", "opts": ["A. から", "B. ので", "C. んだもん", "D. によると"], "ans": "C", "exp": "面对责问时的辩解，用撒娇语气的「んだもん」符合सन्दर्भ"}, {"q": "以下哪वटा场合不适合प्रयोग「〜もの/もん」？", "opts": ["A. 对朋友解释迟到原因", "B. 向上司汇报工作", "C. 孩子对父母撒娇", "D. 恋人间的对话"], "ans": "B", "exp": "「もの/もん」是बोलीचाली化的撒娇表达，不适合औपचारिक的工作场合"}]}, "59": {"analysis": "「〜てやる」和「〜てくれる」是日语中जनाउँछ授受关系的重要文法，体现了日语独特的「给予」概念。「〜てやる」जनाउँछ说话者为他人做某事，带有恩惠色彩，बोलीचाली中常显得有些居高临下；「〜てくれる」जनाउँछ他人为说话者做某事，含感谢之意。两者都体现了日语中人际关系的微妙层次。", "mistakes": "❌ 先生が教えてやってくださった → ✅ 先生が教えてくださった（对上级不能用「てやる」）\n❌ 私が母に手伝ってくれた → ✅ 私が母に手伝ってやった（कर्ता是「私」时不能用「てくれる」）\n❌ 友達が宿題を教えてやった → ✅ 友達が宿題を教えてくれた（他人为我做事用「てくれる」）", "similar": [{"form": "〜てあげる", "diff": "更礼貌औपचारिक，无居高临下感"}, {"form": "〜てもらう", "diff": "从接受者角度表达，「我让别人为我做」"}], "quiz": [{"q": "弟に宿題を手伝って____。", "opts": ["A. やった", "B. くれた", "C. もらった", "D. あげた"], "ans": "A", "exp": "「私が弟に」为弟弟做事，用「てやる」"}, {"q": "友達がノートを貸して____よ。", "opts": ["A. やった", "B. くれた", "C. もらった", "D. あげた"], "ans": "B", "exp": "朋友为我做事（借笔记），用「てくれる」जनाउँछ感谢"}, {"q": "お金を貸して____よ。（अनुरोध帮助）", "opts": ["A. やって", "B. くれて", "C. もらって", "D. あげて"], "ans": "A", "exp": "बोलीचाली中अनुरोध别人为自己做事，用「てやる」"}]}, "60": {"analysis": "「〜に関して」是औपचारिक的लिखित语表达，常प्रयोग गरिन्छ学术论文、报告、औपचारिक文件等场合，जनाउँछ「关于～」「有关～」的अर्थ。与बोलीचाली的「〜について」相比，显得更加औपचारिक和客观。该文法可以用「に関する」的形式作连体修饰语。", "mistakes": "❌ 友達に関して話しましょう → ✅ 友達について話しましょう（日常对话中不用过于औपचारिक的表达）\n❌ この件に関してる意見 → ✅ この件に関する意見（连体修饰时用「に関する」）\n❌ 天気に関して心配です → ✅ 天気について心配です（वटा人भावना表达时用「について」更自然）", "similar": [{"form": "〜について", "diff": "बोलीचाली化，दैनिक कुराकानी中常用，较为随意"}, {"form": "〜に対して", "diff": "जोड दिनु态度、意见、行为的लक्ष्य，有对立或面对的语感"}, {"form": "〜をめぐって", "diff": "जनाउँछ围绕某वटा问题展开讨论或争论，常含有争议性"}], "quiz": [{"q": "環境問題____、国際会議が開かれた。", "opts": ["A. について", "B. に関して", "C. に対して", "D. をめぐって"], "ans": "B", "exp": "औपचारिक的国际会议用लिखित语「に関して」最合适"}, {"q": "今度の旅行____相談がある。", "opts": ["A. に関して", "B. に関する", "C. について", "D. に対して"], "ans": "C", "exp": "日常对话中的相商用「について」更自然"}, {"q": "教育制度____論文を書いています。", "opts": ["A. についての", "B. に関する", "C. に対する", "D. をめぐる"], "ans": "B", "exp": "学术论文的औपचारिक表达，连体修饰用「に関する」"}]}, "61": {"analysis": "「〜にとって」जनाउँछ从某वटा立场或角度进行价值判断，जोड दिनु主观评价。与中文「对...来说」相似，但更偏重于表达वटा人立场的价值观念。常与形容詞或价值评价词搭配प्रयोग。", "mistakes": "❌ 私は家族にとって大切だ → ✅ 私にとって家族が大切だ（कर्ता搞错，गर्नुपर्छ是评价लक्ष्य作कर्ता）\n❌ 学生たちにとって勉強します → ✅ 学生たちにとって勉強は大変だ（不能直接接動詞，需要接评价性表达）", "similar": [{"form": "〜にとって vs 〜について", "diff": "にとってजनाउँछ立场的价值判断，についてजनाउँछ话题范围"}, {"form": "〜にとって vs 〜から見ると", "diff": "にとってजोड दिनुवटा人价值观，から見るとजोड दिनु客观视角"}], "quiz": [{"q": "子供____、このゲームはとても面白いらしい。", "opts": ["A. について", "B. にとって", "C. に対して", "D. として"], "ans": "B", "exp": "जनाउँछ从孩子的立场来看的价值判断，用「にとって」"}, {"q": "彼____一番大切なのは仕事だ。", "opts": ["A. にとって", "B. について", "C. に関して", "D. によって"], "ans": "A", "exp": "जनाउँछ从他的立场来看的价值判断，用「にとって」"}, {"q": "外国人の学生____、漢字を覚えるのは____。", "opts": ["A. にとって...簡単だ", "B. について...勉強する", "C. にとって...大変だ", "D. として...教える"], "ans": "C", "exp": "从外国学生的立场来看的价值判断，记汉字很辛苦"}]}, "62": {"analysis": "「〜によると」是जनाउँछ信息来源的文法，बराबर हो中文的「根据〜」「据〜」。它客观地引用他人或某种媒体、资料的信息，说话者通常不对信息的真实性负责，只是转述。与中文फरक，日语中अनिवार्य明确标出信息来源，体现了日语重视信息出处的特点。", "mistakes": "❌ テレビによると言った → ✅ テレビによると言っていた（转述时时态要对应）\n❌ 友達によると、彼は来ると言いました → ✅ 友達によると、彼は来るそうです（转述用そうです更自然）\n❌ 新聞によると書いてある → ✅ 新聞によると書いてあった（时态一致性）", "similar": [{"form": "〜によれば", "diff": "अर्थ相同，但によれば更औपचारिक，多प्रयोग गरिन्छलिखित语"}, {"form": "〜そうです", "diff": "都जनाउँछ传闻，但そうです不明示信息来源"}, {"form": "〜らしいです", "diff": "表अनुमान传闻，によると更जोड दिनु明确的信息来源"}], "quiz": [{"q": "ニュース____、台風が近づいているそうです。", "opts": ["A. によると", "B. について", "C. に対して", "D. において"], "ans": "A", "exp": "जनाउँछ根据新闻的信息，用によるとजनाउँछ信息来源"}, {"q": "医者の話____、手術は成功したらしい。", "opts": ["A. による", "B. によると", "C. によって", "D. に関して"], "ans": "B", "exp": "根据医生的话这वटा信息来源，用によると"}, {"q": "天気予報____明日は晴れるそうだ。正しい時制はどれですか。", "opts": ["A. によると、", "B. によって、", "C. について、", "D. に関して、"], "ans": "A", "exp": "जनाउँछ根据天气预报的信息来源，用によると"}]}, "63": {"analysis": "「〜という点で」जनाउँछ从某वटा特定角度或方面来评价、तुलना事物的特征。与「〜について」फरक，它जोड दिनु的是具体的评价标准或判断基准。常प्रयोग गरिन्छ客观विश्लेषण和तुलना场景。", "mistakes": "❌ 彼は優しいという点では好きです。→ ✅ 彼は優しいという点で評価できます。（「という点で」多प्रयोग गरिन्छ客观评价，不太适合表达वटा人喜好）", "similar": [{"form": "〜に関して", "diff": "「に関して」जनाउँछ关于某话题，「という点で」जोड दिनु从某角度评价"}, {"form": "〜について", "diff": "「について」जनाउँछ关于某事，「という点で」专指从某方面来评判"}], "quiz": [{"q": "価格が安い____、このスマホは魅力的だ。", "opts": ["A. について", "B. という点で", "C. に対して", "D. によって"], "ans": "B", "exp": "从价格便宜这一点来评价，用「という点で」"}, {"q": "彼女は____優秀だが、コミュニケーションक्षमताという点では課題がある。", "opts": ["A. 技術的に", "B. 技術的な", "C. 技術的", "D. 技術"], "ans": "A", "exp": "副詞「技術的に」修饰「優秀」，与后文「という点では」形成对比"}, {"q": "この車は燃費がいい____は他社より劣っている。", "opts": ["A. という点では良いが、デザイン", "B. が、デザインという点で", "C. という点で良いが、デザインという点では", "D. けれど、デザインについて"], "ans": "C", "exp": "前半用「という点で良い」，后半用「という点では」形成完整的对比表达"}]}, "64": {"analysis": "「〜てたまらない」表达强烈到无法忍受的भावना或感觉，常प्रयोग गरिन्छ主观的内在体验。此文法जोड दिनुभावना的强烈मात्रा已经超出了正常的承受范围，多प्रयोग गरिन्छ第一人称的表达。与「〜てならない」在某些情况下可以互换，但「たまらない」更बोलीचाली化，भावना色彩更强烈。", "mistakes": "❌ 彼は嬉しくてたまらないと言った → ✅ 彼は嬉しくてたまらないようだ（他人のभावनाは推測表現を使う）\n❌ 暑いでたまらない → ✅ 暑くてたまらない（い形容詞は「くて」जोडाइ）\n❌ 静かでたまらない → ✅ 静かすぎる（な形容詞は通常「で」ではजोडाइしない）", "similar": [{"form": "〜てならない", "diff": "書面語色彩更强，多प्रयोग गरिन्छ文学作品；たまらない更बोलीचाली化"}, {"form": "〜てしょうがない", "diff": "表达困扰、麻烦的भावना；たまらないजोड दिनु无法忍受的मात्रा"}, {"form": "〜てしかたがない", "diff": "与しょうがない同义，但更औपचारिक；たまらないभावना色彩更强烈"}], "quiz": [{"q": "彼女のことが心配____。", "opts": ["A. してたまらない", "B. でたまらない", "C. くてたまらない", "D. でしかたがない"], "ans": "A", "exp": "動詞「心配する」的て形是「心配して」，所以用「心配してたまらない」"}, {"q": "今日は____たまらない。", "opts": ["A. 暑いで", "B. 暑くて", "C. 暑いく", "D. 暑いに"], "ans": "B", "exp": "い形容詞「暑い」的连接形是「暑くて」，后接「たまらない」"}, {"q": "子供の頃、母の料理が____たまらなかった。", "opts": ["A. 恋しく", "B. 恋しいで", "C. 恋しくて", "D. 恋しいくて"], "ans": "C", "exp": "い形容詞「恋しい」的て形是「恋しくて」，表达非常怀念母亲的料理"}]}, "65": {"analysis": "「〜ておく」जनाउँछ维持某种अवस्था或放置不管，जोड दिनु让事物保持现有अवस्था。与जनाउँछ事前准备的「〜ておく」फरक，这里重点是अवस्था的持续性。常प्रयोग गरिन्छअनुरोध他人保持某种अवस्था或जनाउँछ暂时放置的अर्थ。", "mistakes": "सामान्य गल्तीहरू：混淆准备用法和维持用法。❌ドアを開けておきます（जनाउँछ准备）→ ✅ドアを開けておいてください（जनाउँछ维持开着的अवस्था）。ध्यान दिनुहोस्「〜ておく」后接「ください」时通常जनाउँछ维持अवस्था的अनुरोध。", "similar": [{"form": "〜ておく（準備）", "diff": "जनाउँछ事前准备，如「買い物をしておく」；而维持用法जनाउँछ保持अवस्था，如「そのままにしておく」"}, {"form": "〜たまま", "diff": "单纯जनाउँछअवस्था持续，如「ドアが開いたまま」；「〜ておく」含有意图性，जनाउँछ有意维持某अवस्था"}], "quiz": [{"q": "荷物をここに（　　）ください。", "opts": ["A. 置いて", "B. 置いておいて", "C. 置かれて", "D. 置くように"], "ans": "B", "exp": "जनाउँछअनुरोध维持放置的अवस्था，用「置いておいてください」"}, {"q": "問題があるかもしれませんが、今日はこのまま（　　）ましょう。", "opts": ["A. しておき", "B. しまい", "C. しておき", "D. やめ"], "ans": "A", "exp": "जनाउँछ暂时维持现状不处理，用「このままにしておく」"}, {"q": "電気を（　　）ください。暗いですから。", "opts": ["A. 点けて", "B. 点けないで", "C. 点けておいて", "D. 点けられて"], "ans": "C", "exp": "अनुरोध保持电灯开着的अवस्था，用「点けておいてください」"}]}, "66": {"analysis": "「もっとも」是जनाउँछ最高级的副詞，用来जोड दिनु某事物在某方面达到了最高मात्रा。与「一番」「最も」含义相近但更加औपचारिक，常प्रयोग गरिन्छलिखित语中表达绝对的最高级概念。", "mistakes": "❌ これが一番もっとも安全な方法だ → ✅ これがもっとも安全な方法だ（不能与「一番」重复प्रयोग）❌ もっとも早く行きます → ✅ もっとも早い方法で行きます（修饰形容詞，不直接修饰動詞）", "similar": [{"form": "一番", "diff": "「一番」更बोलीचाली化，「もっとも」更औपचारिकलिखित"}, {"form": "最も", "diff": "「最も」是汉语词汇，「もっとも」是和语词汇，语感稍有फरक"}], "quiz": [{"q": "この中で____難しい問題はどれですか。", "opts": ["A. 一番", "B. もっとも", "C. とても", "D. 大変"], "ans": "B", "exp": "जनाउँछ最高级时用「もっとも」最自然औपचारिक"}, {"q": "彼は____優秀な学生の一人だ。", "opts": ["A. とても", "B. 大変", "C. もっとも", "D. かなり"], "ans": "C", "exp": "जोड दिनु在所有学生中是最优秀的，用「もっとも」"}, {"q": "____重要なことは健康です。", "opts": ["A. 一番", "B. もっとも", "C. とても", "D. 非常に"], "ans": "B", "exp": "表达最重要的概念，「もっとも」更适合这种औपचारिक表达"}]}, "67": {"analysis": "「ずっと」जनाउँछकार्यअवस्था的持续或मात्रा的强烈对比。प्रयोग गरिन्छ持续时，जोड दिनु从भूतकाल到वर्तमान或भविष्यकाल的连续性；प्रयोग गरिन्छतुलना时，जनाउँछमात्रा差异很大，बराबर हो中文的「远比」「比...得多」。", "mistakes": "सामान्य गल्तीहरू：与「いつも」混淆。❌いつも勉強しています（जनाउँछबानी） → ✅ずっと勉強しています（जनाउँछ持续अवस्था）；时态搭配गलत：❌昨日ずっと映画を見ました → ✅昨日映画をずっと見ました", "similar": [{"form": "いつも", "diff": "ずっとजोड दिनु持续性，いつもजोड दिनुबानी性"}, {"form": "ながく", "diff": "ながく客观वर्णनसमय长度，ずっと主观जोड दिनु持续感"}, {"form": "もっと", "diff": "もっとजनाउँछ「更加」，ずっとजनाउँछ「远比/一直」"}], "quiz": [{"q": "彼は私____背が高い。", "opts": ["A. ずっと", "B. いつも", "C. もっと", "D. ながく"], "ans": "A", "exp": "जनाउँछमात्रा差异很大，用「ずっと」जनाउँछ「远比」"}, {"q": "子供の頃から____ピアノを習っています。", "opts": ["A. いつも", "B. ずっと", "C. よく", "D. たくさん"], "ans": "B", "exp": "从भूतकाल到वर्तमान的持续अवस्था，用「ずっと」"}, {"q": "今日は____寒いですね。", "opts": ["A. ずっと", "B. とても", "C. いつも", "D. よく"], "ans": "A", "exp": "जनाउँछ比平时寒冷मात्रा高很多，用「ずっと」जनाउँछमात्रा差异"}]}, "68": {"analysis": "「なかなか」是一वटा重要的副詞，具有两种截然फरक的用法：1）与नकारात्मक形式搭配时जनाउँछ「怎么也不～」「总是不～」，जोड दिनु期待的नतिजा迟迟不出现；2）与सकारात्मक形式（特别是形容詞）搭配时जनाउँछ「相当～」「挺～的」，含有超出预期的赞赏之意。这种双重性质使其成为日语中表达微妙语感的重要工具。", "mistakes": "❌ なかなか上手です → ✅ なかなか上手ですね（सकारात्मक用法需要感叹语气）\n❌ この問題はなかなか簡単ではありません → ✅ この問題はなかなか簡単ではないですね / なかなか解けません\n❌ なかなか美味しくないです → ✅ あまり美味しくないです（नकारात्मक形容詞不用なかなか）", "similar": [{"form": "ちっとも〜ない", "diff": "ちっとも更जोड दिनु完全没有，なかなかजोड दिनु过程漫长"}, {"form": "とても/すごく", "diff": "とても是纯粹的मात्रा副詞，なかなか含有意外、超出预期的语感"}, {"form": "全然〜ない", "diff": "全然जोड दिनु完全没有，なかなかजोड दिनु期待落空的过程"}], "quiz": [{"q": "日本語は難しくて、____覚えられません。", "opts": ["A. なかなか", "B. とても", "C. ちょっと", "D. きっと"], "ans": "A", "exp": "जनाउँछ「怎么也记不住」，なかなか与नकारात्मक形搭配जनाउँछ期待的नतिजा迟迟不出现"}, {"q": "この映画は____面白かったです。", "opts": ["A. あまり", "B. なかなか", "C. ぜんぜん", "D. ちっとも"], "ans": "B", "exp": "なかなか与सकारात्मक形容詞搭配，जनाउँछ「相当有趣」，含有超出预期的赞赏"}, {"q": "雨が____やみませんね。", "opts": ["A. きっと", "B. もう", "C. なかなか", "D. やっぱり"], "ans": "C", "exp": "जनाउँछ「雨怎么也不停」，なかなか＋नकारात्मक動詞जनाउँछ期待的状况迟迟不出现"}]}, "69": {"analysis": "「〜てしまっている」जनाउँछकार्य已经完成且其नतिजाअवस्था持续到वर्तमान，जोड दिनु完成后的持续अवस्था。与单纯的「〜てしまった」फरक，它更注重नतिजा的वर्तमान性和持续性。这वटा文法常प्रयोग गरिन्छवर्णन不可逆转的अवस्था或令人遗憾的既成事实。", "mistakes": "❌ 宿題をしてしまっています（作业做完了）→ ✅ 宿題をやってしまっています。❌ 電車は行ってしまっています（电车已经走了）→ ✅ 電車は出発してしまっています。ध्यान दिनुहोस्動詞छनौट要自然，避免直译中文思维。", "similar": [{"form": "〜てしまった", "diff": "जनाउँछ完成，但不जोड दिनुअवस्था的持续性"}, {"form": "〜ている", "diff": "जनाउँछ进行或नतिजाअवस्था，但无完了感和遗憾感"}, {"form": "〜てある", "diff": "जनाउँछ他動詞的नतिजाअवस्था保持，无完了感"}], "quiz": [{"q": "窓が（____）います。", "opts": ["A. 開けてしまって", "B. 開いてしまって", "C. 開けている", "D. 開いている"], "ans": "B", "exp": "窓が開く是自動詞，जनाउँछ窗户已经开着的अवस्था持续中"}, {"q": "彼はもう帰国（____）います。", "opts": ["A. してしまって", "B. していて", "C. したて", "D. するて"], "ans": "A", "exp": "帰国してしまっているजनाउँछ已经回国了，这वटाअवस्था持续到वर्तमान"}, {"q": "大切な書類を（____）いて、困っています。", "opts": ["A. なくして", "B. なくしてしまって", "C. なくている", "D. なくしている"], "ans": "B", "exp": "なくしてしまっているजनाउँछ重要文件已经丢失了，这वटाअवस्था持续中，带有遗憾的语感"}]}, "70": {"analysis": "「〜ているところ」जनाउँछकार्य正在进行的瞬间अवस्था，जोड दिनु「正好在做某事的时刻」。与单纯的「〜ている」相比，更突出समय点的精确性和临场感。常प्रयोग गरिन्छव्याख्या当前正在进行的具体行为。", "mistakes": "❌ 昨日、勉強しているところでした → ✅ 昨日、勉強していました（भूतकाल不用ところ）\n❌ 毎日勉強しているところです → ✅ 毎日勉強しています（बानी性कार्य不用ところ）", "similar": [{"form": "〜ている", "diff": "ている是一般进行时，ているところजोड दिनु正在进行的瞬间"}, {"form": "〜ているうちに", "diff": "うちにजनाउँछ在某कार्य持续期间发生其他事情"}], "quiz": [{"q": "A：何をしていますか。B：今、宿題を____。", "opts": ["A. しているところです", "B. するところです", "C. したところです", "D. しておくところです"], "ans": "A", "exp": "वर्तमान正在做作业，用しているところですजनाउँछ正在进行中"}, {"q": "電話に出られませんでした。お風呂に____からです。", "opts": ["A. 入っているところ", "B. 入るところ", "C. 入ったところ", "D. 入っていたところ"], "ans": "D", "exp": "भूतकाल正在洗澡所以没接电话，用भूतकाल时ていたところ"}, {"q": "すみません、今____ので、後で電話します。", "opts": ["A. 会議するところ", "B. 会議しているところ", "C. 会議したところ", "D. 会議していたところ"], "ans": "B", "exp": "वर्तमान正在开会，所以稍后打电话，用वर्तमान进行时"}]}, "71": {"analysis": "「〜かどうか」是जनाउँछ二择间接疑问的文法，प्रयोग गरिन्छ询问某事是否成立，बराबर हो中文的「是否」「会不会」。与直接疑问句फरक，它将疑问内容作为名詞性从句प्रयोग，常与「わからない」「知らない」「聞く」等動詞搭配。", "mistakes": "❌ 彼が来るか来ないかどうか、わかりません → ✅ 彼が来るかどうか、わかりません（不能重复表达छनौट）❌ 何時に来るかどうか、教えてください → ✅ 何時に来るか、教えてください（疑问词疑问句不用かどうか）", "similar": [{"form": "〜か〜ないか", "diff": "अर्थ相同但表达更明确，如「行くか行かないか」vs「行くかどうか」"}, {"form": "疑问词＋か", "diff": "प्रयोग गरिन्छ具体疑问（何・誰・いつ等），かどうかप्रयोग गरिन्छ是非疑问"}], "quiz": [{"q": "明日雨が降る____、天気予報を見てください。", "opts": ["A. かどうか", "B. かどこか", "C. かだれか", "D. かいつか"], "ans": "A", "exp": "「是否下雨」是二择疑问，用かどうか"}, {"q": "彼女が____知りません。", "opts": ["A. 元気かどうか", "B. 元気かどこか", "C. 元気はどうか", "D. 元気がどうか"], "ans": "A", "exp": "「是否健康」用かどうかजनाउँछ间接疑问"}, {"q": "____、まだ決まっていません。", "opts": ["A. 誰が来るかどうか", "B. 参加するかどうか", "C. いつ行くかどうか", "D. どこで会うかどうか"], "ans": "B", "exp": "かどうか只能प्रयोग गरिन्छ是非疑问，不能与疑问词（誰・いつ・どこ）一起प्रयोग"}]}, "72": {"analysis": "「〜ないかもしれない」जनाउँछ对某事不发生的अनुमान，语气比「〜ない」更委婉。这是「ない形＋かもしれない」的固定搭配，प्रयोग गरिन्छ表达说话人认为某事有不发生的सम्भावना性。与中文「也许不」「सम्भावना不」相对应，常प्रयोग गरिन्छ不确定的अनुमान场合。", "mistakes": "❌ 彼は来るないかもしれない → ✅ 彼は来ないかもしれない（動詞要用ない形再加かもしれない）\n❌ 雨が降らないじゃないかもしれない → ✅ 雨が降らないかもしれない（不要重复नकारात्मक）", "similar": [{"form": "〜かもしれない", "diff": "जनाउँछसकारात्मक的सम्भावना性अनुमान，而〜ないかもしれないजनाउँछनकारात्मक的सम्भावना性अनुमान"}, {"form": "〜ないでしょう", "diff": "ないでしょう语气更确定，ないかもしれない更不确定、更委婉"}], "quiz": [{"q": "明日は雨が（____）。", "opts": ["A. 降らないかもしれない", "B. 降るないかもしれない", "C. 降らないじゃないかもしれない", "D. 降らかもしれない"], "ans": "A", "exp": "動詞「降る」的ない形是「降らない」，再加「かもしれない」"}, {"q": "田中さんはパーティーに（____）。", "opts": ["A. 参加するないかもしれない", "B. 参加しないかもしれない", "C. 参加ないかもしれない", "D. 参加しなかもしれない"], "ans": "B", "exp": "動詞「参加する」的ない形是「参加しない」，再加「かもしれない」"}, {"q": "この料理は子供には（____）。", "opts": ["A. 食べるないかもしれない", "B. 食べかもしれない", "C. 食べないかもしれない", "D. 食べらないかもしれない"], "ans": "C", "exp": "動詞「食べる」的ない形是「食べない」，जनाउँछ孩子सम्भावना不吃这道菜"}]}, "73": {"analysis": "〜ように言う是जनाउँछ间接आदेश或अनुरोध的重要文法，प्रयोग गरिन्छ转述他人的要求或指示。与直接引用फरक，它将आदेश句转换为客观的叙述形式，常प्रयोग गरिन्छऔपचारिक场合或礼貌表达。ध्यान दिनुहोस्動詞需प्रयोग辞书形或ない形，体现了日语间接表达的特点。", "mistakes": "❌ 先生に早く提出してくださいように言われた → ✅ 先生に早く提出するように言われた（不能加敬语形式）\n❌ 母に薬を飲んだように言われた → ✅ 母に薬を飲むように言われた（प्रयोग辞书形而非भूतकाल式）", "similar": [{"form": "〜と言う", "diff": "直接引用原话，〜ように言う是间接转述"}, {"form": "〜ようにする", "diff": "जनाउँछ自己努力做某事，〜ように言う是转述他人要求"}], "quiz": [{"q": "母は私に野菜を____食べるように言いました。", "opts": ["A. たくさん", "B. もっと", "C. よく", "D. いっぱい"], "ans": "B", "exp": "もっとजनाउँछ'更多'，符合母亲要求多吃蔬菜的सन्दर्भ"}, {"q": "部長に____ように言われて、会議に参加した。", "opts": ["A. 出席した", "B. 出席して", "C. 出席する", "D. 出席しろ"], "ans": "C", "exp": "〜ように言う前的動詞अनिवार्यप्रयोग辞书形"}, {"q": "先生は学生に宿題を____ように言った。", "opts": ["A. 忘れる", "B. 忘れた", "C. 忘れない", "D. 忘れなかった"], "ans": "C", "exp": "जनाउँछ'不要忘记作业'，प्रयोग動詞ない形"}]}, "74": {"analysis": "「〜ために（कारण）」जनाउँछ客观कारण或理由，बराबर हो中文的「因为〜」「由于〜」。与उद्देश्य用法फरक，कारण用法通常प्रयोग गरिन्छवर्णन已经发生的事情或客观事实的因果关系。", "mistakes": "❌ 病気のために、学校を休みたいです。（उद्देश्य混用）→ ✅ 病気のために、学校を休みました。（भूतकाल事实）/ 病気なので、学校を休みたいです。（वर्तमान理由用〜ので）", "similar": [{"form": "〜ために（目的）", "diff": "कारण用法वर्णन已发生事实的कारण；उद्देश्य用法जनाउँछ行为的उद्देश्य，常与意志動詞搭配"}, {"form": "〜ので", "diff": "〜ので更主观，语气较软；〜ために更客观，多प्रयोग गरिन्छ客观कारण"}], "quiz": [{"q": "台風____、電車が止まった。", "opts": ["A. ために", "B. ように", "C. ことに", "D. ばかりに"], "ans": "A", "exp": "台风是电车停运的客观कारण，用「ために（कारण）」"}, {"q": "事故____、道路が渋滞している。", "opts": ["A. ように", "B. ために", "C. ことで", "D. として"], "ans": "B", "exp": "事故导致道路拥堵，जनाउँछ客观कारण用「ために」"}, {"q": "雪____、飛行機が遅れました。", "opts": ["A. によって", "B. として", "C. ために", "D. について"], "ans": "C", "exp": "下雪是飞机延误的कारण，用「ために（कारण）」जनाउँछ客观因果关系"}]}, "75": {"analysis": "「〜ところに/へ」जनाउँछ在某वटासमय点或时机发生的巧合，जोड दिनुसमय的微妙性。与「〜とき」फरक，「ところに/へ」更जोड दिनु恰好在那वटा瞬间发生的偶然性和时机的巧合。", "mistakes": "❌ 食べているところに友達が来た → ✅ 食べようとしたところに友達が来た（गर्नुपर्छ用意志形+とした）❌ 昨日行ったところに雨が降った → ✅ 出かけたところに雨が降り始めた（गर्नुपर्छजनाउँछ具体的समय点）", "similar": [{"form": "〜とき", "diff": "「とき」जनाउँछ一般的समय，「ところに/へ」जोड दिनु巧合的时机"}, {"form": "〜途中で", "diff": "「途中で」जनाउँछ过程中，「ところに/へ」जनाउँछ特定समय点的巧合"}], "quiz": [{"q": "家を____ところに、雨が降り始めた。", "opts": ["A. 出る", "B. 出た", "C. 出ている", "D. 出よう"], "ans": "B", "exp": "「た形+ところに」जनाउँछ刚刚完成某कार्य的时候，这里指刚出家门就下雨了"}, {"q": "電話を____ところへ、母が部屋に入ってきた。", "opts": ["A. かける", "B. かけた", "C. かけている", "D. かけよう"], "ans": "A", "exp": "「辞書形+ところに/へ」जनाउँछ正要做某事的时候，这里指正要打电话的时候"}, {"q": "寝____ところに、友達から連絡があった。", "opts": ["A. る", "B. た", "C. よう", "D. ようとした"], "ans": "D", "exp": "「〜ようとしたところに」是固定搭配，जनाउँछ正要做某事的时候发生了其他事情"}]}, "77": {"analysis": "「〜のではないか」是जनाउँछअनुमान或疑念的文法，说话者对某种情况有一定把握但不完全确定时प्रयोग。与「〜と思う」相比，这वटा表达更含蓄，带有征求对方意见或确认的语气。在敬语场合常用「〜のではないでしょうか」。", "mistakes": "❌ 雨が降るのではないかと思います。（重复表达अनुमान） → ✅ 雨が降るのではないでしょうか。或 雨が降ると思います。；❌ 彼が来ないのではないかでしょう。（接续गलत） → ✅ 彼が来ないのではないでしょうか。", "similar": [{"form": "〜と思う", "diff": "「〜と思う」直接表达वटा人想法，「〜のではないか」更含蓄，暗含征求意见"}, {"form": "〜だろう", "diff": "「〜だろう」纯粹अनुमान，「〜のではないか」带有疑问和确认的语气"}], "quiz": [{"q": "もう時間が____のではないでしょうか。", "opts": ["A. ない", "B. なかった", "C. ある", "D. あった"], "ans": "A", "exp": "「時間がない」是固定搭配，जनाउँछ没समय了，用नकारात्मक形接续"}, {"q": "田中さんはもう____のではないかと思います。", "opts": ["A. 帰る", "B. 帰った", "C. 帰って", "D. 帰り"], "ans": "B", "exp": "जनाउँछअनुमान已经完成的कार्य，用भूतकाल形「帰った」"}, {"q": "この問題は少し____のではないでしょうか。", "opts": ["A. 難しい", "B. 難しかった", "C. 難しく", "D. 難しいだ"], "ans": "A", "exp": "形容詞直接用普通形接续，「難しい」जनाउँछवर्तमान的अवस्था"}]}, "79": {"analysis": "「〜てあげる」जनाउँछ为他人提供帮助或服务的敬语表现。当लक्ष्य是上级时，प्रयोग「さしあげる」जनाउँछ谦让；对同级或下级时प्रयोग「あげる」。这वटा文法体现了日语中重要的上下级关系和敬语系统。", "mistakes": "सामान्य गल्तीहरू：लक्ष्य搞错敬语形式。❌友達にお茶を入れてさしあげました → ✅友達にお茶を入れてあげました（对朋友不用谦让语）。❌社長に資料をコピーしてあげました → ✅社長に資料をコピーしてさしあげました（对上级要用谦让语）。", "similar": [{"form": "〜てもらう", "diff": "接受他人帮助，视角相反"}, {"form": "〜てくれる", "diff": "他人为自己做某事，不涉及敬语छनौट"}], "quiz": [{"q": "部長に資料を____。", "opts": ["A. 作ってあげました", "B. 作ってさしあげました", "C. 作ってもらいました", "D. 作ってくれました"], "ans": "B", "exp": "对上级（部長）提供服务时，अनिवार्यप्रयोग谦让语「さしあげる」"}, {"q": "弟に宿題を____。", "opts": ["A. 手伝ってさしあげました", "B. 手伝ってもらいました", "C. 手伝ってあげました", "D. 手伝ってくれました"], "ans": "C", "exp": "对家人或下级帮助时प्रयोग「あげる」，不需要谦让语"}, {"q": "お客様にお茶を____。", "opts": ["A. 入れてあげました", "B. 入れてさしあげました", "C. 入れてもらいました", "D. 入れてくださいました"], "ans": "B", "exp": "对客人（お客様）提供服务时अनिवार्यप्रयोग谦让语「さしあげる」जनाउँछ尊敬"}]}, "80": {"analysis": "「〜ながら（逆接）」जनाउँछ逆接विपरीत，与同态的「〜ながら（同时）」在语义上完全फरक。常与「残念」「申し訳」等表达遗憾、歉意的词汇搭配प्रयोग，体现说话者的客观态度。「ながらも」比单纯的「ながら」语气更强，जोड दिनु对比的鲜明性。", "mistakes": "❌ 学生ながら、お金持ちです。→ ✅ 学生ながら、よく勉強します。（逆接ながら不能जनाउँछ身份对比，गर्नुपर्छजनाउँछविपरीत关系）❌ 忙しいながら来ました。→ ✅ 忙しいながらも来ました。（形容詞后多用「ながらも」）", "similar": [{"form": "〜のに", "diff": "「のに」语气更强烈，带有不满；「ながら」更客观中性"}, {"form": "〜けれど", "diff": "「けれど」可प्रयोग गरिन्छ各种场合；「ながら」多प्रयोग गरिन्छऔपचारिक表达"}, {"form": "〜ながら（同时）", "diff": "同时ながら表并行कार्य；逆接ながら表विपरीत关系"}], "quiz": [{"q": "彼は若い____、経験豊富だ。", "opts": ["A. ながら", "B. ながらも", "C. のに", "D. けれど"], "ans": "B", "exp": "形容詞后的逆接विपरीत多用「ながらも」，जोड दिनु虽然年轻但अनुभव丰富的对比"}, {"q": "____、お手伝いできません。", "opts": ["A. 残念ながら", "B. 残念ながらも", "C. 残念のに", "D. 残念だから"], "ans": "A", "exp": "「残念ながら」是固定搭配，जनाउँछ遗憾地विपरीत"}, {"q": "小さい会社____、技術力は高い。", "opts": ["A. ながら", "B. ながらも", "C. だから", "D. ので"], "ans": "B", "exp": "形容詞＋ながらもजनाउँछ逆接，虽然是小公司但技术力很高"}]}, "81": {"analysis": "「〜てしかたがない」表达强烈的भावनाअवस्था，无法抑制或控制。多प्रयोग गरिन्छ 味道却很好，जनाउँछ超出价格期待的品质"}]}, "102": {"analysis": "「〜一方で」प्रयोग गरिन्छ表达同一事物的两वटा相对或对比的方面，जोड दिनु事物具有两面性。与中文的「另一方面」「与此同时」相似，但更注重客观陈述两वटा并存的特征，不含विपरीत的主观色彩。", "mistakes": "❌ 彼は優しい一方で、時々厳しいです。→ ✅ 彼は優しい一方で、時々厳しい。（一方で后面不用敬语形式，保持普通形）❌ 便利な一方では、危険もある。→ ✅ 便利な一方で、危険もある。（で不能省略）", "similar": [{"form": "〜反面", "diff": "反面更जोड दिनु负面的对比，一方で可प्रयोग गरिन्छ中性对比"}, {"form": "〜ものの", "diff": "ものの含有逆接विपरीतअर्थ，一方で纯粹जनाउँछ并存"}, {"form": "〜けれど", "diff": "けれど是逆接，一方で是客观समानान्तर对比"}], "quiz": [{"q": "この薬は効果がある____、副作用も心配だ。", "opts": ["A. 一方で", "B. 一方", "C. 一方に", "D. 一方から"], "ans": "A", "exp": "जनाउँछ药物有效果的同时也有副作用这两वटा方面，用「一方で」"}, {"q": "彼女は仕事が忙しい一方____、家事もきちんとこなしている。", "opts": ["A. に", "B. を", "C. で", "D. と"], "ans": "C", "exp": "「一方で」是固定搭配，で不能省略或替换"}, {"q": "インターネットは便利な____、プライバシーの問題もある。", "opts": ["A. 一方では", "B. 一方で", "C. 一方に", "D. 一方を"], "ans": "B", "exp": "जनाउँछ网络便利性和隐私问题并存，用「一方で」，不加「は」"}]}, "103": {"analysis": "「どんなに〜ても」जनाउँछ无论मात्रा多么强烈也不改变नतिजा，जोड दिनु逆接关系。与「いくら〜ても」अर्थ相近，但「どんなに」更偏重于情感色彩和主观感受的表达。常प्रयोग गरिन्छ表达坚定意志或客观事实不受मात्रा影响。", "mistakes": "❌ どんなに忙しいから、手伝ってください → ✅ どんなに忙しくても、手伝ってください（逆接用ても，不用から）❌ どんなに勉強したても → ✅ どんなに勉強しても（動詞用基本形+ても）❌ どんなに元気でても → ✅ どんなに元気でも（ナ形容詞用でも）", "similar": [{"form": "いくら〜ても", "diff": "अर्थ基本相同，但「いくら」更客观理性，「どんなに」更主观情感"}, {"form": "たとえ〜ても", "diff": "「たとえ」जनाउँछअनुमान极端情况，「どんなに」जोड दिनुमात्रा深浅"}], "quiz": [{"q": "どんなに____、合格できませんでした。", "opts": ["A. 勉強したても", "B. 勉強しても", "C. 勉強するても", "D. 勉強ても"], "ans": "B", "exp": "動詞接续用基本形+ても，「勉強する」去掉「る」变成「勉強しても」"}, {"q": "どんなに高く____、買いたいです。", "opts": ["A. ても", "B. でも", "C. たって", "D. だって"], "ans": "A", "exp": "イ形容詞接续用「形容詞去い+くても」，「高い」变成「高くても」"}, {"q": "どんなに静か____、集中できない。", "opts": ["A. ても", "B. くても", "C. でも", "D. だても"], "ans": "C", "exp": "ナ形容詞接续用「形容詞+でも」，「静か」是ナ形容詞，用「静かでも」"}]}, "104": {"analysis": "「〜てもかまわない」जनाउँछअनुमति或不在意，比「〜てもいい」更औपचारिक客气。常प्रयोग गरिन्छजनाउँछ对方的行为不会给自己造成困扰，或允许对方做某事。在商务场合和敬语表达中प्रयोग频率较高。", "mistakes": "❌ 食べなくてもかまわない → ✅ 食べなくてもかまいません（नकारात्मक形式गर्नुपर्छ在動詞上，不是在かまわない上）\n❌ 来るでもかまわない → ✅ 来てもかまわない（अनिवार्य用 form": "〜を発見する", "diff": "「発見する」多प्रयोग गरिन्छ重大发现，「気づく」प्रयोग गरिन्छ日常生活中的小发现或察觉"}], "quiz": [{"q": "彼女の変化____気づいた。", "opts": ["A. を", "B. に", "C. が", "D. で"], "ans": "B", "exp": "「〜に気づく」是固定搭配，अनिवार्यप्रयोग助詞「に」"}, {"q": "間違い____気づいて、すぐに訂正した。", "opts": ["A. をしたことに", "B. したことを", "C. をしたに", "D. したことに"], "ans": "D", "exp": "動詞普通形+ことに気づく，जनाउँछ意识到做了某事"}, {"q": "最近、日本語____上達していることに気づいた。", "opts": ["A. を", "B. に", "C. が", "D. の"], "ans": "C", "exp": "在「こと」从句中，कर्ता用「が」标记，जनाउँछ「日语在进步这件事」"}]}, "107": {"analysis": "「〜ことにする」जनाउँछ主体主观的决定或意志，जोड दिनु自己做出的छनौट；「〜ことになる」जनाउँछ客观情况或外部因素导致的नतिजा，主体往往是被动接受的。两者都用動詞辞书形，但意志性完全फरक。", "mistakes": "❌来年、日本に留学することになりました（自己决定时误用）→ ✅来年、日本に留学することにしました ❌会社の都合で転勤することにしました（被动情况误用）→ ✅会社の都合で転勤することになりました", "similar": [{"form": "〜ようにする/なる", "diff": "ようにするजनाउँछ努力达成某种अवस्था，ことにするजनाउँछ明确决定做某事"}, {"form": "〜つもりだ", "diff": "つもりだजनाउँछ打算或意图，ことにするजनाउँछ已经决定的事情"}], "quiz": [{"q": "会社の人事異動で大阪に転勤____。", "opts": ["A. することにしました", "B. することになりました", "C. するつもりです", "D. するようにしました"], "ans": "B", "exp": "人事异动是公司决定的，不是自己的意志，用「ことになる」"}, {"q": "健康のために禁煙____。", "opts": ["A. することになりました", "B. するつもりです", "C. することにしました", "D. するようになりました"], "ans": "C", "exp": "为了健康而戒烟是自己的决定，用「ことにする」"}, {"q": "新しい法律で、来月からマスク着用が義務____。", "opts": ["A. にすることにしました", "B. にすることになりました", "C. にするつもりです", "D. にするようにしました"], "ans": "B", "exp": "法律规定是外部决定的客观情况，用「ことになる」"}]}, "108": {"analysis": "「〜を中心に」जनाउँछ以某事物作为核心或焦点进行活动，जोड दिनु围绕某वटा重点展开。与中文「以...为中心」अर्थ相近，但日语更जोड दिनुकार्य或अवस्था的展开方式。常प्रयोग गरिन्छवर्णन地理位置、组织结构、活动范围等场景。", "mistakes": "易混淆「を中心に」和「を中心として」的प्रयोग场合。❌ 会議を中心に話し合った → ✅ 会議を中心として話し合った（会议本身不是中心，गर्नुपर्छ是围绕某话题）。❌ 私を中心に考える → ✅ 私を中心として考える（以我为主体思考时用として）", "similar": [{"form": "〜を中心として", "diff": "更औपचारिक，多प्रयोग गरिन्छलिखित语；を中心に更बोलीचाली化，प्रयोग范围更广"}, {"form": "〜を軸に", "diff": "जोड दिनु以某事物为轴心旋转发展；を中心に侧重于围绕展开"}, {"form": "〜をめぐって", "diff": "जनाउँछ围绕某问题进行讨论或争论；を中心に更中性，不含争议色彩"}], "quiz": [{"q": "この地域は大学（____）発展してきた。", "opts": ["A. を中心に", "B. を中心で", "C. の中心に", "D. が中心に"], "ans": "A", "exp": "「を中心に」是固定搭配，जनाउँछ以大学为中心发展"}, {"q": "家族（____）生活を考えています。", "opts": ["A. を中心で", "B. を中心に", "C. の中心で", "D. に中心を"], "ans": "B", "exp": "जनाउँछ以家族为中心考虑生活，用「を中心に」"}, {"q": "駅（____）商店街が広がっている。", "opts": ["A. の中心に", "B. が中心に", "C. を中心に", "D. で中心に"], "ans": "C", "exp": "जनाउँछ以车站为中心商店街向外扩展，用「を中心に」"}]}, "109": {"analysis": "「〜を通じて/を通して」जनाउँछ通过某种媒介、手段或在某वटा期间内实现某种नतिजा。两者基本同义，但「を通じて」更औपचारिक，常प्रयोग गरिन्छलिखित语；「を通して」更बोलीचाली化。这वटा文法जोड दिनु过程性和持续性，不是瞬间的कार्य。", "mistakes": "❌ 友達を通じて会った → ✅ 友達を通して紹介してもらった（经朋友介绍认识的）\n❌ 一日を通じて雨だった → ✅ 一日を通して雨だった（整天都在下雨）\n❌ テレビを通じて見た → ✅ テレビを通して知った（通过电视了解到）", "similar": [{"form": "〜によって", "diff": "「によって」जोड दिनुकारण、手段、作者；「を通じて」जोड दिनु媒介和过程"}, {"form": "〜で", "diff": "「で」जनाउँछ手段工具；「を通じて」जोड दिनु通过某种渠道或媒介"}], "quiz": [{"q": "インターネット____、世界中の人と交流できる。", "opts": ["A. を通じて", "B. によって", "C. として", "D. について"], "ans": "A", "exp": "通过互联网这一媒介进行交流，用「を通じて」"}, {"q": "一年____の努力で、日本語が上手になった。", "opts": ["A. を通じて", "B. を通して", "C. によって", "D. から"], "ans": "B", "exp": "जनाउँछ在一年这वटा期间内持续努力，「を通して」更自然"}, {"q": "友人の紹介____、この仕事を見つけました。", "opts": ["A. を通じて", "B. を通して", "C. で", "D. から"], "ans": "A", "exp": "通过朋友介绍这一渠道找到工作，用「を通じて」"}]}, "110": {"analysis": "「〜向けに/向きに」जनाउँछ针对特定लक्ष्य或群体而设计、制作或提供某事物，जोड दिनु目标导向性。「向けに」多प्रयोग गरिन्छकार्य，「向きの」多修饰名詞，两者在实际प्रयोग中अर्थ基本相同，但व्याकरण功能略有फरक。", "mistakes": "易混淆「向けに」和「向きに」的प्रयोग场合。❌子供向きにこの本を書きました → ✅子供向けにこの本を書きました（कार्य用「向けに」）；❌初心者向けな教材 → ✅初心者向けの教材（修饰名詞用「向きの」）", "similar": [{"form": "〜のために", "diff": "「のために」जनाउँछउद्देश्य或受益者，范围更广；「向けに」专指针对特定群体设计"}, {"form": "〜に対して", "diff": "「に対して」जनाउँछलक्ष्य或态度；「向けに」जोड दिनु为特定लक्ष्य量身定制"}], "quiz": [{"q": "外国人____の日本語教材が人気です。", "opts": ["A.向けに", "B.向きの", "C.向いて", "D.向かって"], "ans": "B", "exp": "修饰名詞「教材」用「向きの」"}, {"q": "この商品は高齢者____開発されました。", "opts": ["A.向きに", "B.向きの", "C.向けに", "D.向かいに"], "ans": "C", "exp": "動詞「開発される」前用「向けに」जनाउँछ针对लक्ष्य"}, {"q": "女性____ファッション雑誌をよく読みます。", "opts": ["A.向けに", "B.向きな", "C.向きの", "D.向いた"], "ans": "C", "exp": "修饰名詞「ファッション雑誌」用「向きの」"}]}, "111": {"analysis": "「〜について」是N3重要文法，ज orm": "〜とき", "diff": "「とき」प्रयोग गरिन्छ一般时机，「に際して」专प्रयोग गरिन्छ重要、औपचारिक的场合"}], "quiz": [{"q": "卒業____、先生にお礼を言いたいです。", "opts": ["A. に際して", "B. について", "C. に対して", "D. において"], "ans": "A", "exp": "卒业是重要时刻，用「に際して」जनाउँछ在这वटा重要场合"}, {"q": "新製品の発売____、記者会見を行います。", "opts": ["A. とき", "B. に際して", "C. ながら", "D. ついでに"], "ans": "B", "exp": "新产品发售是公司的重要事件，用「に際して」जनाउँछ在这वटा重要时机"}, {"q": "結婚____、両親に挨拶をしました。", "opts": ["A. に関して", "B. について", "C. に際して", "D. に向けて"], "ans": "C", "exp": "结婚是人生重要时刻，用「に際して」जनाउँछ在这वटा重要场合"}]}, "114": {"analysis": "「〜に応じて」जनाउँछ根据某种情况、शर्त或要求做出相应的调整或对应。与中文「根据」फरक的是，它जोड दिनु的是灵活的适应性调整，而非单纯的依据。这वटा文法常प्रयोग गरिन्छ商务场合，体现出专业的服务态度和灵活应对的क्षमता。", "mistakes": "सामान्य गल्तीहरू：与「〜によって」混淆。❌ 天気によって服装を変える → ✅ 天気に応じて服装を変える（根据天气调整服装）。「によって」जनाउँछकारण理由，「に応じて」जनाउँछ适应调整。", "similar": [{"form": "〜によって", "diff": "「によって」जनाउँछकारण手段，「に応じて」जनाउँछ适应调整"}, {"form": "〜に合わせて", "diff": "「に合わせて」侧重配合迎合，「に応じて」侧重灵活对应"}], "quiz": [{"q": "経験____、給料が決まります。", "opts": ["A. に応じて", "B. によって", "C. について", "D. として"], "ans": "A", "exp": "根据अनुभव来决定工资，体现灵活调整，用「に応じて」"}, {"q": "この商品は年齢____デザインが違います。", "opts": ["A. によって", "B. に応じて", "C. に対して", "D. として"], "ans": "B", "exp": "根据年龄调整设计，जनाउँछ适应性परिवर्तन，用「に応じて」"}, {"q": "参加者の人数____会場を変更いたします。", "opts": ["A. について", "B. に対して", "C. に応じて", "D. に関して"], "ans": "C", "exp": "根据参加人数调整会场，जनाउँछ灵活对应，用「に応じて」"}]}, "115": {"analysis": "「〜はもちろん」जनाउँछ前项是理所当然的，重点जोड दिनु后项的追加信息。常与「〜も」呼应प्रयोग，形成「AはもちろんBも」的句型，突出B项的意外性或पूरक性。这वटा文法体现了日语中层次प्रगतिशील的表达बानी。", "mistakes": "❌ 日本語はもちろん、英語は話せません。→ ✅ 日本語はもちろん、英語も話せます。（后项गर्नुपर्छ是सकारात्मक的追加信息）\n❌ 彼はもちろん来ました、私は来ませんでした。→ ✅ 彼はもちろん、私も来ました。（गर्नुपर्छ用「も」जनाउँछ追加）", "similar": [{"form": "〜だけでなく〜も", "diff": "「だけでなく」单纯जनाउँछ追加，「はもちろん」जोड दिनु前项的理所当然性"}, {"form": "〜ばかりでなく〜も", "diff": "「ばかりでなく」较औपचारिक，「はもちろん」更बोलीचाली化且带有理所当然的语气"}], "quiz": [{"q": "彼は数学____、物理も得意です。", "opts": ["A. はもちろん", "B. だけ", "C. しか", "D. ばかり"], "ans": "A", "exp": "जनाउँछ数学理所当然，物理也很擅长的追加信息"}, {"q": "この店は料理はもちろん、サービス____良いです。", "opts": ["A. が", "B. は", "C. f": "जनाउँछ从某数量到某数量的完整范围，而「以上/以下」只जनाउँछ单दिशा的数量限制"}], "quiz": [{"q": "この仕事は経験が3年____の人を募集しています。", "opts": ["A. 以上", "B. 以下", "C. 以内", "D. 超える"], "ans": "A", "exp": "招聘3年以上अनुभव的人，包含3年，用「以上」"}, {"q": "荷物の重量は20キロ____でお願いします。", "opts": ["A. 以上", "B. を超える", "C. 以下", "D. 以内"], "ans": "C", "exp": "行李重量请控制在20公斤以下（包含20公斤），用「以下」"}, {"q": "売上が予想____100万円____伸びました。", "opts": ["A. を・以上", "B. が・以下", "C. を・超える", "D. を・以内"], "ans": "A", "exp": "销售额比预想多增长了100万日元以上，「予想を超える」जनाउँछ超过预想"}]}, "125": {"analysis": "「〜と同時に」जनाउँछ两वटाकार्य或अवस्था在समय上同时发生，जोड दिनुसमय的一致性。与中文「与~同时」相对应，但日语更जोड दिनु两वटा事件的瞬间性同步。常प्रयोग गरिन्छवर्णन人生重要节点的转换，如毕业就职、结婚搬家等场景。", "mistakes": "सामान्य गल्तीहरू：时态搭配和動詞形式。❌ 卒業したと同時に、就職する → ✅ 卒業と同時に、就職した（两वटाकार्य应保持时态一致）；❌ 雨が降っていると同時に → ✅ 雨が降ると同時に（应प्रयोग辞書形而非进行时）", "similar": [{"form": "〜とजम्माに", "diff": "更जोड दिनु伴随关系，可जनाउँछ「随着~」的परिवर्तन过程"}, {"form": "〜ながら", "diff": "जनाउँछ同时进行的कार्य，但कर्ताअनिवार्य相同"}, {"form": "〜際に", "diff": "जनाउँछ「在~的时候」，更जोड दिनु时机而非同时性"}], "quiz": [{"q": "大学を卒業____、アメリカに留学することになった。", "opts": ["A. と同時に", "B. ながら", "C. とजम्माに", "D. ついでに"], "ans": "A", "exp": "जनाउँछ毕业和留学两वटा事件同时发生，用「と同時に」最恰当"}, {"q": "電気が____と同時に、エアコンも止まった。", "opts": ["A. 消えている", "B. 消える", "C. 消えた", "D. 消して"], "ans": "C", "exp": "「と同時に」前接भूतकाल时，जनाउँछ两वटाभूतकाल的事件同时发生"}, {"q": "結婚____と同時に、新しいマンションに引っ越した。", "opts": ["A. して", "B. すること", "C. する", "D. した"], "ans": "C", "exp": "名詞+する動詞时，应प्रयोग辞書形「する」+と同時に"}]}, "126": {"analysis": "「〜によると」是जनाउँछ信息来源的文法，बराबर हो中文的「根据〜」「据〜说」。它जोड दिनु所述内容的信息来源，常प्रयोग गरिन्छ转述从媒体、他人等处获得的信息。与「〜によれば」अर्थ完全相同，但「によると」更常प्रयोग गरिन्छबोलीचाली，「によれば」更औपचारिक。", "mistakes": "❌ 友達によると言いました → ✅ 友達によると、雨が降るそうです（不能直接加「言いました」）\n❌ テレビによるに → ✅ テレビによると（助詞प्रयोगगलत）\n❌ 天気予報によると晴れました → ✅ 天気予報によると晴れるそうです（时态搭配गलत）", "similar": [{"form": "〜によれば", "diff": "अर्थ相同，但更औपचारिक，多प्रयोग गरिन्छलिखित语"}, {"form": "〜そうです", "diff": "जनाउँछ传闻，但不明确指出信息来源"}, {"form": "〜とのことです", "diff": "更औपचारिक的转述表达，常प्रयोग गरिन्छ敬语场合"}], "quiz": [{"q": "天気予報（　　）、今日は雪が降るらしい。", "opts": ["A. によると", "B. について", "C. に対して", "D. にとって"], "ans": "A", "exp": "जनाउँछ信息来源「根据天气预报」，用「によると」"}, {"q": "新聞（　　）、来月から電車の料金が上がるそうだ。", "opts": ["A. にとって", "B. によると", "C. について", "D. に関して"], "ans": "B", "exp": "「根据报纸」जनाउँछ信息来源，प्रयोग「によると」"}, {"q": "母（　　）、兄は来週結婚するそうです。", "opts": ["A. について", "B. に対して", "C. によると", "D. にとって"], "ans": "C", "exp": "「据母亲说」जनाउँछ从母亲那里得到的信息，用「によると」"}]}, "127": {"analysis": "「〜のもとで」जनाउँछ在某种权威、指导或शर्त的影响下进行某项活动。这वटा文法जोड दिनु的是受到某种力量或环境的支配、指导或影响，常प्रयोग गरिन्छऔपचारिक场合。与「〜の下で」相比，「のもとで」更加लिखित化，多प्रयोग गरिन्छवर्णन在权威人物的指导下或在特定制度、शर्त的框架内进行的活动。", "mistakes": "容易与「〜の下で」混淆प्रयोग。❌ 机の下でペンを見つけた → ✅ 机の下でペンを見つけた（物理位置用「下で」）。❌ 厳しいशर्तの下で働く → ✅ 厳しいशर्तのもとで働く（抽象शर्त用「のもとで」）。ध्यान दिनुहोस्「のもとで」和「のもとに」अर्थ相同但「のもとに」更जोड दिनु目标性。", "similar": [{"form": "〜の下で", "diff": "「の下で」多प्रयोग गरिन्छ物理位置或一般शर्त，「のもとで」更औपचारिक，多प्रयोग गरिन्छ权威指导或制度框架"}, {"form": "〜によって", "diff": "「によって」जनाउँछ手段方法，「のもとで」जनाउँछ在某种影响或शर्त的支配下"}], "quiz": [{"q": "彼は有名な画家____絵を学んでいる。", "opts": ["A. のもとで", "B. によって", "C. について", "D. に対して"], "ans": "A", "exp": "在有名画家的指导下学画，用「のもとで」जनाउँछ在权威人物的指导影响下"}, {"q": "新しい法律____、会社の制度が変わった。", "opts": ["A. について", "B. のもとで", "C. に関して", "D. として"], "ans": "B", "exp": "在新法律的शर्त下制度发生परिवर्तन，用「のもとで」जनाउँछ在法律शर्त的影响下"}, {"q": "厳しい監督____、選手たちは練習している。", "opts": ["A. によって", "B. として", "C. のもとで", "D. に対して"], "ans": "C", "exp": "在严格的监督指导下进行练习，用「のもとで」जनाउँछ在监督的指导影响下"}]}, "128": {"analysis": "「〜からこそ」是जोड दिनुकारण的表达方式，比「〜から」的语气更强烈，突出前项是后项成立的重要कारण。常प्रयोग गरिन्छ积极的、有价值的事情，表达说话者对कारण的重视和सकारात्मक态度。", "mistakes": "❌ 忙しいからこそ、何もできない。→ ✅ 忙しいから、何もできない。（消极नतिजा不用からこそ）❌ 雨が降ったからこそ、出かけなかった。→ ✅ 雨が降ったから、出かけなかった。（单纯因果关系不需जोड दिनु）", "similar": [{"form": "〜から", "diff": "からजनाउँछ普通因果关系，からこそजोड दिनुकारण的重要性"}, {"form": "〜ばこそ", "diff": "ばこそ多प्रयोग गरिन्छ假定जोड दिनु，からこそप्रयोग गरिन्छ事实जोड दिनु"}], "quiz": [{"q": "親友____、本音で話し合える。", "opts": ["A. だから", "B. からこそ", "C. なので", "D. ために"], "ans": "B", "exp": "जोड दिनु正因为是亲友这वटा重要कारण，才能真心交流"}, {"q": "経験が豊富____、この仕事を任せられた。", "opts": ["A. だからこそ", "B. だから", "C. ので", "D. によって"], "ans": "A", "exp": "जोड दिनु正因为अनुभव丰富这वटा重要शर्त，才被委以重任"}, {"q": "失敗した____、成功の喜びがわかる。", "opts": ["A. から", "B. ので", "C. からこそ", "D. ために"], "ans": "C", "exp": "जोड दिनु正是因为失败这वटा宝贵经历，才能理解成功的可贵"}]}, "129": {"analysis": "「〜に加えて」जनाउँछ在已有的基础上再追加其他要素，जोड दिनु累积性थप्नु。与中文「除了…还…」फरक，日语更जोड दिनु在原有基础上的叠加概念，常प्रयोग गरिन्छ积极的、建设性的सन्दर्भ中。", "mistakes": "❌ 病気に加えて、お金もない。→ ✅ 病気のうえに、お金もない。（消极情况用「〜うえに」更自然）", "similar": [{"form": "〜うえに", "diff": "「うえに」可प्रयोग गरिन्छ积极和消极场合，「に加えて」主要प्रयोग गरिन्छ积极的追加"}, {"form": "〜ばかりか", "diff": "「ばかりか」जोड दिनु出乎意料的मात्रा，「に加えて」जोड दिनु有意识的追加"}], "quiz": [{"q": "彼は頭がいい____、努力家でもある。", "opts": ["A.に加えて", "B.に加え", "C.のうえに", "D.AとB両方正しい"], "ans": "D", "exp": "「に加えて」「に加え」は同じअर्थで、両方とも正しい表現"}, {"q": "雨____、風も強くなってきた。", "opts": ["A.に加えて", "B.のうえに", "C.ばかりか", "D.すべて正しい"], "ans": "B", "exp": "悪天候という消極的な状況では「のうえに」が最も自然"}, {"q": "日本語____、中国語も勉強している。", "opts": ["A.に加えて", "B.に加え", "C.のほかに", "D.すべて正しい"], "ans": "D", "exp": "語学学習という積極的な文脈では、どの表現もप्रयोगसम्भावना"}]}, "130": {"analysis": "「〜にしたがって」जनाउँछ两वटा事物同步परिवर्तन或发展，जोड दिनु伴随性和连动性。与「〜につれて」अर्थ相近，但「にしたがって」更जोड दिनु跟随、遵循的含义，常प्रयोग गरिन्छवर्णन自然规律或社会परिवर्तन。", "mistakes": "❌ 年をとるにしたがって、体が弱くなった → ✅ 年をとるにしたがって、体が弱くなっている（应用进行时जनाउँछ持续परिवर्तन）；❌ 先生の指示にしたがって勉強した → ✅ 先生の指示にしたがって勉强する（此处应用「に従う」而非「にしたがって」）", "similar": [{"form": "〜につれて", "diff": "「にしたがって」更जोड दिनु跟随、遵循；「につれて」更中性地जनाउँछ同步परिवर्तन"}, {"form": "〜とともに", "diff": "「とともに」जनाउँछ同时进行；「にしたがって」जोड दिनु前项引起后项परिवर्तन"}, {"form": "〜に従う", "diff": "「に従う」是動詞，जनाउँछ服从；「にしたがって」是副詞性表现，जनाउँछ连动परिवर्तन"}], "quiz": [{"q": "経済が発展する____、環境問題も深刻になっている。", "opts": ["A. にしたがって", "B. によって", "C. について", "D. に対して"], "ans": "A", "exp": "जनाउँछ经济发展与环境问题恶化的同步परिवर्तन，用「にしたがって」"}, {"q": "子どもの成長____、親の心配も変わっていく。", "opts": ["A. によると", "B. にしたがって", "C. に関して", "D. に比べて"], "ans": "B", "exp": "जनाउँछ孩子成长与父母担心内容परिवर्तन的连动关系"}, {"q": "気温が上がる____、桜の開花が早くなった。", "opts": ["A. ために", "B. ので", "C. にしたがって", "D. として"], "ans": "C", "exp": "जनाउँछ气温上升与樱花提前开放的自然परिवर्तन规律"}]}, "131": {"analysis": "「それほど〜ない」जनाउँछमात्रा没有预期或想象中那么高，बराबर हो中文的「没那么〜/不那么〜」。这वटा句型通常用来表达实际情况比预想的要轻微，带有一种缓解或安慰的语气。需要ध्यान दिनुहोस्它与完全नकारात्मकफरक，而是मात्रा的相对降低。", "mistakes": "❌ この映画はそれほどおもしろくないです → ✅ この映画はそれほどおもしろくない（不需要です，因为ない本身就是丁寧语的नकारात्मक形式）。❌ それほど高い → ✅ それほど高くない（अनिवार्य用नकारात्मक形式）。", "similar": [{"form": "あまり〜ない", "diff": "あまり更जोड दिनु完全不怎么样，それほど则是相对于预期而言"}, {"form": "そんなに〜ない", "diff": "そんなに多प्रयोग गरिन्छ对话中回应对方，それほど更多是客观वर्णन"}, {"form": "たいして〜ない", "diff": "たいして带有轻视语气，それほど相对中性"}], "quiz": [{"q": "今日の天気は____暑くない。", "opts": ["A.それほど", "B.とても", "C.かなり", "D.非常に"], "ans": "A", "exp": "それほど与ない搭配जनाउँछमात्रा没那么高，其他选项都是सकारात्मक的मात्रा副詞"}, {"q": "この料理は____辛くないから、子供でも食べられる。", "opts": ["A.とても", "B.それほど", "C.すごく", "D.かなり"], "ans": "B", "exp": "それほど辛くないजनाउँछ没那么辣，符合后面孩子也能吃的सन्दर्भ"}, {"q": "彼の話は____面白くなかった。", "opts": ["A.それほど", "B.とても", "C.すごく", "D.非常に"], "ans": "A", "exp": "それほど面白くないजनाउँछ没那么有趣，是मात्रा的相对नकारात्मक"}]}, "132": {"analysis": "「というふうに」जनाउँछ采用某种具体的方法或方式来进行某事，जोड दिनु按照前述内容的样子或方式来执行。与「ように」相比，「というふうに」更जोड दिनु具体明确的方法步骤，常प्रयोग गरिन्छव्याख्या操作程序或工作方式。", "mistakes": "❌ 明日会議をするというふうにしましょう → ✅ 明日会議をするというふうに決めましょう（「〜というふうに」后面需要接जनाउँछ决定、安排等的動詞）", "similar": [{"form": "〜ように", "diff": "「ように」जनाउँछ目标或अवस्था，「というふうに」जनाउँछ具体方法方式"}, {"form": "〜という方法で", "diff": "अर्थ相近，但「というふうに」更बोलीचाली化，प्रयोग范围更广"}], "quiz": [{"q": "会議では（　　）話し合いを進めていきます。", "opts": ["A. 自由に発言するというふうに", "B. 自由に発言するように", "C. 自由に発言したというふうに", "D. 自由に発言していたように"], "ans": "A", "exp": "जनाउँछ采用自由发言的方式进行会议，用「というふうに」जनाउँछ具体方法"}, {"q": "この問題は（　　）解決しましょう。", "opts": ["A. みんなで相談したように", "B. みんなで相談するように", "C. みんなで相談するというふうに", "D. みんなで相談していたように"], "ans": "C", "exp": "जनाउँछ采用大家一起商量的方式来解决问题，जोड दिनु具体方法"}, {"q": "今度のプロジェクトは（　　）進めることになりました。", "opts": ["A. チームを作って協力したように", "B. チームを作って協力するように", "C. チームを作って協力するというふうに", "D. チームを作って協力していたように"], "ans": "C", "exp": "जनाउँछ决定采用组建团队合作的方式推进项目，用「というふうに」जनाउँछ具体安排"}]}, "133": {"analysis": "「〜なければよかった」जनाउँछ对भूतकाल已发生的事情感到后悔，अर्थ是「要是没有做某事就好了」。这是一种虚拟语气的表达，用来表达说话人对भूतकाल行为的悔恨之情。", "mistakes": "易混淆सकारात्मक和नकारात्मक含义。❌ もっと勉強なければよかった → ✅ もっと勉強しなければよかった（要是没有学习就好了）/ もっと勉強すればよかった（要是学习了就好了）", "similar": [{"form": "〜ばよかった", "diff": "जनाउँछ「要是做了就好了」，与「なければよかった」अर्थ相反"}, {"form": "〜なくてよかった", "diff": "जनाउँछ「没做真好」，是庆幸的心情，不含后悔"}], "quiz": [{"q": "あの時、彼に本当のことを（　　）。", "opts": ["A. 言わなければよかった", "B. 言えばよかった", "C. 言わなくてよかった", "D. 言うなければよかった"], "ans": "A", "exp": "后悔告诉了他真相，用「言わなければよかった」"}, {"q": "昨日、あんなに食べ（　　）。今日お腹が痛い。", "opts": ["A. ればよかった", "B. なくてよかった", "C. なければよかった", "D. てよかった"], "ans": "C", "exp": "后悔昨天吃太多，用「食べなければよかった」"}, {"q": "雨が降ってきた。傘を（　　）。", "opts": ["A. 持って来なければよかった", "B. 持って来ればよかった", "C. 持って来なくてよかった", "D. 持って来るなければよかった"], "ans": "B", "exp": "后悔没带伞，गर्नुपर्छ用「持って来ればよかった」जनाउँछ「要是带了就好了」"}]}, "134": {"analysis": "「〜ばよかった」是表达对भूतकाल没有做某事的后悔之情的文法。这वटा句型जोड दिनु的是「如果当时做了某事就好了」的遗憾心情，常प्रयोग गरिन्छ反省自己भूतकाल的行为或छनौट。与单纯的अनुमानफरक，这里包含了说话人真实的后悔情感。", "mistakes": "❌ 昨日勉強したばよかった → ✅ 昨日勉強すればよかった（動詞अनिवार्य用ば形）\n❌ もっと頑張ればよかったです → ✅ もっと頑張ればよかった（后面不加です）\n❌ 行けばよかった思います → ✅ 行けばよかったと思います（需要格助詞と）", "similar": [{"form": "〜べきだった", "diff": "べきだったजनाउँछगर्नुपर्छ做却没做的义务感，ばよかった更多表达वटा人的后悔情感"}, {"form": "〜ばよい", "diff": "ばよい是वर्तमान的सुझाव「这样做就好」，ばよかった是对भूतकाल的后悔"}], "quiz": [{"q": "あの時、彼に本当のことを____。", "opts": ["A. 言えばよかった", "B. 言ったばよかった", "C. 言うばよかった", "D. 言えればよかった"], "ans": "A", "exp": "動詞「言う」的ば形是「言えば」，表达对भूतकाल没有说实话的后悔"}, {"q": "もっと____、試験に合格できたのに。", "opts": ["A. 勉強したばよかった", "B. 勉強ばよかった", "C. 勉強すればよかった", "D. 勉強するばよかった"], "ans": "C", "exp": "「勉強する」的ば形是「勉強すれば」，表达对学习不够的后悔"}, {"q": "天気予報を____、傘を持ってきたのに。", "opts": ["A. 見るばよかった", "B. 見ればよかった", "C. 見たばよかった", "D. 見てばよかった"], "ans": "B", "exp": "「見る」的ば形是「見れば」，表达对没看天气预报的后悔"}]}, "135": {"analysis": "「〜よりも〜ほうが」是N3重要तुलना句型，प्रयोग गरिन्छजोड दिनु两者तुलना中更倾向的一方。「よりも」比单纯的「より」语气更强，「ほうが」明确指出तुलना的नतिजा，整वटा句型突出说话者的主观判断和偏好。", "mistakes": "❌ 映画よりもテレビを見るほうが好きです → ✅ テレビよりも映画を見るほうが好きです（तुलनालक्ष्य要सही对应）；❌ 本よりも雑誌のほうがおもしろかったです → ✅ 本よりも雑誌のほうがおもしろいです（形容詞时态要与句末呼应）", "similar": [{"form": "AよりBのほうが", "diff": "「よりも」比「より」语气更强，更加जोड दिनुतुलना"}, {"form": "AのほうがBより", "diff": "语序फरक，「〜よりも〜ほうが」更突出तुलनानतिजा"}], "quiz": [{"q": "バスよりも電車____早いです。", "opts": ["A. を", "B. の", "C. のほうが", "D. によって"], "ans": "C", "exp": "「AよりもBのほうが」句型中，「のほうが」用来जनाउँछतुलना的नतिजा"}, {"q": "夏____冬のほうが好きです。", "opts": ["A. よりも", "B. ので", "C. から", "D. として"], "ans": "A", "exp": "「よりも」प्रयोग गरिन्छजनाउँछतुलना的基准，比单纯的「より」语气更强"}, {"q": "コーヒーよりも紅茶のほうが____。", "opts": ["A. 飲みます", "B. 好きです", "C. 飲みました", "D. 好きでした"], "ans": "B", "exp": "जनाउँछवर्तमान的喜好用वर्तमान时，「好きです」最自然"}]}, "136": {"analysis": "「〜ごとに」जनाउँछ每次或每隔一定间隔重复发生某事，जोड दिनु规律性和周期性。与「毎〜」相比，「ごとに」更जोड दिनु逐一性和连续性，常प्रयोग गरिन्छजनाउँछ空间、समय、数量等的规律间隔。", "mistakes": "❌ 毎日ごとに散歩する → ✅ 毎日散歩する / 一日ごとに散歩する（「毎日」已含「每天」अर्थ，不需加「ごとに」）", "similar": [{"form": "毎〜", "diff": "「毎日・毎年」等固定表达vs「ごとに」可接各种名詞जनाउँछ间隔"}, {"form": "〜おきに", "diff": "「おきに」जनाउँछ跳过间隔（如二日おきに=隔一天），「ごとに」जनाउँछ连续间隔"}], "quiz": [{"q": "彼は本を読む（____）新しい単語を覚える。", "opts": ["A.ごとに", "B.たびに", "C.につれて", "D.にしたがって"], "ans": "A", "exp": "「本を読むごとに」जनाउँछ每次读书都会记住新单词，जोड दिनु每次的规律性"}, {"q": "この時計は一時間（____）音が鳴る。", "opts": ["A.おきに", "B.ごとに", "C.によって", "D.について"], "ans": "B", "exp": "「一時間ごとに」जनाउँछ每隔一小时响一次，जनाउँछ定期间隔"}, {"q": "学生は一人（____）自己紹介をした。", "opts": ["A.によって", "B.について", "C.ごとに", "D.に対して"], "ans": "C", "exp": "「一人ごとに」जनाउँछ学生逐一进行自我介绍，जोड दिनु逐वटा进行"}]}, "137": {"analysis": "「〜ものの」जनाउँछ与期待相反的逆接，जोड दिनु前后两वटा事实形成对比，常含有遗憾或不满的语气。与单纯的「けれど」相比，「ものの」更突出नतिजा与期待的落差，语气更औपचारिक。", "mistakes": "सामान्य गल्तीहरू：不要与「〜もので」混淆。❌雨が降っているもので、出かけられない → ✅雨が降っているものの、出かけなければならない（जनाउँछ逆接而非कारण）", "similar": [{"form": "〜けれど/けれども", "diff": "「ものの」语气更औपचारिक，更जोड दिनु与期待的落差；「けれど」更बोलीचाली化，用途更广泛"}, {"form": "〜ながら", "diff": "「ながら」多प्रयोग गरिन्छ矛盾的अवस्था并存；「ものの」重点在नतिजा与期待不符"}], "quiz": [{"q": "彼は有名な大学を卒業した____、なかなか就職できない。", "opts": ["A. ものの", "B. もので", "C. ものを", "D. ものに"], "ans": "A", "exp": "जनाउँछ虽然毕业于名校但与期待相反找不到工作，用「ものの」जनाउँछ逆接"}, {"q": "薬を飲んだ____、熱が下がらない。", "opts": ["A. ながら", "B. ものの", "C. ので", "D. から"], "ans": "B", "exp": "吃了药但烧不退，नतिजा与期待相反，用「ものの」"}, {"q": "この料理は見た目はきれい____、味はいまいちだ。", "opts": ["A. ものを", "B. もので", "C. ものの", "D. ものに"], "ans": "C", "exp": "外观漂亮但味道不佳，与期待形成对比，用「ものの」जनाउँछ逆接"}]}, "15": {"analysis": "「〜たびに」जनाउँछ「每次〜都会」的反复发生的情况，जोड दिनु某वटाकार्य或अवस्था每次出现时都伴随着相同的नतिजा。与中文的「每次〜就〜」完全对应，常प्रयोग गरिन्छवर्णनवटा人的बानी性反应或自然现象的规律性。", "mistakes": "सामान्य गल्तीहरू：不能प्रयोग गरिन्छ一次性事件。❌ 明日会うたびに話します → ✅ 彼に会うたびに元気になる。时态混乱：❌ 雨が降ったたびに → ✅ 雨が降るたびに。", "similar": [{"form": "〜度に", "diff": "「〜度に」更औपचारिक，多प्रयोग गरिन्छलिखित语；「〜たびに」更बोलीचाली化，प्रयोग范围更广"}, {"form": "〜と", "diff": "「〜と」जनाउँछशर्त关系的必然नतिजा；「〜たびに」जोड दिनु反复性和बानी性"}], "quiz": [{"q": "彼女に____、心が痛む。", "opts": ["A. 会うたびに", "B. 会ったたびに", "C. 会うと", "D. 会えばたびに"], "ans": "A", "exp": "動詞辞书形+たびに，जनाउँछ每次见到她都心痛"}, {"q": "____、新しい発見がある。", "opts": ["A. 旅行したたびに", "B. 旅行のたびに", "C. 旅行すればたびに", "D. 旅行してたびに"], "ans": "B", "exp": "名詞+のたびに，जनाउँछ每次旅行都有新发现"}, {"q": "この写真を見る____、笑顔になる。", "opts": ["A. と", "B. たら", "C. たびに", "D. ば"], "ans": "C", "exp": "जनाउँछ每次看照片都会笑，जोड दिनु反复性，用「たびに」最合适"}]}, "17": {"analysis": "「〜ほど〜ない」是N3重要的तुलना文法，जनाउँछB在某方面的मात्रा不如A。这वटा句型的核心在于「ほど」作为तुलना基准，后接नकारात्मक形来表达मात्रा的差异。与中文的「没有A那么B」完全对应，是日语中最常用的तुलना表达之一。", "mistakes": "❌ 今日は昨日ほど寒いです → ✅ 今日は昨日ほど寒くありません（अनिवार्य用नकारात्मक形）\n❌ 彼は私ほどではない上手です → ✅ 彼は私ほど上手ではありません（नकारात्मक形位置गलत）\n❌ この本はあの本ほど面白くないです → ✅ この本はあの本ほど面白くありません（い形容詞नकारात्मक形）", "similar": [{"form": "〜より〜", "diff": "「より」जोड दिनु一方超过另一方，「ほど」जोड दिनु一方不及另一方的मात्रा"}, {"form": "〜ほど〜はない", "diff": "「ほど〜はない」जनाउँछ最高मात्रा，「ほど〜ない」जनाउँछतुलनामात्रा不足"}], "quiz": [{"q": "今年の夏は去年____暑くありません。", "opts": ["A. より", "B. ほど", "C. まで", "D. から"], "ans": "B", "exp": "जनाउँछ今年夏天没有去年那么热，用「ほど」进行मात्रातुलना"}, {"q": "この映画はあの映画____面白くないです。", "opts": ["A. ほど", "B. より", "C. と同じ", "D. について"], "ans": "A", "exp": "「ほど〜ない」जनाउँछमात्रातुलना，这部电影没有那部电影那么有趣"}, {"q": "彼は私____日本語が上手ではありません。", "opts": ["A. より", "B. と", "C. ほど", "D. まで"], "ans": "C", "exp": "「AほどBではない」的固定搭配，जनाउँछ他的日语没有我那么好"}]}, "21": {"analysis": "「〜ようと思う」表达说话人的意志或计划，बराबर हो中文的「打算~」「想要~」。这वटा文法जोड दिनु的是内心的决定或意图，比单纯的「〜たい」更औपचारिक，更有决心。常प्रयोग गरिन्छ表达भविष्यकाल的行动计划。", "mistakes": "❌ 明日早く起きたいと思います → ✅ 明日早く起きようと思います（表达意志用意向形）\n❌ 日本語を勉強するようと思います → ✅ 日本語を勉強しようと思います（動詞要用意向形）\n❌ もっと頑張ろうと思っています → ✅ もっと頑張ろうと思います（一般वर्तमान时即可）", "similar": [{"form": "〜たいと思う", "diff": "表达愿望，较随意；〜ようと思う表达意志决定，更औपचारिक"}, {"form": "〜つもりだ", "diff": "つもり更जोड दिनु计划的确定性；ようと思う更जोड दिनु内心的意志"}, {"form": "〜予定だ", "diff": "予定表达既定安排；ようと思う表达वटा人意志决定"}], "quiz": [{"q": "今度の休みに友達と映画を（____）と思います。", "opts": ["A. 見る", "B. 見よう", "C. 見たい", "D. 見ている"], "ans": "B", "exp": "表达意志计划时用動詞意向形，「見よう」是「見る」的意向形"}, {"q": "体重を減らすために、毎日運動（____）と思っています。", "opts": ["A. する", "B. したい", "C. しよう", "D. している"], "ans": "C", "exp": "「〜ようと思う」表达意志，需要用意向形「しよう」"}, {"q": "彼は来年大学院に（____）と言っていました。", "opts": ["A. 入る", "B. 入ろう", "C. 入りたい", "D. 入った"], "ans": "B", "exp": "表达他人的意志时也用意向形，「入ろう」是「入る」的意向形"}]}, "24": {"analysis": "「〜なんて/なんか」表达说话人的主观情感，包含意外、轻视、感叹等语气。常प्रयोग गरिन्छबोलीचाली中，「なんか」比「なんて」更随意。这वटा文法体现了日语中丰富的情感表达层次。", "mistakes": "❌ 彼なんて来ないと思った → ✅ 彼なんて来ないと思っていた（भूतकाल持续的想法用ていた）；❌ そんなことなんてできません → ✅ そんなことなんてできない（बोलीचाली中多用普通形）", "similar": [{"form": "〜なんか", "diff": "与なんて基本相同，但なんか更बोलीचाली化随意"}, {"form": "〜だなんて", "diff": "だなんて语气更强烈，多प्रयोग गरिन्छ断定句后"}, {"form": "〜とは", "diff": "とは更औपचारिक，多प्रयोग गरिन्छलिखित语जनाउँछ意外"}], "quiz": [{"q": "あの人が社長（____）信じられない。", "opts": ["A.なんて", "B.なので", "C.ながら", "D.について"], "ans": "A", "exp": "जनाउँछ对「あの人が社長」这一事实感到意外，用なんて"}, {"q": "宿題（____）後でやればいいよ。", "opts": ["A.なら", "B.なんか", "C.など", "D.なのに"], "ans": "B", "exp": "なんかजनाउँछ对宿题的轻视态度，认为不重要"}, {"q": "彼が一番（____）思わなかった。", "opts": ["A.なんてことを", "B.なんてことは", "C.なんてことが", "D.なんてことも"], "ans": "B", "exp": "「〜なんてことは思わなかった」是固定表达，जनाउँछ完全没想到"}]}, "76": {"analysis": "「〜のように」是जनाउँछ比喻和例示的重要句型，通过将某事物比作另一事物来वर्णन其性质或अवस्था。与中文'像~一样'对应，但日语更注重形式的完整性。此句型既可प्रयोग गरिन्छ具体的比喻（如例句中的美丽如花），也可प्रयोग गरिन्छ抽象概念的类比。", "mistakes": "सामान्य गल्तीहरू：❌彼女は花ように美しい → ✅彼女は花のように美しい（名詞后अनिवार्य加の）；❌鳥ようによく歌う → ✅鳥のようによく歌う（不能重复よう）；❌彼のような人になりたい → ✅彼のような人になりたい（这里用な不是に）", "similar": [{"form": "〜のような", "diff": "「のような」修饰名詞，「のように」修饰動詞・形容詞"}, {"form": "〜みたい（に）", "diff": "「みたい」更बोलीचाली化，「のように」更औपचारिकलिखित"}], "quiz": [{"q": "彼は子供____よく泣く。", "opts": ["A.のように", "B.のような", "C.ように", "D.みたいな"], "ans": "A", "exp": "修饰動詞「泣く」要用「のように」"}, {"q": "雪____白いドレスを着ている。", "opts": ["A.のように", "B.のような", "C.ように", "D.らしい"], "ans": "A", "exp": "修饰形容詞「白い」用「のように」"}, {"q": "先生____優しい人になりたい。", "opts": ["A.のように", "B.のような", "C.ように", "D.みたいに"], "ans": "B", "exp": "修饰名詞「人」要用「のような」"}]}, "78": {"analysis": "「〜に決まっている」जनाउँछ说话者基于常识、अनुभव或逻辑推理得出的强烈确信，语气比「〜はずだ」更加断定。这वटा文法常प्रयोग गरिन्छ表达不容置疑的判断，带有「当然是这样」的语感。", "mistakes": "❌ 明日雨が降るに決まっている → ✅ 明日雨が降るはずだ（天气预测用「はずだ」更合适）\n❌ 彼は学生に決まっています → ✅ 彼は学生に決まっている（此文法不用敬语形式）", "similar": [{"form": "〜はずだ", "diff": "「はずだ」जनाउँछ基于根据的अनुमान，「に決まっている」जनाउँछ绝对确信的断定，语气更强"}, {"form": "〜に違いない", "diff": "「に違いない」जनाउँछ强烈अनुमान但仍有अनुमान色彩，「に決まっている」是绝对断定"}], "quiz": [{"q": "あの人は嘘をついている____。", "opts": ["A. に決まっている", "B. はずがない", "C. わけがない", "D. ことがない"], "ans": "A", "exp": "根据सन्दर्भ判断对方在撒谎，用「に決まっている」जनाउँछ强烈断定最合适"}, {"q": "そんな高い車、学生が買える____。", "opts": ["A. に決まっている", "B. はずだ", "C. わけがない", "D. べきだ"], "ans": "C", "exp": "नकारात्मकसन्दर्भ下जनाउँछ「不सम्भावना」，गर्नुपर्छ用「わけがない」，而不是सकारात्मक断定的「に決まっている」"}, {"q": "彼は東京大学出身だから、頭が____。", "opts": ["A. いいに決まっている", "B. よくなるはずだ", "C. いいべきだ", "D. よかったに違いない"], "ans": "A", "exp": "基于「东京大学出身」这वटा事实进行强烈断定，用「いいに決まっている」最恰当"}]}};
